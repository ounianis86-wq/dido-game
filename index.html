<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدينة الألعاب - موقع ترفيهي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #ffd966;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .games-menu {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .game-btn {
            background: #ff9800;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        .game-btn:hover {
            background: #f57c00;
            transform: scale(1.05);
        }
        .active-game {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            color: white;
        }
        .number-game input, .number-game button {
            padding: 10px;
            margin: 10px;
            font-size: 1rem;
            border-radius: 10px;
            border: none;
        }
        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .memory-card {
            background: #ffb74d;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .memory-card.flipped {
            background: #4caf50;
            color: white;
        }
        .message {
            margin-top: 15px;
            font-size: 1.2rem;
            background: #00000099;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
        }
        footer {
            margin-top: 30px;
            color: #ddd;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎮 مدينة الألعاب 🎮</h1>
    <div class="games-menu">
        <button class="game-btn" onclick="showGame('guess')">🔢 تخمين الرقم</button>
        <button class="game-btn" onclick="showGame('memory')">🧠 لعبة الذاكرة</button>
        <button class="game-btn" onclick="showGame('tictac')">❌⭕ تيك تاك تو</button>
    </div>
    <div id="gameArea" class="active-game">
        <!-- سيتم تحميل اللعبة هنا -->
    </div>
    <footer>موقع ترفيهي خالص - ألعاب ذهنية ومسلية بدون أي مقابل مالي</footer>
</div>

<script>
    let currentGame = 'guess';

    function showGame(game) {
        currentGame = game;
        if(game === 'guess') loadGuessNumber();
        else if(game === 'memory') loadMemoryGame();
        else if(game === 'tictac') loadTicTacToe();
    }

    // لعبة تخمين الرقم
    function loadGuessNumber() {
        let secret = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        const html = `
            <h3>🔢 خمن الرقم (1-100)</h3>
            <div class="number-game">
                <input type="number" id="guessInput" placeholder="أدخل رقمك">
                <button id="guessBtn">خمن</button>
                <p id="guessMsg" class="message"></p>
            </div>
        `;
        document.getElementById('gameArea').innerHTML = html;
        const btn = document.getElementById('guessBtn');
        const input = document.getElementById('guessInput');
        const msg = document.getElementById('guessMsg');
        btn.onclick = () => {
            let val = parseInt(input.value);
            if(isNaN(val)) { msg.innerText = "⚠️ أدخل رقماً صحيحاً"; return; }
            attempts++;
            if(val === secret) {
                msg.innerText = `🎉 صحيح! الرقم هو ${secret} بعد ${attempts} محاولات 🎉`;
                secret = Math.floor(Math.random() * 100) + 1;
                attempts = 0;
            } else if(val < secret) msg.innerText = `📉 أكبر من ${val}`;
            else msg.innerText = `📈 أصغر من ${val}`;
            input.value = '';
        };
    }

    // لعبة الذاكرة (بسيطة: إظهار أرقام)
    let memoryNumbers = [];
    let flipped = [];
    let lockBoard = false;
    let matched = [];

    function loadMemoryGame() {
        memoryNumbers = [1,1,2,2,3,3,4,4];
        for(let i=memoryNumbers.length - 1; i>0; i--){
            const j = Math.floor(Math.random()*(i+1));
            [memoryNumbers[i], memoryNumbers[j]] = [memoryNumbers[j], memoryNumbers[i]];
        }
        flipped = new Array(8).fill(false);
        matched = new Array(8).fill(false);
        lockBoard = false;
        renderMemoryBoard();
    }

    function renderMemoryBoard() {
        let html = `<h3>🧠 لعبة الذاكرة - طابق الأزواج</h3><div class="memory-game">`;
        for(let i=0; i<memoryNumbers.length; i++) {
            let display = '';
            let extraClass = '';
            if(matched[i]) {
                display = '✓';
                extraClass = 'flipped';
            } else if(flipped[i]) {
                display = memoryNumbers[i];
                extraClass = 'flipped';
            } else {
                display = '?';
            }
            html += `<div class="memory-card ${extraClass}" data-index="${i}">${display}</div>`;
        }
        html += `</div><div id="memoryMsg" class="message"></div>`;
        document.getElementById('gameArea').innerHTML = html;
        attachMemoryEvents();
    }

    function attachMemoryEvents() {
        const cards = document.querySelectorAll('.memory-card');
        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                if(lockBoard) return;
                let idx = parseInt(card.getAttribute('data-index'));
                if(matched[idx] || flipped[idx]) return;
                let alreadyFlippedIndex = flipped.findIndex((v,i)=> v===true && !matched[i]);
                if(alreadyFlippedIndex !== -1 && alreadyFlippedIndex !== idx) {
                    // مقارنة
                    if(memoryNumbers[alreadyFlippedIndex] === memoryNumbers[idx]) {
                        matched[alreadyFlippedIndex] = true;
                        matched[idx] = true;
                        flipped[alreadyFlippedIndex] = false;
                        flipped[idx] = false;
                        renderMemoryBoard();
                        if(matched.every(v=>v===true)) {
                            document.getElementById('memoryMsg').innerText = '🎉 رائع! لقد أنهيت اللعبة 🎉';
                        }
                    } else {
                        lockBoard = true;
                        flipped[idx] = true;
                        renderMemoryBoard();
                        setTimeout(() => {
                            flipped[alreadyFlippedIndex] = false;
                            flipped[idx] = false;
                            renderMemoryBoard();
                            lockBoard = false;
                        }, 800);
                    }
                } else {
                    flipped[idx] = true;
                    renderMemoryBoard();
                }
            });
        });
    }

    // لعبة تيك تاك تو
    let board = ['','','','','','','','',''];
    let turn = 'X';
    let gameOver = false;

    function loadTicTacToe() {
        board = ['','','','','','','','',''];
        turn = 'X';
        gameOver = false;
        renderTicTac();
    }

    function renderTicTac() {
        let html = `<h3>❌⭕ تيك تاك تو - دور ${turn}</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:300px; margin:auto;">`;
        for(let i=0; i<9; i++) {
            let val = board[i];
            html += `<button style="font-size:2rem; padding:20px; background:#ffb74d; border:none; border-radius:15px; cursor:pointer;" id="cell-${i}" onclick="makeMove(${i})">${val}</button>`;
        }
        html += `</div><div id="tictacMsg" class="message"></div><button onclick="loadTicTacToe()" style="margin-top:15px; background:#ff9800; border:none; padding:5px 15px; border-radius:20px;">إعادة اللعبة</button>`;
        document.getElementById('gameArea').innerHTML = html;
    }

    window.makeMove = function(idx) {
        if(gameOver) return;
        if(board[idx] !== '') return;
        board[idx] = turn;
        let winner = checkWinner();
        if(winner) {
            document.getElementById('tictacMsg').innerText = `🏆 الفائز: ${winner} 🏆`;
            gameOver = true;
            renderTicTac();
            return;
        }
        if(board.every(cell => cell !== '')) {
            document.getElementById('tictacMsg').innerText = '🤝 تعادل!';
            gameOver = true;
            renderTicTac();
            return;
        }
        turn = (turn === 'X') ? 'O' : 'X';
        renderTicTac();
    }

    function checkWinner() {
        const lines = [
            [0,1,2],[3,4,5],[6,7,8],
            [0,3,6],[1,4,7],[2,5,8],
            [0,4,8],[2,4,6]
        ];
        for(let line of lines) {
            const [a,b,c] = line;
            if(board[a] && board[a] === board[b] && board[a] === board[c]) {
                return board[a];
            }
        }
        return null;
    }

    // تحميل اللعبة الافتراضية
    showGame('guess');
</script>
</body>
</html>
