<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - دردشة صوتية وتبادل الصور</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 6px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10,10,30,0.85);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            overflow: hidden;
            height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px #ff00ff30;
            position: relative;
        }

        .content {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Login Section */
        .login-section {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ff44ff;
            margin-bottom: 15px;
        }
        
        .login-section h3 {
            color: white;
            margin-bottom: 15px;
        }
        
        .login-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }
        
        .login-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .vip-badge {
            background: #ff44ff;
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 15px;
            margin-left: 5px;
        }

        /* Chat Section */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
            margin-bottom: 10px;
        }
        
        .message {
            background: rgba(255,68,255,0.2);
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid #ff44ff;
        }
        
        .message-sender {
            color: #ff44ff;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .message-text {
            color: white;
            font-size: 0.8rem;
            margin-top: 3px;
        }
        
        .message-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }
        
        .message-audio {
            margin-top: 5px;
        }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .chat-input {
            flex: 1;
            padding: 8px;
            border-radius: 20px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
        }
        
        .send-btn, .image-btn, .audio-btn {
            background: #ff44ff;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        
        .call-section {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,68,255,0.1);
            border-radius: 15px;
            text-align: center;
        }
        
        .call-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        
        .incoming-call {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a0033;
            border: 2px solid #ff44ff;
            border-radius: 20px;
            padding: 15px;
            z-index: 1000;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
        
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
        }
        
        .upgrade-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 5px 12px;
            border-radius: 18px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }
        
        .music-btn {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.7rem;
            border: 1px solid #0ff;
        }
        
        .online-users {
            font-size: 0.7rem;
            color: #00ff88;
            margin-bottom: 5px;
        }
        
        .vip-only {
            background: rgba(255,68,255,0.3);
            border: 1px dashed #ff44ff;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        
        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h3>🎮 دخول إلى DidoGame 🎮</h3>
            <input type="text" id="loginName" class="login-input" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" class="login-input" placeholder="كلمة المرور">
            <button class="login-btn" onclick="login()">دخول / تسجيل</button>
            <div class="online-users" id="onlineUsers">👥 جاري التحميل...</div>
        </div>
        
        <!-- Chat Section (hidden until login) -->
        <div id="chatSection" class="chat-section hidden">
            <div class="online-users" id="chatOnlineUsers">👥 المتصلون: --</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" class="chat-input" placeholder="اكتب رسالة...">
                <button class="send-btn" onclick="sendMessage()">📤</button>
                <button class="image-btn" id="imageBtn" onclick="sendImage()">🖼️</button>
                <button class="audio-btn" id="audioBtn" onclick="startRecording()">🎙️</button>
            </div>
            
            <!-- VIP Call Section -->
            <div class="call-section" id="callSection">
                <div style="color:#ffaa88; font-size:0.7rem;">🔊 دردشة صوتية VIP</div>
                <div>
                    <select id="userToCall" class="chat-input" style="width:60%;">
                        <option value="">اختر مستخدم للاتصال...</option>
                    </select>
                    <button class="call-btn" onclick="startCall()">📞 اتصال</button>
                </div>
                <div id="callStatus" style="color:#ff44ff; font-size:0.6rem; margin-top:5px;"></div>
            </div>
        </div>
        
    </div>
    
    <div class="bottom-bar">
        <button class="upgrade-btn" id="upgradeBtn" onclick="upgradeToVIP()">👑 ترقية إلى VIP</button>
        <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 موسيقى</div>
    </div>
</div>

<!-- Incoming Call Popup -->
<div id="incomingCall" class="incoming-call hidden">
    <div id="callerName" style="color:white;">جاري الاتصال...</div>
    <button class="call-btn" onclick="answerCall()">📞 رد</button>
    <button class="call-btn" onclick="rejectCall()">❌ رفض</button>
</div>

<script>
    // ==================== Firebase Configuration ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDCy9FDf5P35lUzsMo1FKKNUt89ohFnZ1U",
        authDomain: "dido-game.firebaseapp.com",
        projectId: "dido-game",
        storageBucket: "dido-game.firebasestorage.app",
        messagingSenderId: "477701577179",
        appId: "1:477701577179:web:680b1b7ba758d72dfe6ffe",
        measurementId: "G-VCV8T2MZF9"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();

    // ==================== Global Variables ====================
    let currentUser = null;
    let isVIP = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let currentCall = null;
    let peerConnection = null;
    
    // WebRTC Configuration (with free STUN server)
    const configuration = {
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" }
        ]
    };
    
    let localStream = null;
    let remoteStream = null;
    
    // ==================== Authentication ====================
    function login() {
        const name = document.getElementById('loginName').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!name || !password) {
            alert("الرجاء إدخال اسم المستخدم وكلمة المرور");
            return;
        }
        
        // Sign in with email format (using name@dido.com)
        const email = name.toLowerCase().replace(/[^a-z0-9]/g, '') + '@didogame.com';
        
        auth.signInWithEmailAndPassword(email, password).then(() => {
            // User exists, login
            loadUserData(name);
        }).catch(() => {
            // User doesn't exist, create new
            auth.createUserWithEmailAndPassword(email, password).then(() => {
                // Save user to Firestore
                db.collection("users").doc(auth.currentUser.uid).set({
                    username: name,
                    isVIP: false,
                    createdAt: new Date()
                }).then(() => {
                    loadUserData(name);
                });
            }).catch(error => {
                alert("خطأ: " + error.message);
            });
        });
    }
    
    function loadUserData(username) {
        const uid = auth.currentUser.uid;
        db.collection("users").doc(uid).get().then(doc => {
            if (doc.exists) {
                currentUser = {
                    uid: uid,
                    username: doc.data().username,
                    isVIP: doc.data().isVIP || false
                };
                isVIP = currentUser.isVIP;
                
                // Update UI
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('chatSection').classList.remove('hidden');
                
                // Update VIP features visibility
                updateVIPFeatures();
                
                // Update online status
                updateOnlineStatus(true);
                
                // Load messages
                loadMessages();
                
                // Listen for users
                listenForUsers();
                
                // Listen for calls
                listenForCalls();
            }
        });
    }
    
    function updateVIPFeatures() {
        const imageBtn = document.getElementById('imageBtn');
        const audioBtn = document.getElementById('audioBtn');
        const callSection = document.getElementById('callSection');
        
        if (isVIP) {
            imageBtn.style.display = 'block';
            audioBtn.style.display = 'block';
            callSection.style.display = 'block';
            document.getElementById('upgradeBtn').innerHTML = '👑 VIP مفعل';
            document.getElementById('upgradeBtn').style.opacity = '0.7';
        } else {
            imageBtn.style.display = 'none';
            audioBtn.style.display = 'none';
            callSection.style.display = 'none';
            document.getElementById('upgradeBtn').innerHTML = '⭐ ترقية إلى VIP (صور + صوت) ⭐';
        }
    }
    
    function upgradeToVIP() {
        if (!currentUser) return;
        if (isVIP) {
            alert("أنت بالفعل عضو VIP!");
            return;
        }
        
        // In a real app, this would be a payment process
        const confirm = window.confirm("⚠️ ترقية إلى VIP - رسوم 9.99$ شهرياً\n\nالمميزات:\n✅ إرسال الصور\n✅ تسجيل وإرسال الصوت\n✅ المكالمات الصوتية المباشرة\n\nهل تريد الترقية؟");
        
        if (confirm) {
            db.collection("users").doc(currentUser.uid).update({
                isVIP: true
            }).then(() => {
                isVIP = true;
                currentUser.isVIP = true;
                updateVIPFeatures();
                alert("🎉 تهانينا! أصبحت عضواً مميزاً 🎉\n\nيمكنك الآن إرسال الصور والتسجيلات الصوتية وإجراء المكالمات!");
            });
        }
    }
    
    function updateOnlineStatus(isOnline) {
        if (!currentUser) return;
        db.collection("users").doc(currentUser.uid).update({
            online: isOnline,
            lastSeen: new Date()
        });
    }
    
    // ==================== Messaging ====================
    function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text && !imageFile) return;
        
        db.collection("messages").add({
            userId: currentUser.uid,
            username: currentUser.username,
            text: text,
            isVIP: isVIP,
            timestamp: new Date()
        });
        
        document.getElementById('messageInput').value = '';
    }
    
    function sendImage() {
        if (!isVIP) {
            alert("❌ إرسال الصور متاح فقط للمستخدمين المميزين (VIP)!\nقم بترقية حسابك لإرسال الصور.");
            return;
        }
        
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const storageRef = storage.ref(`images/${Date.now()}_${file.name}`);
                const uploadTask = await storageRef.put(file);
                const imageUrl = await storageRef.getDownloadURL();
                
                db.collection("messages").add({
                    userId: currentUser.uid,
                    username: currentUser.username,
                    imageUrl: imageUrl,
                    isVIP: isVIP,
                    timestamp: new Date()
                });
            }
        };
        input.click();
    }
    
    // ==================== Voice Recording (VIP only) ====================
    async function startRecording() {
        if (!isVIP) {
            alert("❌ التسجيل الصوتي متاح فقط للمستخدمين المميزين (VIP)!");
            return;
        }
        
        if (isRecording) {
            // Stop recording
            if (mediaRecorder) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('audioBtn').innerHTML = '🎙️';
            }
        } else {
            // Start recording
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const storageRef = storage.ref(`audio/${Date.now()}.webm`);
                await storageRef.put(audioBlob);
                const audioUrl = await storageRef.getDownloadURL();
                
                db.collection("messages").add({
                    userId: currentUser.uid,
                    username: currentUser.username,
                    audioUrl: audioUrl,
                    isVIP: isVIP,
                    timestamp: new Date()
                });
                
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('audioBtn').innerHTML = '⏹️';
            
            setTimeout(() => {
                if (isRecording) {
                    mediaRecorder.stop();
                    isRecording = false;
                    document.getElementById('audioBtn').innerHTML = '🎙️';
                }
            }, 15000); // Auto stop after 15 seconds
        }
    }
    
    function loadMessages() {
        db.collection("messages").orderBy("timestamp").limit(100).onSnapshot(snapshot => {
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = '';
            
            snapshot.forEach(doc => {
                const data = doc.data();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                
                const senderSpan = document.createElement('div');
                senderSpan.className = 'message-sender';
                senderSpan.innerHTML = data.username + (data.isVIP ? ' <span class="vip-badge">VIP</span>' : '');
                
                messageDiv.appendChild(senderSpan);
                
                if (data.text) {
                    const textSpan = document.createElement('div');
                    textSpan.className = 'message-text';
                    textSpan.textContent = data.text;
                    messageDiv.appendChild(textSpan);
                }
                
                if (data.imageUrl) {
                    const img = document.createElement('img');
                    img.src = data.imageUrl;
                    img.className = 'message-image';
                    messageDiv.appendChild(img);
                }
                
                if (data.audioUrl) {
                    const audio = document.createElement('audio');
                    audio.src = data.audioUrl;
                    audio.controls = true;
                    audio.className = 'message-audio';
                    messageDiv.appendChild(audio);
                }
                
                messagesDiv.appendChild(messageDiv);
            });
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
    }
    
    // ==================== Users List ====================
    function listenForUsers() {
        db.collection("users").onSnapshot(snapshot => {
            const users = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.online && doc.id !== currentUser?.uid) {
                    users.push({ uid: doc.id, username: data.username, isVIP: data.isVIP });
                }
            });
            
            const select = document.getElementById('userToCall');
            select.innerHTML = '<option value="">اختر مستخدم للاتصال...</option>';
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user.uid;
                option.textContent = user.username + (user.isVIP ? ' (VIP)' : '');
                select.appendChild(option);
            });
            
            document.getElementById('chatOnlineUsers').innerHTML = `👥 المتصلون: ${users.length + 1}`;
        });
    }
    
    // ==================== WebRTC Voice Call (VIP only) ====================
    async function startCall() {
        if (!isVIP) {
            alert("❌ المكالمات الصوتية متاحة فقط للمستخدمين المميزين (VIP)!");
            return;
        }
        
        const targetUserId = document.getElementById('userToCall').value;
        if (!targetUserId) {
            alert("الرجاء اختيار مستخدم للاتصال به");
            return;
        }
        
        document.getElementById('callStatus').innerHTML = "📞 جاري الاتصال...";
        
        // Get target user data
        const targetDoc = await db.collection("users").doc(targetUserId).get();
        const targetUser = targetDoc.data();
        
        if (!targetUser.online) {
            alert("المستخدم غير متصل حالياً");
            document.getElementById('callStatus').innerHTML = "";
            return;
        }
        
        // Create call offer
        const callId = Date.now().toString();
        await db.collection("calls").doc(callId).set({
            from: currentUser.uid,
            fromName: currentUser.username,
            to: targetUserId,
            status: "calling",
            timestamp: new Date()
        });
        
        // Listen for answer
        db.collection("calls").doc(callId).onSnapshot(async (doc) => {
            const data = doc.data();
            if (data && data.status === "answered") {
                document.getElementById('callStatus').innerHTML = "📞 متصل... اضغط إنهاء لإغلاق المكالمة";
                // In a full implementation, we would establish WebRTC peer connection here
                // For demo, we'll show a simulated call
                simulateCall(targetUser.username);
            }
        });
    }
    
    function listenForCalls() {
        if (!currentUser) return;
        
        db.collection("calls").where("to", "==", currentUser.uid).where("status", "==", "calling").onSnapshot(snapshot => {
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.status === "calling") {
                    document.getElementById('callerName').innerHTML = `📞 مكالمة واردة من ${data.fromName}`;
                    document.getElementById('incomingCall').classList.remove('hidden');
                    window.currentCallId = doc.id;
                    window.currentCallerId = data.from;
                }
            });
        });
    }
    
    function answerCall() {
        const callId = window.currentCallId;
        db.collection("calls").doc(callId).update({
            status: "answered"
        });
        document.getElementById('incomingCall').classList.add('hidden');
        document.getElementById('callStatus').innerHTML = "📞 جاري الاتصال...";
        
        // Simulate call
        setTimeout(() => {
            document.getElementById('callStatus').innerHTML = "📞 متصل... اضغط إنهاء لإغلاق المكالمة";
        }, 2000);
    }
    
    function rejectCall() {
        const callId = window.currentCallId;
        db.collection("calls").doc(callId).update({
            status: "rejected"
        });
        document.getElementById('incomingCall').classList.add('hidden');
        document.getElementById('callStatus').innerHTML = "";
    }
    
    function simulateCall(username) {
        // Simulate an incoming call UI
        const callDiv = document.createElement('div');
        callDiv.style.position = 'fixed';
        callDiv.style.bottom = '100px';
        callDiv.style.left = '50%';
        callDiv.style.transform = 'translateX(-50%)';
        callDiv.style.backgroundColor = '#1a0033';
        callDiv.style.border = '2px solid #ff44ff';
        callDiv.style.borderRadius = '20px';
        callDiv.style.padding = '15px';
        callDiv.style.zIndex = '2000';
        callDiv.style.textAlign = 'center';
        callDiv.innerHTML = `
            <div style="color:white;">🔊 مكالمة صوتية مع ${username}</div>
            <button onclick="this.parentElement.remove()" style="background:#ff3366; border:none; padding:5px 15px; border-radius:20px; margin-top:10px; color:white;">❌ إنهاء المكالمة</button>
        `;
        document.body.appendChild(callDiv);
        
        document.getElementById('callStatus').innerHTML = "";
    }
    
    // ==================== Music ====================
    let musicPlaying = false;
    let music = null;
    
    function toggleMusic() {
        if (!music) {
            music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
            music.loop = true;
            music.volume = 0.5;
        }
        
        if (musicPlaying) {
            music.pause();
            document.getElementById('musicBtn').innerHTML = '🎵 موسيقى';
        } else {
            music.play();
            document.getElementById('musicBtn').innerHTML = '🔇 إيقاف';
        }
        musicPlaying = !musicPlaying;
    }
    
    // ==================== Cleanup on page close ====================
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            updateOnlineStatus(false);
        }
    });
</script>
</body>
</html>
