<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame | منصة الألعاب المتكاملة - أكثر من 120 لعبة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo','Tajawal',sans-serif}
        body{background:linear-gradient(135deg,#0a0a1a,#0f0f2a,#0a0a1a);min-height:100vh;padding:12px;position:relative}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');background-size:cover;background-position:center;opacity:0.06;z-index:-2;animation:slowDrift 30s infinite alternate}
        @keyframes slowDrift{0%{transform:scale(1)}100%{transform:scale(1.05)}}
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none}
        .particle{position:absolute;background:radial-gradient(circle,rgba(255,68,255,0.6),rgba(0,255,255,0.2));border-radius:50%;animation:floatParticle linear infinite}
        @keyframes floatParticle{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:0.8}90%{opacity:0.8}100%{transform:translateY(-20vh) rotate(360deg);opacity:0}}
        .app{max-width:550px;width:100%;margin:0 auto;background:linear-gradient(145deg,rgba(10,10,30,0.92),rgba(15,15,40,0.88));backdrop-filter:blur(20px);border-radius:35px;overflow:hidden;height:96vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 2px rgba(255,68,255,0.2),0 0 30px rgba(255,68,255,0.3);border:1px solid rgba(255,68,255,0.4)}
        .glow-header{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#ff44ff,#00ffff,#ff44ff,transparent);animation:headerGlow 3s infinite;z-index:10}
        @keyframes headerGlow{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        .content{padding:12px;flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#ff44ff #1a1a2e}
        .content::-webkit-scrollbar{width:4px}
        .content::-webkit-scrollbar-track{background:#1a1a2e;border-radius:10px}
        .content::-webkit-scrollbar-thumb{background:#ff44ff;border-radius:10px}
        .page{display:flex;flex-direction:column;height:100%;flex:1;animation:fadeInPage 0.4s ease}
        @keyframes fadeInPage{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .page-hidden{display:none}
        .anime-hero{background:linear-gradient(135deg,rgba(255,68,255,0.15),rgba(0,255,255,0.1));border-radius:25px;padding:18px;margin-bottom:15px;display:flex;align-items:center;gap:18px;border:1px solid rgba(255,68,255,0.4);box-shadow:0 8px 25px rgba(0,0,0,0.2);transition:all 0.3s ease}
        .anime-hero:hover{transform:translateY(-2px);border-color:#ff44ff;box-shadow:0 0 25px rgba(255,68,255,0.3)}
        .character-img{width:100px;height:100px;background:linear-gradient(135deg,#ff44ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;box-shadow:0 0 20px rgba(255,68,255,0.5);transition:transform 0.3s ease}
        .character-img:hover{transform:scale(1.05)}
        .controller-on-hand{position:absolute;bottom:-5px;right:-5px;background:linear-gradient(135deg,#ff44ff,#00ffff);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:2px solid white;animation:bounce 1s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
        .tshirt-text{background:linear-gradient(135deg,#ff3366,#ff44ff,#00ffff);padding:6px 16px;border-radius:30px;color:white;font-size:0.7rem;font-weight:bold;display:inline-block}
        .character-info h2{background:linear-gradient(135deg,#ffff00,#ff44ff,#00ffff);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:0.9rem;margin-top:8px}
        .ranking-section{margin-top:10px;margin-bottom:15px;text-align:center;background:rgba(0,0,0,0.3);border-radius:30px;padding:12px}
        .ranking-title{color:#ffcc00;font-size:0.7rem;margin-bottom:10px}
        .ranking-circles{display:flex;justify-content:center;align-items:flex-end;gap:25px;flex-wrap:wrap}
        .rank-item{text-align:center;transition:transform 0.3s ease}
        .rank-item:hover{transform:translateY(-5px)}
        .gold-circle{width:65px;height:65px;background:linear-gradient(145deg,#ffd700,#ffaa00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:8px;border:2px solid #ffd700;box-shadow:0 0 25px #ffd700;animation:goldPulse 2s infinite}
        @keyframes goldPulse{0%,100%{box-shadow:0 0 15px #ffd700}50%{box-shadow:0 0 35px #ffd700}}
        .silver-circle{width:55px;height:55px;background:linear-gradient(145deg,#c0c0c0,#a0a0a0);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:6px;border:2px solid #c0c0c0;box-shadow:0 0 15px #c0c0c0}
        .bronze-circle{width:55px;height:55px;background:linear-gradient(145deg,#cd7f32,#b8651a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:6px;border:2px solid #cd7f32;box-shadow:0 0 15px #cd7f32}
        .rank-name{color:white;font-size:0.6rem;font-weight:bold}
        .rank-points{color:#ffcc00;font-size:0.5rem}
        .categories-section{margin-bottom:15px}
        .categories{display:flex;flex-wrap:nowrap;gap:8px;overflow-x:auto;padding:6px 2px 10px;scrollbar-width:thin}
        .categories::-webkit-scrollbar{height:3px}
        .cat-badge{background:linear-gradient(135deg,rgba(255,68,255,0.2),rgba(0,255,255,0.1));border:1px solid rgba(255,68,255,0.5);padding:6px 16px;border-radius:30px;color:white;font-size:0.7rem;cursor:pointer;transition:all 0.3s ease;white-space:nowrap}
        .cat-badge:hover{background:linear-gradient(135deg,rgba(255,68,255,0.5),rgba(0,255,255,0.3));transform:translateY(-2px);box-shadow:0 5px 15px rgba(255,68,255,0.3)}
        .more-btn{background:linear-gradient(135deg,#ff44ff,#00ffff);border:none;padding:6px 16px;border-radius:30px;color:white;font-size:0.7rem;cursor:pointer;font-weight:bold;white-space:nowrap}
        .more-btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff44ff}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:1500;display:none;align-items:center;justify-content:center;animation:fadeInModal 0.3s ease}
        @keyframes fadeInModal{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1;backdrop-filter:blur(20px)}}
        .modal-card{background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border-radius:35px;padding:25px;width:90%;max-width:380px;border:2px solid #ff44ff;box-shadow:0 0 60px rgba(255,68,255,0.4);text-align:center;animation:modalPop 0.3s cubic-bezier(0.34,1.2,0.64,1)}
        @keyframes modalPop{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
        .games-wrapper{display:flex;flex-direction:column;gap:15px;padding-bottom:10px}
        .game-row{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding:5px 2px 12px;scrollbar-width:thin}
        .game-row::-webkit-scrollbar{height:4px}
        .game-card{min-width:calc(25% - 9px);width:calc(25% - 9px);background:linear-gradient(145deg,#0f0f2a,#0a0a1a);border-radius:18px;padding:10px 8px;text-align:center;border:1px solid rgba(255,68,255,0.3);cursor:pointer;transition:all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);scroll-snap-align:start;position:relative}
        .game-card:hover{transform:translateY(-8px) scale(1.02);border-color:#00ffff;box-shadow:0 15px 30px rgba(0,255,255,0.2)}
        .fav-star{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:0.9rem;cursor:pointer;z-index:10;backdrop-filter:blur(5px)}
        .fav-star:hover{transform:scale(1.1)}
        .fav-star.active{color:#ffcc00;text-shadow:0 0 8px #ffcc00}
        .game-img{width:100%;aspect-ratio:1/0.9;background-size:cover;background-position:center;border-radius:14px;margin-bottom:8px;transition:transform 0.3s ease}
        .game-card:hover .game-img{transform:scale(1.02)}
        .game-title{color:white;font-size:0.6rem;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .bottom-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;background:rgba(8,8,20,0.98);backdrop-filter:blur(20px);border-top:1px solid rgba(255,68,255,0.3);border-radius:0 0 30px 30px;position:relative}
        .bottom-bar::before{content:'';position:absolute;top:-2px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,#ff44ff,#00ffff,#ff44ff,transparent);border-radius:2px}
        .bottom-right,.bottom-left{display:flex;gap:12px;align-items:center}
        .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;transition:all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);padding:6px 12px;border-radius:25px;position:relative}
        .nav-btn::before{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%) scaleX(0);width:25px;height:2px;background:linear-gradient(90deg,#ff44ff,#00ffff);border-radius:2px;transition:transform 0.3s ease}
        .nav-btn:hover::before{transform:translateX(-50%) scaleX(1)}
        .nav-btn:hover{transform:translateY(-3px)}
        .nav-btn .icon{font-size:1.3rem;transition:all 0.3s ease}
        .nav-btn .label{font-size:0.55rem;color:#aaa;font-weight:600;transition:all 0.3s ease}
        .nav-btn:hover .icon{transform:scale(1.15)}
        .nav-btn:hover .label{color:#ff44ff}
        .wallet-btn .icon{color:#ffd700}
        .vip-btn .icon{color:#ff44ff}
        .settings-btn .icon{color:#00ffff}
        .favs-btn .icon{color:#ffcc00}
        .chat-center-btn{background:linear-gradient(135deg,#ff44ff,#ff00aa);border-radius:40px;padding:6px 20px;box-shadow:0 0 20px rgba(255,68,255,0.4)}
        .chat-center-btn .icon,.chat-center-btn .label{color:white}
        .vip-btn.active{background:linear-gradient(135deg,rgba(255,68,255,0.4),rgba(0,255,255,0.4));border:1px solid #ff44ff;border-radius:40px;box-shadow:0 0 15px rgba(255,68,255,0.5)}
        .settings-btn,.favs-btn,.wallet-btn,.vip-btn{background:linear-gradient(135deg,rgba(255,68,255,0.15),rgba(0,255,255,0.05));border-radius:40px;padding:6px 16px;border:1px solid rgba(255,68,255,0.5);box-shadow:0 0 12px rgba(255,68,255,0.4);transition:all 0.3s ease;animation:btnNeonPulse 1.5s infinite}
        @keyframes btnNeonPulse{0%,100%{box-shadow:0 0 10px rgba(255,68,255,0.4);border-color:rgba(255,68,255,0.5)}50%{box-shadow:0 0 25px rgba(255,68,255,0.8);border-color:#ff44ff}}
        .chat-popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeInPopup 0.3s ease}
        @keyframes fadeInPopup{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1;backdrop-filter:blur(15px)}}
        .chat-popup-container{position:relative;width:95%;max-width:520px;height:85%;max-height:700px;animation:zoomInPopup 0.3s cubic-bezier(0.34,1.2,0.64,1)}
        @keyframes zoomInPopup{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
        .close-chat-popup{position:absolute;top:-15px;right:-15px;width:40px;height:40px;background:linear-gradient(135deg,#ff3366,#ff44ff);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem;cursor:pointer;border:2px solid white;z-index:2010;transition:all 0.2s ease;box-shadow:0 0 15px rgba(255,51,102,0.5)}
        .close-chat-popup:hover{transform:scale(1.1);box-shadow:0 0 25px rgba(255,51,102,0.8)}
        .chat-page{width:100%;height:100%;background:linear-gradient(145deg,#0a0a1a,#0f0f2a);display:flex;flex-direction:column;border-radius:30px;border:2px solid #ff44ff;box-shadow:0 0 50px rgba(255,68,255,0.5);overflow:hidden}
        .messenger-full{display:flex;flex-direction:column;height:100%;background:#0a0a1a}
        .messenger-header{padding:12px 16px;background:linear-gradient(135deg,#0f0f2a,#0a0a1a);border-bottom:1px solid rgba(255,68,255,0.3);display:flex;align-items:center;justify-content:space-between}
        .back-btn{background:rgba(255,68,255,0.2);border:none;color:#ff44ff;font-size:1.2rem;cursor:pointer;width:36px;height:36px;border-radius:50%;transition:all 0.2s}
        .back-btn:hover{background:rgba(255,68,255,0.4);transform:scale(1.05)}
        .chats-list{flex:1;overflow-y:auto;padding:8px 0}
        .chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #1f1f2e;transition:background 0.2s}
        .chat-item:hover{background:#1f1f2e}
        .chat-avatar{width:50px;height:50px;background:linear-gradient(135deg,#ff44ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
        .chat-info{flex:1}
        .chat-name{color:white;font-size:0.9rem;font-weight:600}
        .messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
        .message-row{display:flex;width:100%}
        .message-row.outgoing{justify-content:flex-end}
        .message-row.incoming{justify-content:flex-start}
        .message-bubble{max-width:75%;padding:8px 12px;border-radius:18px;font-size:0.8rem;word-break:break-word}
        .message-bubble.outgoing{background:#0084ff;color:white;border-bottom-right-radius:4px}
        .message-bubble.incoming{background:#1f1f2e;color:white;border-bottom-left-radius:4px}
        .message-time{font-size:0.4rem;color:rgba(255,255,255,0.5);margin-top:3px;text-align:right}
        .message-input-area{padding:12px;background:#0a0a1a;border-top:1px solid #2c2c3a}
        .input-wrapper{display:flex;gap:10px;align-items:center}
        .message-input{flex:1;padding:10px 14px;border-radius:25px;border:none;background:#1f1f2e;color:white;font-size:0.85rem}
        .message-input:focus{outline:none;background:#2a2a3e}
        .mic-btn,.send-btn{background:rgba(255,68,255,0.2);border:none;color:#ff44ff;font-size:1.1rem;cursor:pointer;width:36px;height:36px;border-radius:50%;transition:all 0.2s}
        .mic-btn:hover,.send-btn:hover{background:rgba(255,68,255,0.4);transform:scale(1.05)}
        .game-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000dd;backdrop-filter:blur(10px);z-index:2200;display:none;align-items:center;justify-content:center}
        .game-modal iframe{width:95%;height:85%;border-radius:20px;border:3px solid #ff44ff;box-shadow:0 0 50px rgba(255,68,255,0.5)}
        .close-modal{position:absolute;top:20px;right:20px;background:#ff3366;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;font-size:1.2rem;transition:all 0.2s}
        .close-modal:hover{transform:scale(1.1);background:#ff5555}
        .hidden{display:none!important}
        .fixed-permanent-ad{background:linear-gradient(135deg,rgba(255,68,255,0.2),rgba(0,255,255,0.2));border:1px solid #ff44ff;border-radius:20px;padding:12px;margin:10px 0;text-align:center;color:white;font-size:0.8rem;font-weight:bold;animation:adPulse 2s infinite;cursor:pointer}
        @keyframes adPulse{0%,100%{box-shadow:0 0 5px #ff44ff;border-color:#ff44ff}50%{box-shadow:0 0 20px #ff44ff,0 0 10px #00ffff;border-color:#00ffff}}
        .back-btn-custom{background:rgba(255,68,255,0.2);border:1px solid #ff44ff;padding:8px 16px;border-radius:25px;color:white;font-size:0.8rem;cursor:pointer;margin-bottom:12px;transition:all 0.2s;width:fit-content}
        .back-btn-custom:hover{background:rgba(255,68,255,0.4);transform:translateX(-3px)}
        .security-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(145deg,#1a1a2e,#0f0f1a);border-radius:35px;padding:30px;width:90%;max-width:400px;border:2px solid #ff44ff;box-shadow:0 0 60px rgba(255,68,255,0.4);z-index:2300;display:none;flex-direction:column;gap:15px;animation:modalPop 0.3s ease}
        .security-input{width:100%;padding:14px;border-radius:30px;border:1px solid rgba(255,68,255,0.5);background:rgba(0,0,0,0.5);color:white;font-size:0.9rem}
        .security-input:focus{outline:none;border-color:#00ffff;box-shadow:0 0 15px rgba(0,255,255,0.3)}
        .security-btn{background:linear-gradient(135deg,#ff44ff,#00ffff);border:none;padding:14px;border-radius:30px;color:white;font-size:1rem;font-weight:bold;cursor:pointer;transition:transform 0.2s}
        .security-btn:hover{transform:scale(1.02)}
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="app">
    <div class="glow-header"></div>
    <div class="content">
        <div id="homePage" class="page">
            <div class="anime-hero"><div class="character-img" id="mainAvatarImg"><div class="controller-on-hand">🎮</div>😎</div><div class="character-info"><div class="tshirt-text">⚡ DIDO-GAME ⚡</div><h2>😤 تحدّي النيون! أكثر من 120 لعبة</h2></div></div>
            <div class="ranking-section"><div class="ranking-title">🏆 أفضل اللاعبين 🏆</div><div class="ranking-circles" id="rankingList"></div></div>
            <div class="categories-section"><div class="categories" id="categoriesList"><div class="more-btn" id="moreCategoriesBtn">➕ المزيد</div><div class="cat-badge" data-cat="action">🎯 أكشن</div><div class="cat-badge" data-cat="racing">🏎️ سباقات</div><div class="cat-badge" data-cat="fighting">🥊 قتال</div><div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div></div></div>
            <div class="fixed-permanent-ad" id="permanentAd">🎮 أكثر من 120 لعبة جاهزة للعب! اختر لعبتك المفضلة 🎮</div>
            <div class="games-wrapper" id="gamesWrapper"></div>
        </div>
        <div id="categoryPage" class="page page-hidden"><div class="back-btn-custom" id="backToHomeBtn">🔙 رجوع</div><div class="games-wrapper" id="categoryGamesContainer"></div></div>
    </div>
    <div class="bottom-bar"><div class="bottom-right"><button class="nav-btn wallet-btn" id="walletBtn"><span class="icon">💳</span><span class="label">المحفظة</span></button><button class="nav-btn vip-btn" id="registerBtn"><span class="icon">👑</span><span class="label">VIP</span></button></div><button class="nav-btn chat-center-btn" id="openChatBtn"><span class="icon">💬</span><span class="label">الدردشة</span></button><div class="bottom-left"><button class="nav-btn settings-btn" id="settingsBtn"><span class="icon">⚙️</span><span class="label">الإعدادات</span></button><button class="nav-btn favs-btn" id="favoritesBtn"><span class="icon">⭐</span><span class="label">المفضلة</span></button></div></div>
</div>
<div id="chatPopupOverlay" class="chat-popup-overlay"><div class="chat-popup-container"><div class="close-chat-popup" id="closeChatPopupBtn">✕</div><div id="chatPage" class="chat-page"><div class="messenger-full"><div id="inboxView" style="display:flex;flex-direction:column;height:100%"><div class="messenger-header"><div class="header-left"><button class="back-btn" id="closeChatFromInbox">✕</button><h2>المحادثات</h2></div><div><span id="newChatBtn" style="cursor:pointer">✏️</span></div></div><div class="chats-list" id="chatsListContainer"></div></div><div id="openChatView" style="display:none;flex-direction:column;height:100%"><div style="padding:12px;display:flex;align-items:center;gap:12px"><button class="back-btn" id="backToInboxBtn">←</button><div style="flex:1"><div style="color:white;font-weight:bold" id="openChatRoomName">الغرفة</div><div style="color:#00ff88;font-size:0.6rem" id="openChatStatus">🟢 متصل</div></div><span id="videoCallBtn" style="display:none">🎥</span></div><div class="messages-area" id="openChatMessages"></div><div class="message-input-area"><div class="input-wrapper"><input type="text" id="openMessageInput" class="message-input" placeholder="اكتب رسالة..."><button class="mic-btn" id="micBtnOpen">🎙️</button><button class="send-btn" id="sendMsgOpen">📤</button></div></div></div></div></div></div></div>
<div id="securityPanel" class="security-panel"><h2 style="color:white;text-align:center">🔐 الأمان والدخول</h2><input type="text" id="securityUsername" class="security-input" placeholder="👤 اسم المستخدم" value="Ahmed"><input type="password" id="securityRoomPassword" class="security-input" placeholder="🔒 كلمة مرور الغرفة (اختياري)"><input type="text" id="securityRoomName" class="security-input" placeholder="🏠 اسم الغرفة" value="الغرفة الرئيسية"><button class="security-btn" id="securityBtn">🚪 دخول إلى الدردشة</button></div>
<div id="gameModal" class="game-modal"><div class="close-modal" onclick="closeGameModal()">✕</div><iframe id="gameIframe" src="" allow="fullscreen; autoplay"></iframe></div>
<script>
let favorites=JSON.parse(localStorage.getItem('didogame_favorites')||'[]');
let isVIP=false;
let currentUser=null;
let currentOpenRoom=null;

function updateRanking(){let s=[...gamesData].sort((a,b)=>b.points-a.points);document.getElementById('rankingList').innerHTML=`<div class="rank-item"><div class="silver-circle">${s[1]?.playerName?.charAt(0)||'👤'}</div><div class="rank-name">${s[1]?.playerName||'---'}</div><div class="rank-points">⭐${s[1]?.points||0}</div></div><div class="rank-item"><div class="gold-circle">${s[0]?.playerName?.charAt(0)||'👑'}</div><div class="rank-name">${s[0]?.playerName||'---'}</div><div class="rank-points">⭐${s[0]?.points||0}</div></div><div class="rank-item"><div class="bronze-circle">${s[2]?.playerName?.charAt(0)||'👤'}</div><div class="rank-name">${s[2]?.playerName||'---'}</div><div class="rank-points">⭐${s[2]?.points||0}</div></div>`;}

function renderAllGames(){let mid=Math.ceil(gamesData.length/2);let row1=gamesData.slice(0,mid);let row2=gamesData.slice(mid);document.getElementById('gamesWrapper').innerHTML=`<div class="game-row">${row1.map(g=>`<div class="game-card" onclick="playGame(${g.id})"><div class="fav-star ${isFavorite(g.id)?'active':''}" onclick="event.stopPropagation();toggleFavorite(${g.id})">${isFavorite(g.id)?'⭐':'☆'}</div><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div><div class="game-row">${row2.map(g=>`<div class="game-card" onclick="playGame(${g.id})"><div class="fav-star ${isFavorite(g.id)?'active':''}" onclick="event.stopPropagation();toggleFavorite(${g.id})">${isFavorite(g.id)?'⭐':'☆'}</div><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>`;}

function playGame(gameId){let g=gamesData.find(g=>g.id===gameId);if(g){g.points+=5;updateRanking();document.getElementById('gameIframe').src=g.url;document.getElementById('gameModal').style.display='flex';localStorage.setItem('didogame_games',JSON.stringify(gamesData));}}
function closeGameModal(){document.getElementById('gameModal').style.display='none';document.getElementById('gameIframe').src='';}
function showCategoryGames(category){let f=gamesData.filter(g=>g.cat===category);let mid=Math.ceil(f.length/2);let row1=f.slice(0,mid);let row2=f.slice(mid);document.getElementById('categoryGamesContainer').innerHTML=`<div class="game-row">${row1.map(g=>`<div class="game-card" onclick="playGame(${g.id})"><div class="fav-star ${isFavorite(g.id)?'active':''}" onclick="event.stopPropagation();toggleFavorite(${g.id})">${isFavorite(g.id)?'⭐':'☆'}</div><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div><div class="game-row">${row2.map(g=>`<div class="game-card" onclick="playGame(${g.id})"><div class="fav-star ${isFavorite(g.id)?'active':''}" onclick="event.stopPropagation();toggleFavorite(${g.id})">${isFavorite(g.id)?'⭐':'☆'}</div><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>`;document.getElementById('homePage').classList.add('page-hidden');document.getElementById('categoryPage').classList.remove('page-hidden');}
function renderFavoritesList(){let fav=gamesData.filter(g=>favorites.includes(g.id));let c=document.getElementById('favoritesList');if(!c)return;if(fav.length===0){c.innerHTML='<div style="color:#888;text-align:center;padding:40px;">⭐ لا توجد ألعاب مفضلة بعد</div>';return;}c.innerHTML=fav.map(g=>`<div onclick="playGame(${g.id})" style="display:flex;align-items:center;gap:12px;padding:10px;background:rgba(0,0,0,0.5);border-radius:15px;margin-bottom:8px;cursor:pointer;"><div style="width:50px;height:50px;background-image:url('${g.img}');background-size:cover;border-radius:10px;"></div><div style="flex:1;"><div style="color:white;">${g.name}</div><div style="color:#ff44ff;font-size:0.6rem;">${g.cat}</div></div><button onclick="event.stopPropagation();toggleFavorite(${g.id})" style="background:none;border:none;color:#ff3366;font-size:1.2rem;cursor:pointer;">🗑️</button></div>`).join('');}
function encryptMessage(t){return btoa(unescape(encodeURIComponent(t)));}
function decryptMessage(e){try{return decodeURIComponent(escape(atob(e)));}catch(e){return"رسالة مشفرة";}}
function saveRooms(){localStorage.setItem('didogame_rooms',JSON.stringify(allRooms));}
function loadRooms(){let d=localStorage.getItem('didogame_rooms');if(d)allRooms=JSON.parse(d);else allRooms={};}
function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
function renderChatsList(){let c=document.getElementById('chatsListContainer');let r=Object.keys(allRooms);if(r.length===0){c.innerHTML='<div style="color:#888;text-align:center;padding:40px;">📭 لا توجد محادثات<br>➕ أنشئ محادثة جديدة</div>';return;}c.innerHTML=r.map(room=>`<div class="chat-item" onclick="openRoomChat('${room.replace(/'/g,"\\'")}')"><div class="chat-avatar">💬</div><div class="chat-info"><div class="chat-name">${escapeHtml(room)}${allRooms[room].password?' 🔒':''}</div></div></div>`).join('');}
function openRoomChat(roomName){if(allRooms[roomName]?.password&&allRooms[roomName].password!==securityPassword){alert("❌ كلمة مرور الغرفة غير صحيحة!");return;}currentOpenRoom=roomName;document.getElementById('inboxView').style.display='none';document.getElementById('openChatView').style.display='flex';document.getElementById('openChatRoomName').innerHTML=escapeHtml(currentOpenRoom);displayMessagesInOpenChat();}
function displayMessagesInOpenChat(){let c=document.getElementById('openChatMessages');if(!currentOpenRoom||!allRooms[currentOpenRoom]){c.innerHTML='<div style="color:#888;text-align:center;padding:20px;">✨ اختر محادثة لبدء المراسلة</div>';return;}let m=allRooms[currentOpenRoom].messages||[];if(m.length===0){c.innerHTML='<div style="color:#888;text-align:center;padding:20px;">💬 لا توجد رسائل بعد<br>✨ اكتب أول رسالة</div>';return;}c.innerHTML='';m.slice(-50).forEach(msg=>{let isOut=msg.sender===currentUser;let txt=msg.encrypted?decryptMessage(msg.text):msg.text;c.innerHTML+=`<div style="display:flex;justify-content:${isOut?'flex-end':'flex-start'};margin-bottom:8px;"><div style="max-width:75%;background:${isOut?'#ff44ff':'#1f1f2e'};padding:8px 14px;border-radius:20px;"><div style="color:white;font-size:0.8rem;">${escapeHtml(txt)}</div><div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div></div></div>`;});c.scrollTop=c.scrollHeight;}
function sendMessageOpen(){let i=document.getElementById('openMessageInput');let t=i.value.trim();if(!t||!currentOpenRoom||!currentUser)return;let msg={type:'public',sender:currentUser,text:encryptMessage(t),encrypted:true,time:Date.now()};if(!allRooms[currentOpenRoom].messages)allRooms[currentOpenRoom].messages=[];allRooms[currentOpenRoom].messages.push(msg);saveRooms();displayMessagesInOpenChat();i.value='';renderChatsList();}
function backToInbox(){document.getElementById('openChatView').style.display='none';document.getElementById('inboxView').style.display='flex';currentOpenRoom=null;renderChatsList();}
function showNewChatModal(){let n=prompt("اسم الغرفة الجديدة:","غرفة جديدة");if(n&&!allRooms[n]){allRooms[n]={password:null,users:[currentUser],messages:[]};saveRooms();renderChatsList();}else if(n&&allRooms[n])alert("الغرفة موجودة مسبقاً");}
function submitSecurityAndEnter(){let u=document.getElementById('securityUsername').value.trim();let p=document.getElementById('securityRoomPassword').value;let r=document.getElementById('securityRoomName').value.trim();if(!u){alert("❌ أدخل اسم المستخدم");return;}if(!r){alert("❌ أدخل اسم الغرفة");return;}currentUser=u;securityPassword=p;localStorage.setItem('didogame_username',currentUser);document.getElementById('securityPanel').style.display='none';document.getElementById('chatPopupOverlay').style.display='flex';loadRooms();if(!allRooms[r]){allRooms[r]={password:p||null,users:[currentUser],messages:[]};saveRooms();}renderChatsList();document.getElementById('inboxView').style.display='flex';document.getElementById('openChatView').style.display='none';}
document.getElementById('moreCategoriesBtn')?.addEventListener('click',()=>{let ec=['battle','sports','strategy','horror','rpg','simulation'];let cn=['🔫 معركة رويال','⚽ رياضات','🧠 استراتيجية','👻 رعب','⚔️ RPG','🏙️ محاكاة'];let h='<div class="modal-card"><h3 style="color:white;">🎮 تصنيفات إضافية</h3><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0;">';ec.forEach((c,i)=>{h+=`<div class="cat-badge" style="cursor:pointer;" onclick="showCategoryGames('${c}'); document.getElementById('moreModal').style.display='none';">${cn[i]}</div>`;});h+='</div><button class="security-btn" onclick="document.getElementById(\'moreModal\').style.display=\'none\'">إغلاق</button></div>';let m=document.getElementById('moreModal');if(!m){m=document.createElement('div');m.id='moreModal';m.className='modal-overlay';document.body.appendChild(m);}m.innerHTML=h;m.style.display='flex';m.onclick=(e)=>{if(e.target===m)m.style.display='none';};});
document.querySelectorAll('.cat-badge').forEach(b=>{if(!b.classList.contains('more-btn'))b.addEventListener('click',()=>showCategoryGames(b.dataset.cat));});
document.getElementById('backToHomeBtn')?.addEventListener('click',()=>{document.getElementById('homePage').classList.remove('page-hidden');document.getElementById('categoryPage').classList.add('page-hidden');});
document.getElementById('openChatBtn')?.addEventListener('click',()=>{let s=localStorage.getItem('didogame_username');if(currentUser){document.getElementById('chatPopupOverlay').style.display='flex';renderChatsList();}else{document.getElementById('securityPanel').style.display='flex';if(s)document.getElementById('securityUsername').value=s;}});
document.getElementById('closeChatPopupBtn')?.addEventListener('click',()=>document.getElementById('chatPopupOverlay').style.display='none');
document.getElementById('closeChatFromInbox')?.addEventListener('click',()=>document.getElementById('chatPopupOverlay').style.display='none');
document.getElementById('backToInboxBtn')?.addEventListener('click',backToInbox);
document.getElementById('newChatBtn')?.addEventListener('click',showNewChatModal);
document.getElementById('sendMsgOpen')?.addEventListener('click',sendMessageOpen);
document.getElementById('securityBtn')?.addEventListener('click',submitSecurityAndEnter);
document.getElementById('walletBtn')?.addEventListener('click',()=>alert("💳 المحفظة الإلكترونية - سيتم تفعيلها قريباً"));
document.getElementById('favoritesBtn')?.addEventListener('click',()=>{renderFavoritesList();document.getElementById('favoritesModal').style.display='flex';});
document.getElementById('registerBtn')?.addEventListener('click',()=>{if(isVIP)alert("✨ أنت بالفعل VIP!");else{alert("💎 ترقية VIP - 9.99$ شهرياً");isVIP=true;localStorage.setItem('didogame_vip','true');document.getElementById('registerBtn').classList.add('active');alert("🎉 تهانينا! أصبحت عضواً مميزاً");}});
document.getElementById('settingsBtn')?.addEventListener('click',()=>alert("⚙️ الإعدادات - سيتم تخصيصها قريباً"));
let fm=document.createElement('div');fm.id='favoritesModal';fm.className='modal-overlay';fm.innerHTML='<div class="modal-card"><h3 style="color:white;">⭐ ألعابي المفضلة</h3><div id="favoritesList" style="max-height:400px;overflow-y:auto;margin:15px 0;"></div><button class="security-btn" onclick="document.getElementById(\'favoritesModal\').style.display=\'none\'">إغلاق</button></div>';document.body.appendChild(fm);
function createParticles(){let c=document.getElementById('particles');for(let i=0;i<50;i++){let p=document.createElement('div');p.className='particle';p.style.width=Math.random()*4+2+'px';p.style.height=p.style.width;p.style.left=Math.random()*100+'%';p.style.animationDuration=Math.random()*10+5+'s';p.style.animationDelay=Math.random()*10+'s';c.appendChild(p);}}
let ads=["🎮 أكثر من 120 لعبة جاهزة للعب! 🎮","🔥 العب الآن واربح جوائز يومية! 🔥","💰 اشترك في VIP واحصل على مميزات حصرية! 💰","⭐ أضف ألعابك المفضلة وشارك أصدقاءك! ⭐"];let adIdx=0;setInterval(()=>{adIdx=(adIdx+1)%ads.length;document.getElementById('permanentAd').innerHTML=ads[adIdx];},8000);
createParticles();updateRanking();renderAllGames();
let sv=localStorage.getItem('didogame_vip');if(sv==='true'){isVIP=true;document.getElementById('registerBtn').classList.add('active');}
let su=localStorage.getItem('didogame_username');if(su)document.getElementById('securityUsername').value=su;
loadRooms();
window.playGame=playGame;window.closeGameModal=closeGameModal;window.showCategoryGames=showCategoryGames;window.toggleFavorite=toggleFavorite;window.openRoomChat=openRoomChat;
</script>
