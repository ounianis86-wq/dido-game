<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DidoGame - دردشة خاصة VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a, #1a0033);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(10,10,30,0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 30px #ff44ff40;
        }
        h1, h2 {
            color: #ff44ff;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .section {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.9rem;
        }
        button {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 0.85rem;
        }
        .messages {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .message {
            background: rgba(255,68,255,0.2);
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        .message.private {
            background: rgba(0,255,136,0.2);
            border-right: 3px solid #00ff88;
        }
        .sender {
            color: #ff44ff;
            font-size: 0.7rem;
        }
        .private-tag {
            color: #00ff88;
            font-size: 0.6rem;
            margin-left: 5px;
        }
        .text {
            color: white;
            font-size: 0.85rem;
            margin-top: 3px;
            word-break: break-word;
        }
        .vip-badge {
            background: #ff44ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            margin-left: 5px;
        }
        .users-list {
            font-size: 0.7rem;
            color: #00ff88;
            margin-bottom: 10px;
            text-align: center;
        }
        .user-chip {
            display: inline-block;
            background: rgba(255,68,255,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            margin: 3px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .user-chip.vip {
            border: 1px solid #ff44ff;
            background: rgba(255,68,255,0.5);
        }
        .user-chip.selected {
            background: #ff44ff;
            color: white;
        }
        .hidden {
            display: none;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .danger-btn {
            background: linear-gradient(135deg, #ff3366, #ff6600);
        }
        .room-info {
            font-size: 0.7rem;
            color: #ffaa88;
            text-align: center;
            margin-bottom: 8px;
        }
        img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }
        .lock-icon {
            margin-right: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 DidoGame VIP - دردشة خاصة</h1>
    
    <!-- قسم إنشاء/دخول الغرفة -->
    <div id="roomSection" class="section">
        <h2>🏠 إنشاء أو دخول غرفة</h2>
        <input type="text" id="roomName" placeholder="اسم الغرفة" value="غرفتي">
        <input type="password" id="roomPassword" placeholder="كلمة مرور الغرفة (اختياري)">
        <div class="flex-row">
            <button onclick="createOrJoinRoom()">🚪 دخول الغرفة</button>
            <button class="danger-btn" onclick="showDeleteConfirm()">🗑️ حذف غرفتي</button>
        </div>
        <div class="users-list" id="availableRoomsList">📁 الغرف المتاحة: --</div>
    </div>
    
    <!-- قسم الدردشة (يظهر بعد دخول الغرفة) -->
    <div id="chatDiv" class="hidden">
        <div class="section">
            <div class="room-info" id="roomInfo"></div>
            <div class="users-list" id="activeUsers">👥 المتصلون في هذه الغرفة: --</div>
            <div class="messages" id="messagesDiv">
                <div style="color:#888; text-align:center;">💬 مرحباً بك في الغرفة الخاصة</div>
            </div>
            
            <div class="flex-row">
                <input type="text" id="messageInput" placeholder="اكتب رسالة..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">📤</button>
                <button id="vipImageBtn" onclick="sendImage()" style="display:none;">🖼️</button>
            </div>
            
            <!-- قسم الرسائل الخاصة -->
            <div class="section" style="margin-top:8px;">
                <div style="color:#00ff88; font-size:0.7rem;">🔒 رسالة خاصة لشخص معين:</div>
                <div class="flex-row">
                    <select id="privateUserSelect" style="flex:1;"></select>
                    <input type="text" id="privateMessageInput" placeholder="رسالة خاصة..." style="flex:2;" onkeypress="if(event.key==='Enter') sendPrivateMessage()">
                    <button onclick="sendPrivateMessage()">🔒 إرسال</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- زر الترقية -->
    <div style="text-align:center; margin-top:10px;">
        <button id="upgradeBtn" onclick="upgradeVIP()" style="background:linear-gradient(135deg,#ffaa00,#ff6600);">👑 ترقية VIP (صور)</button>
    </div>
</div>

<script>
    // ==================== البيانات ====================
    let currentUser = null;
    let currentRoom = null;
    let currentRoomPassword = null;
    let isVIP = false;
    let messages = [];
    let rooms = {};
    let usersInRoom = [];
    
    // تحميل البيانات
    function loadData() {
        let saved = localStorage.getItem('didovip_rooms');
        if (saved) rooms = JSON.parse(saved);
        else rooms = {};
        
        let savedUser = localStorage.getItem('didovip_current_user');
        if (savedUser) {
            let userData = JSON.parse(savedUser);
            currentUser = userData.username;
            isVIP = userData.isVIP || false;
            document.getElementById('vipImageBtn').style.display = isVIP ? 'inline-block' : 'none';
            if (isVIP) document.getElementById('upgradeBtn').innerHTML = '👑 VIP مفعل';
        }
        
        updateAvailableRoomsList();
    }
    
    function saveRooms() {
        localStorage.setItem('didovip_rooms', JSON.stringify(rooms));
    }
    
    function saveCurrentUser() {
        if (currentUser) {
            localStorage.setItem('didovip_current_user', JSON.stringify({ username: currentUser, isVIP: isVIP }));
        }
    }
    
    // عرض الغرف المتاحة
    function updateAvailableRoomsList() {
        let roomNames = Object.keys(rooms);
        let div = document.getElementById('availableRoomsList');
        if (roomNames.length === 0) {
            div.innerHTML = '📁 لا توجد غرف متاحة. أنشئ غرفة جديدة!';
        } else {
            div.innerHTML = '📁 الغرف المتاحة: ' + roomNames.map(r => 
                `<span class="user-chip" onclick="quickJoinRoom('${r}')">${r} ${rooms[r].hasPassword ? '🔒' : '🔓'}</span>`
            ).join('');
        }
    }
    
    // الدخول السريع لغرفة
    function quickJoinRoom(roomName) {
        document.getElementById('roomName').value = roomName;
        let pwd = rooms[roomName]?.password || '';
        document.getElementById('roomPassword').value = pwd;
        createOrJoinRoom();
    }
    
    // إنشاء أو دخول غرفة
    function createOrJoinRoom() {
        let roomName = document.getElementById('roomName').value.trim();
        let password = document.getElementById('roomPassword').value;
        
        if (!roomName) {
            alert("الرجاء إدخال اسم الغرفة");
            return;
        }
        
        // التحقق من وجود الغرفة
        if (rooms[roomName]) {
            // غرفة موجودة - تحقق من كلمة المرور
            if (rooms[roomName].hasPassword && rooms[roomName].password !== password) {
                alert("❌ كلمة مرور الغرفة غير صحيحة!");
                return;
            }
            currentRoom = roomName;
            currentRoomPassword = rooms[roomName].password || null;
            loadRoomMessages();
            alert(`✅ دخلت الغرفة: ${roomName}`);
        } else {
            // إنشاء غرفة جديدة
            let hasPassword = password !== "";
            rooms[roomName] = {
                name: roomName,
                hasPassword: hasPassword,
                password: hasPassword ? password : null,
                messages: [],
                created: Date.now()
            };
            currentRoom = roomName;
            currentRoomPassword = password || null;
            messages = [];
            saveRooms();
            alert(`🎉 تم إنشاء الغرفة: ${roomName}`);
        }
        
        // تحديث واجهة المستخدم
        document.getElementById('roomSection').classList.add('hidden');
        document.getElementById('chatDiv').classList.remove('hidden');
        document.getElementById('roomInfo').innerHTML = `🔐 الغرفة: ${currentRoom} ${currentRoomPassword ? '🔒 محمية' : '🔓 مفتوحة'}`;
        
        updateUsersInRoom();
        displayMessages();
        updatePrivateUserSelect();
    }
    
    function loadRoomMessages() {
        if (rooms[currentRoom] && rooms[currentRoom].messages) {
            messages = rooms[currentRoom].messages;
        } else {
            messages = [];
        }
        displayMessages();
    }
    
    function saveRoomMessages() {
        if (rooms[currentRoom]) {
            rooms[currentRoom].messages = messages;
            saveRooms();
        }
    }
    
    // تحديث قائمة المستخدمين في الغرفة (محاكاة)
    function updateUsersInRoom() {
        // في هذا الإصدار، كل مستخدم هو جهاز منفصل
        // نعرض فقط المستخدم الحالي
        let usersList = [currentUser];
        let div = document.getElementById('activeUsers');
        div.innerHTML = '👥 المتصلون: ' + usersList.map(u => 
            `<span class="user-chip ${isVIP ? 'vip' : ''}">${u}${isVIP ? '⭐' : ''}</span>`
        ).join('');
    }
    
    // تحديث قائمة المستخدمين للرسائل الخاصة
    function updatePrivateUserSelect() {
        let select = document.getElementById('privateUserSelect');
        select.innerHTML = '<option value="">اختر مستخدم...</option>';
        // نضيف المستخدمين المحتملين (في هذا الإصدار نضيف أسماء تجريبية)
        let possibleUsers = ["محمد", "سارة", "علي", "ليلى", "أحمد", "نور"];
        possibleUsers.forEach(u => {
            if (u !== currentUser) {
                select.innerHTML += `<option value="${u}">${u}</option>`;
            }
        });
    }
    
    // إرسال رسالة عامة
    function sendMessage() {
        let text = document.getElementById('messageInput').value.trim();
        if (!text) return;
        
        messages.push({
            type: 'public',
            username: currentUser,
            text: text,
            isVIP: isVIP,
            time: Date.now()
        });
        saveRoomMessages();
        displayMessages();
        document.getElementById('messageInput').value = '';
    }
    
    // إرسال رسالة خاصة
    function sendPrivateMessage() {
        let targetUser = document.getElementById('privateUserSelect').value;
        let text = document.getElementById('privateMessageInput').value.trim();
        
        if (!targetUser) {
            alert("اختر المستخدم الذي تريد إرسال الرسالة له");
            return;
        }
        if (!text) {
            alert("اكتب رسالتك الخاصة");
            return;
        }
        
        messages.push({
            type: 'private',
            username: currentUser,
            targetUser: targetUser,
            text: text,
            isVIP: isVIP,
            time: Date.now()
        });
        saveRoomMessages();
        displayMessages();
        document.getElementById('privateMessageInput').value = '';
        alert(`🔒 رسالة خاصة أرسلت إلى ${targetUser}`);
    }
    
    // إرسال صورة
    function sendImage() {
        if (!isVIP) { alert("❌ إرسال الصور للمستخدمين المميزين فقط!"); return; }
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    messages.push({
                        type: 'public',
                        username: currentUser,
                        image: ev.target.result,
                        isVIP: isVIP,
                        time: Date.now()
                    });
                    saveRoomMessages();
                    displayMessages();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // عرض الرسائل
    function displayMessages() {
        let div = document.getElementById('messagesDiv');
        let last50 = messages.slice(-50);
        if (last50.length === 0) {
            div.innerHTML = '<div style="color:#888; text-align:center;">💬 لا توجد رسائل بعد... ابدأ المحادثة!</div>';
            return;
        }
        div.innerHTML = '';
        last50.forEach(msg => {
            let el = document.createElement('div');
            el.className = 'message';
            if (msg.type === 'private') {
                el.classList.add('private');
                var isForMe = (msg.targetUser === currentUser);
                var isFromMe = (msg.username === currentUser);
                if (isForMe || isFromMe) {
                    // نعرض الرسائل الخاصة التي تخص المستخدم الحالي فقط
                } else {
                    // لا نعرض رسائل خاصة ليست له
                    return;
                }
            }
            
            let senderHtml = `<div class="sender">${msg.username} ${msg.isVIP ? '<span class="vip-badge">VIP</span>' : ''}`;
            if (msg.type === 'private') {
                senderHtml += ` <span class="private-tag">🔒 إلى ${msg.targetUser}</span>`;
            }
            senderHtml += `</div>`;
            el.innerHTML = senderHtml;
            
            if (msg.text) el.innerHTML += `<div class="text">${msg.text}</div>`;
            if (msg.image) el.innerHTML += `<img src="${msg.image}" onclick="window.open(this.src)">`;
            div.appendChild(el);
        });
        div.scrollTop = div.scrollHeight;
    }
    
    // حذف الغرفة الحالية
    function showDeleteConfirm() {
        let roomName = document.getElementById('roomName').value.trim();
        if (!roomName) {
            alert("أدخل اسم الغرفة التي تريد حذفها");
            return;
        }
        if (confirm(`⚠️ هل أنت متأكد من حذف الغرفة "${roomName}" وجميع رسائلها؟\nهذا الإجراء لا يمكن التراجع عنه!`)) {
            if (rooms[roomName]) {
                delete rooms[roomName];
                saveRooms();
                alert(`✅ تم حذف الغرفة: ${roomName}`);
                document.getElementById('roomName').value = '';
                document.getElementById('roomPassword').value = '';
                updateAvailableRoomsList();
                
                // إذا كنا في هذه الغرفة، نخرج منها
                if (currentRoom === roomName) {
                    document.getElementById('roomSection').classList.remove('hidden');
                    document.getElementById('chatDiv').classList.add('hidden');
                    currentRoom = null;
                }
            } else {
                alert("الغرفة غير موجودة");
            }
        }
    }
    
    // الخروج من الغرفة
    function leaveRoom() {
        if (confirm("هل تريد الخروج من الغرفة الحالية؟")) {
            document.getElementById('roomSection').classList.remove('hidden');
            document.getElementById('chatDiv').classList.add('hidden');
            currentRoom = null;
            updateAvailableRoomsList();
        }
    }
    
    // الترقية إلى VIP
    function upgradeVIP() {
        if (isVIP) { alert("أنت VIP بالفعل!"); return; }
        if (confirm("✨ ترقية إلى VIP - 9.99$ شهرياً\n✅ إرسال الصور\n✅ علامة مميزة\n\nهل توافق؟")) {
            isVIP = true;
            saveCurrentUser();
            document.getElementById('vipImageBtn').style.display = 'inline-block';
            document.getElementById('upgradeBtn').innerHTML = '👑 VIP مفعل';
            document.getElementById('upgradeBtn').style.opacity = '0.7';
            if (currentUser) {
                document.getElementById('roomInfo').innerHTML = `🔐 الغرفة: ${currentRoom} ${currentRoomPassword ? '🔒 محمية' : '🔓 مفتوحة'} - VIP`;
            }
            alert("🎉 أصبحت عضواً مميزاً! يمكنك الآن إرسال الصور");
        }
    }
    
    // تسجيل الدخول
    function setUser() {
        let name = prompt("أدخل اسم المستخدم الخاص بك:", currentUser || "أحمد");
        if (name && name.trim()) {
            currentUser = name.trim();
            saveCurrentUser();
            alert(`✅ مرحباً ${currentUser}`);
            updateAvailableRoomsList();
        }
    }
    
    // زر الخروج من الغرفة
    function addExitButton() {
        let exitBtn = document.createElement('button');
        exitBtn.innerHTML = '🚪 خروج من الغرفة';
        exitBtn.className = 'danger-btn';
        exitBtn.onclick = leaveRoom;
        exitBtn.style.marginTop = '10px';
        exitBtn.style.width = '100%';
        document.querySelector('#chatDiv .section:first-child').appendChild(exitBtn);
    }
    
    // التحقق من اسم المستخدم عند البداية
    if (!currentUser) {
        setTimeout(() => {
            let name = prompt("👋 مرحباً بك في DidoGame!\n\nأدخل اسم المستخدم الخاص بك:", "أحمد");
            if (name && name.trim()) {
                currentUser = name.trim();
                saveCurrentUser();
                alert(`✅ مرحباً ${currentUser}`);
                updateAvailableRoomsList();
            }
        }, 500);
    }
    
    // تهيئة
    loadData();
    addExitButton();
    setInterval(() => {
        if (currentRoom) {
            displayMessages();
            updateUsersInRoom();
        }
    }, 2000);
</script>
</body>
</html>
