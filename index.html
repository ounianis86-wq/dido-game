<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom,#1e3c72,#2a5298);
    font-family:Arial;
    touch-action:none;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

#player{
    width:80px;
    height:80px;
    background:linear-gradient(45deg,yellow,orange);
    border-radius:20px;
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px yellow;
}

.coin{
    width:40px;
    height:40px;
    background:gold;
    border-radius:50%;
    position:absolute;
    top:-50px;
    box-shadow:0 0 15px gold;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:22px;
    z-index:100;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    margin-top:10px;
    margin-right:5px;
    background:white;
    cursor:pointer;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:40px;
    display:none;
    text-align:center;
}
</style>
</head>

<body>

<div id="game">

<div id="ui">
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>

<button onclick="pauseGame()">⏸ Pause</button>
<button onclick="resumeGame()">▶ Play</button>
</div>

<div id="player"></div>
<div class="coin" id="coin"></div>

<div id="message"></div>

</div>

<script>

const player = document.getElementById("player");
const coin = document.getElementById("coin");
const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");
const message = document.getElementById("message");


// ================== أصوات ==================
const collectSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-229.wav");

const gameOverSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav");

const bgMusic = new Audio("https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.3;


// تشغيل الموسيقى عند أول لمس
function startMusic(){
    bgMusic.play();

    document.removeEventListener("touchstart", startMusic);
    document.removeEventListener("click", startMusic);
}

document.addEventListener("touchstart", startMusic);
document.addEventListener("click", startMusic);


// ================== بيانات اللعبة ==================
let score = 0;
let level = 1;
let speed = 5;
let isPaused = false;

let playerX = window.innerWidth / 2;

let coinX = Math.random() * (window.innerWidth - 40);
let coinY = -50;


// ================== حركة اللاعب ==================
document.addEventListener("touchmove",(e)=>{
    playerX = e.touches[0].clientX - 40;

    if(playerX < 0) playerX = 0;
    if(playerX > window.innerWidth - 80)
        playerX = window.innerWidth - 80;

    player.style.left = playerX + "px";
});


// ================== اللعبة ==================
function gameLoop(){

    if(!isPaused){

        coinY += speed;

        coin.style.top = coinY + "px";
        coin.style.left = coinX + "px";

        // التقاط العملة
        if(
            coinY > window.innerHeight - 140 &&
            coinX > playerX - 40 &&
            coinX < playerX + 80
        ){

            score++;
            scoreText.innerHTML = "Score: " + score;

            collectSound.currentTime = 0;
            collectSound.play();

            // المستويات
            if(score % 5 === 0){

                level++;
                speed++;

                levelText.innerHTML = "Level: " + level;

                showMessage("LEVEL " + level);
            }

            resetCoin();
        }

        // خسارة
        if(coinY > window.innerHeight){

            gameOverSound.play();

            showMessage("GAME OVER");

            score = 0;
            level = 1;
            speed = 5;

            scoreText.innerHTML = "Score: 0";
            levelText.innerHTML = "Level: 1";

            resetCoin();
        }

    }

    requestAnimationFrame(gameLoop);
}


// ================== إعادة العملة ==================
function resetCoin(){
    coinY = -50;
    coinX = Math.random() * (window.innerWidth - 40);
}


// ================== رسائل ==================
function showMessage(text){

    message.innerHTML = text;
    message.style.display = "block";

    setTimeout(()=>{
        message.style.display = "none";
    },1500);
}


// ================== إيقاف وتشغيل ==================
function pauseGame(){
    isPaused = true;
}

function resumeGame(){
    isPaused = false;
}


// ================== بدء اللعبة ==================
gameLoop();

</script>

</body>
</html>
