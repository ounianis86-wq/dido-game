<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - 3D Anime City | دردشة VIP خاصة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 6px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(5,5,20,0.75);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            overflow: hidden;
            height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #ff00ff, 0 0 20px #00ffff;
            border: 1px solid rgba(255,68,255,0.3);
            position: relative;
        }

        .content {
            padding: 8px 10px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }

        /* الصفحات */
        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .page-hidden {
            display: none;
        }

        /* أنمي هيرو */
        .anime-hero {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-radius: 25px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 20px #ff44ff;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff; border-color: #00ffff; }
            100% { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; }
        }
        
        .character-img {
            width: 70px;
            height: 70px;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            border-radius: 50%;
            border: 2px solid #ff44ff;
            position: relative;
        }
        
        .controller-on-hand {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            border: 1px solid white;
        }
        
        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff, #00ffff);
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.7rem;
        }

        /* ترتيب اللاعبين */
        .ranking-section {
            margin-bottom: 10px;
            text-align: center;
        }
        
        .ranking-circles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .gold-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 3px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }
        
        .silver-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: 3px;
            border: 1.5px solid #c0c0c0;
            box-shadow: 0 0 15px #c0c0c0;
        }
        
        .bronze-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #cd7f32, #b8651a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: 3px;
            border: 1.5px solid #cd7f32;
            box-shadow: 0 0 15px #cd7f32;
        }
        
        .rank-name {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }
        
        .rank-points {
            color: #ffcc00;
            font-size: 0.45rem;
        }

        /* التصنيفات */
        .categories-section {
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        
        .cat-badge {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px #ff44ff;
        }
        
        .cat-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff44ff;
        }

        /* الإعلان الثابت */
        .fixed-permanent-ad {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border: 2px solid #ff44ff;
            border-radius: 20px;
            padding: 8px;
            margin: 8px 0;
            text-align: center;
            color: white;
            font-size: 0.65rem;
            box-shadow: 0 0 15px #ff44ff;
        }

        /* الألعاب - صفين متوازيين */
        .games-wrapper {
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .two-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .game-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .game-row::-webkit-scrollbar {
            display: none;
        }
        
        .game-card {
            min-width: 95px;
            width: 95px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 14px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ff44ff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px #ff44ff;
        }
        
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff;
        }
        
        .game-img {
            width: 100%;
            height: 65px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 4px;
        }
        
        .game-title {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }
        
        .game-cat {
            color: #00ffff;
            font-size: 0.4rem;
        }

        /* الشريط السفلي مع زر الدردشة الدائري */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            border-top: 1px solid #ff44ff;
            background: rgba(0,0,0,0.6);
            position: relative;
        }
        
        .register-btn {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 5px 12px;
            border-radius: 18px;
            color: white;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .register-btn.vip-active {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
        }
        
        /* زر الدردشة الدائري في المنتصف */
        .chat-circle-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 12px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff44ff, #ff00aa, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px #ff44ff, 0 0 10px #00ffff;
            transition: all 0.3s ease;
            animation: circlePulse 1.5s ease-in-out infinite;
            z-index: 10;
        }
        
        .chat-circle-btn:hover {
            transform: translateX(-50%) scale(1.1);
        }
        
        @keyframes circlePulse {
            0% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff; transform: translateX(-50%) scale(1.05); }
            100% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
        }
        
        .chat-circle-btn span {
            font-size: 1.8rem;
            animation: chatIconSpin 3s linear infinite;
        }
        
        @keyframes chatIconSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .music-bottom-btn {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.5rem;
            border: 1px solid #0ff;
        }

        /* ==================== صفحة الدردشة المنفصلة ==================== */
        .chat-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5,5,20,0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border-radius: 0;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .chat-page-header {
            padding: 15px;
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-bottom: 1px solid #ff44ff;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .back-chat-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 15px #ff44ff;
        }
        
        .chat-page-title {
            color: white;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .chat-page-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .chat-room-section {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid #ff44ff;
        }
        
        .chat-room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .room-status-badge {
            background: #ff44ff30;
            padding: 4px 12px;
            border-radius: 20px;
            color: #ffaa88;
            font-size: 0.65rem;
        }
        
        .room-controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .room-input {
            flex: 1;
            padding: 8px;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.7rem;
        }
        
        .small-btn {
            padding: 6px 14px;
            font-size: 0.65rem;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .danger-btn {
            background: linear-gradient(135deg, #ff3366, #ff6600);
        }
        
        .chat-messages-box {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 10px;
            height: 280px;
            overflow-y: auto;
            margin: 10px 0;
        }
        
        .message-item {
            background: rgba(255,68,255,0.12);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        
        .message-item.private {
            background: rgba(0,255,136,0.12);
            border-right: 3px solid #00ff88;
        }
        
        .message-sender {
            color: #ff44ff;
            font-size: 0.6rem;
            font-weight: bold;
        }
        
        .message-text {
            color: white;
            font-size: 0.75rem;
            margin-top: 4px;
            word-break: break-word;
        }
        
        .online-users-chip {
            display: inline-block;
            background: rgba(255,68,255,0.3);
            padding: 3px 10px;
            border-radius: 20px;
            margin: 2px;
            font-size: 0.6rem;
        }
        
        .vip-tag {
            background: #ff44ff;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.45rem;
            margin-left: 5px;
        }
        
        .voice-wave-mini {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #0ff;
            border-radius: 50%;
            animation: pulse 0.8s infinite;
            margin-right: 5px;
        }
        
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .voice-status {
            font-size: 0.55rem;
            color: #0ff;
            margin-top: 5px;
            text-align: center;
        }
        
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-modal iframe {
            width: 95%;
            height: 80%;
            border-radius: 15px;
            border: 3px solid #ff44ff;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff3366;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        <!-- الصفحة الرئيسية -->
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img">
                    <div class="controller-on-hand">🎮</div>
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚡ DIDO-GAME ⚡</div>
                    <h2>😤 نظرة التحدي النيونية!</h2>
                </div>
            </div>
            
            <div class="ranking-section">
                <div class="ranking-circles" id="rankingList"></div>
            </div>
            
            <div class="categories-section">
                <div class="categories" id="categoriesList">
                    <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                    <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                    <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                    <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
                </div>
            </div>
            
            <div class="fixed-permanent-ad" id="permanentAd">
                📺 إعلان ممول - اشترك الآن في عروضنا الحصرية!
            </div>
            
            <!-- الألعاب في صفين متوازيين -->
            <div class="games-wrapper">
                <div class="two-rows" id="gamesContainer"></div>
            </div>
        </div>
        
        <div id="categoryPage" class="page page-hidden">
            <button class="small-btn" id="backToHomeBtn" style="margin-bottom:10px;">🔙 العودة للرئيسية</button>
            <div class="two-rows" id="categoryGamesContainer"></div>
        </div>
    </div>
    
    <!-- الشريط السفلي مع زر الدردشة الدائري في المنتصف -->
    <div class="bottom-bar">
        <div class="register-btn" id="registerBtn" onclick="upgradeToVIP()">👑 ترقية VIP</div>
        <div class="chat-circle-btn" id="openChatBtn">
            <span>💬</span>
        </div>
        <div class="music-bottom-btn" id="musicBtn" onclick="toggleMusic()">🎵 تشغيل</div>
    </div>
</div>

<!-- صفحة الدردشة المنفصلة -->
<div id="chatPage" class="chat-page hidden">
    <div class="chat-page-header">
        <button class="back-chat-btn" id="closeChatBtn">✕</button>
        <span class="chat-page-title">🔐 غرفة الدردشة الخاصة VIP</span>
    </div>
    <div class="chat-page-content">
        <div class="chat-room-section">
            <div class="chat-room-header">
                <span class="room-status-badge" id="chatRoomStatus">⚪ غير متصل</span>
            </div>
            
            <div id="chatRoomLoginArea">
                <div class="room-controls">
                    <input type="text" id="chatUserName" class="room-input" placeholder="اسم المستخدم">
                    <button class="small-btn" onclick="chatSetUsername()">✅ تعيين الاسم</button>
                </div>
                <div class="room-controls">
                    <input type="text" id="chatRoomName" class="room-input" placeholder="اسم الغرفة">
                    <input type="password" id="chatRoomPassword" class="room-input" placeholder="كلمة المرور">
                </div>
                <div class="room-controls">
                    <button class="small-btn" onclick="chatJoinRoom()">🚪 دخول الغرفة</button>
                    <button class="small-btn" onclick="chatCreateRoom()">✨ إنشاء غرفة</button>
                </div>
                <div class="online-users-chip" id="chatAvailableRooms" style="text-align:center;">📁 --</div>
            </div>
            
            <div id="chatRoomArea" class="hidden">
                <div class="online-users-chip" id="chatUsersList" style="text-align:center;">👥 --</div>
                <div class="chat-messages-box" id="chatMessagesDiv"></div>
                <div class="room-controls">
                    <input type="text" id="chatPublicMsg" class="room-input" placeholder="رسالة عامة...">
                    <button class="small-btn" onclick="chatSendPublic()">📤</button>
                    <button id="chatVipImageBtn" class="small-btn" onclick="chatSendImage()" style="display:none;">🖼️</button>
                </div>
                <div class="room-controls">
                    <select id="chatPrivateSelect" class="room-input" style="flex:1;"></select>
                    <input type="text" id="chatPrivateMsg" class="room-input" placeholder="رسالة خاصة" style="flex:2;">
                    <button class="small-btn" onclick="chatSendPrivate()">🔒</button>
                </div>
                <button class="small-btn danger-btn" onclick="chatLeaveRoom()" style="width:100%; margin-top:8px;">🚪 مغادرة الغرفة</button>
            </div>
            
            <div class="voice-status" id="chatVoiceStatus">
                <span class="voice-wave-mini"></span> اضغط ميكروفون للصوت
            </div>
            <button id="chatMicBtn" class="small-btn" style="width:100%; margin-top:5px;" onclick="chatToggleMic()">🎙️ تفعيل الميكروفون</button>
        </div>
    </div>
</div>

<div id="gameModal" class="game-modal hidden">
    <div class="close-modal" onclick="closeGame()">✕</div>
    <iframe id="gameIframe" src="" allow="microphone; autoplay"></iframe>
</div>

<script>
    // ==================== Games Data ====================
    const gamesData = [
        { id:1, name:"Sonic", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, avatar:"🦔", playerName:"Shadow" },
        { id:2, name:"Subway Surfers", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, avatar:"🏃", playerName:"Speed" },
        { id:3, name:"Temple Run 2", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, avatar:"🏛️", playerName:"RunKing" },
        { id:4, name:"Hill Climb", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, avatar:"🚗", playerName:"Climber" },
        { id:5, name:"Slope", img:"https://images.hdqwalls.com/wallpapers/slope-game-hd.jpg", url:"https://www.crazygames.com/embed/slope", cat:"racing", points:220, avatar:"⚡", playerName:"Fast" },
        { id:6, name:"Street Fighter", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, avatar:"👊", playerName:"Fighter" },
        { id:7, name:"Mortal Kombat", img:"https://images.hdqwalls.com/wallpapers/mortal-kombat-11-4k-2020-45.jpg", url:"https://www.crazygames.com/embed/mortal-kombat", cat:"fighting", points:280, avatar:"💀", playerName:"Scorpion" },
        { id:8, name:"Among Us", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, avatar:"👽", playerName:"Impostor" },
        { id:9, name:"Gardenscapes", img:"https://images.hdqwalls.com/wallpapers/gardenscapes-2020-2021-4k-47.jpg", url:"https://www.crazygames.com/embed/gardenscapes", cat:"puzzle", points:70, avatar:"🌷", playerName:"Garden" },
        { id:10, name:"Free Fire", img:"https://images.hdqwalls.com/wallpapers/free-fire-2020-game-4k-g6.jpg", url:"https://www.crazygames.com/embed/free-fire", cat:"action", points:350, avatar:"🔥", playerName:"Fire" },
        { id:11, name:"Call of Duty", img:"https://images.hdqwalls.com/wallpapers/call-of-duty-mobile-2020-04-m3.jpg", url:"https://www.crazygames.com/embed/call-of-duty", cat:"action", points:320, avatar:"🔫", playerName:"Soldier" },
        { id:12, name:"Basketball Stars", img:"https://images.hdqwalls.com/wallpapers/basketball-4k-2021-6m.jpg", url:"https://www.crazygames.com/embed/basketball-stars", cat:"racing", points:160, avatar:"🏀", playerName:"Hooper" }
    ];
    
    // ==================== Global Variables ====================
    let currentUserName = null;
    let currentRoom = null;
    let isVIPUser = false;
    let allRooms = {};
    let localStream = null;
    let micActive = false;
    let music = null;
    let musicPlaying = false;
    
    // ==================== Games Functions ====================
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points);
        const gold = sorted[0];
        const silver = sorted[1];
        const bronze = sorted[2];
        document.getElementById('rankingList').innerHTML = `
            <div class="rank-circle">
                <div class="crown-icon">🥈</div>
                <div class="silver-circle">${silver ? silver.avatar : '👤'}</div>
                <div class="rank-name">${silver ? silver.playerName : '---'}</div>
                <div class="rank-points">⭐ ${silver ? silver.points : 0}</div>
            </div>
            <div class="rank-circle">
                <div class="crown-icon">👑</div>
                <div class="gold-circle">${gold ? gold.avatar : '👤'}</div>
                <div class="rank-name">${gold ? gold.playerName : '---'}</div>
                <div class="rank-points">⭐ ${gold ? gold.points : 0}</div>
            </div>
            <div class="rank-circle">
                <div class="crown-icon">🥉</div>
                <div class="bronze-circle">${bronze ? bronze.avatar : '👤'}</div>
                <div class="rank-name">${bronze ? bronze.playerName : '---'}</div>
                <div class="rank-points">⭐ ${bronze ? bronze.points : 0}</div>
            </div>
        `;
    }
    
    function renderAllGames() {
        const filtered = gamesData;
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        document.getElementById('gamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
        `;
        attachGameClickEvents();
    }
    
    function attachGameClickEvents() {
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const url = card.getAttribute('data-url');
                const id = parseInt(card.getAttribute('data-id'));
                const game = gamesData.find(g => g.id === id);
                if(game) { game.points += 5; updateRanking(); }
                document.getElementById('gameIframe').src = url;
                document.getElementById('gameModal').classList.remove('hidden');
            });
        });
    }
    
    function renderCategoryGames(category) {
        const filtered = gamesData.filter(g => g.cat === category);
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
        `;
        attachGameClickEvents();
    }
    
    function showCategoryPage(category) {
        renderCategoryGames(category);
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    document.querySelectorAll('.cat-badge').forEach(badge => {
        badge.addEventListener('click', () => {
            showCategoryPage(badge.getAttribute('data-cat'));
        });
    });
    
    document.getElementById('backToHomeBtn').addEventListener('click', () => {
        document.getElementById('homePage').classList.remove('page-hidden');
        document.getElementById('categoryPage').classList.add('page-hidden');
    });
    
    function closeGame() { 
        document.getElementById('gameModal').classList.add('hidden'); 
        document.getElementById('gameIframe').src = ''; 
    }
    
    function upgradeToVIP() {
        if(isVIPUser) { alert("✨ أنت بالفعل عضو VIP!"); return; }
        if(confirm("✨ ترقية إلى VIP - 9.99$ شهرياً\n✅ إرسال الصور\n✅ علامة VIP مميزة")) {
            isVIPUser = true;
            localStorage.setItem('didogame_vip', 'true');
            document.getElementById('registerBtn').innerHTML = '👑 VIP مفعل';
            document.getElementById('registerBtn').classList.add('vip-active');
            document.getElementById('chatVipImageBtn').style.display = 'inline-block';
            alert("🎉 تهانينا! أصبحت عضواً مميزاً");
        }
    }
    
    // ==================== Chat Functions ====================
    function saveRooms() { localStorage.setItem('didogame_rooms', JSON.stringify(allRooms)); }
    function loadRooms() { let data = localStorage.getItem('didogame_rooms'); if(data) allRooms = JSON.parse(data); else allRooms = {}; }
    
    function updateChatAvailableRooms() {
        let list = Object.keys(allRooms).map(r => `<span class="online-users-chip" onclick="quickChatJoin('${r}')">${r} ${allRooms[r].password?'🔒':'🔓'}</span>`).join('');
        document.getElementById('chatAvailableRooms').innerHTML = list || "📁 لا توجد غرف";
    }
    
    function quickChatJoin(roomName) {
        document.getElementById('chatRoomName').value = roomName;
        chatJoinRoom();
    }
    
    function chatSetUsername() {
        let name = document.getElementById('chatUserName').value.trim();
        if(name === "") { alert("❌ أدخل اسم المستخدم"); return; }
        currentUserName = name;
        localStorage.setItem('didogame_username', currentUserName);
        alert(`✅ مرحباً ${currentUserName}`);
        document.getElementById('chatUserName').value = currentUserName;
    }
    
    function chatCreateRoom() {
        if(!currentUserName) { alert("⚠️ حدد اسم المستخدم أولاً"); return; }
        let roomName = document.getElementById('chatRoomName').value.trim();
        let password = document.getElementById('chatRoomPassword').value;
        if(!roomName) return alert("أدخل اسم الغرفة");
        if(allRooms[roomName]) return alert("الغرفة موجودة");
        allRooms[roomName] = { password: password || null, users: [currentUserName], messages: [] };
        saveRooms();
        updateChatAvailableRooms();
        currentRoom = roomName;
        showChatRoomUI();
    }
    
    function chatJoinRoom() {
        if(!currentUserName) { alert("⚠️ حدد اسم المستخدم أولاً"); return; }
        let roomName = document.getElementById('chatRoomName').value.trim();
        let password = document.getElementById('chatRoomPassword').value;
        let room = allRooms[roomName];
        if(!room) return alert("الغرفة غير موجودة");
        if(room.password && room.password !== password) return alert("كلمة مرور خاطئة");
        if(!room.users.includes(currentUserName)) room.users.push(currentUserName);
        currentRoom = roomName;
        saveRooms();
        showChatRoomUI();
    }
    
    function showChatRoomUI() {
        document.getElementById('chatRoomLoginArea').classList.add('hidden');
        document.getElementById('chatRoomArea').classList.remove('hidden');
        document.getElementById('chatRoomStatus').innerHTML = `🔐 في غرفة: ${currentRoom}`;
        updateChatUsers();
        updateChatPrivateSelect();
        displayChatMessages();
        startChatMicrophone();
    }
    
    function updateChatUsers() {
        if(!currentRoom || !allRooms[currentRoom]) return;
        let users = allRooms[currentRoom].users;
        document.getElementById('chatUsersList').innerHTML = `👥 أعضاء الغرفة: ${users.map(u=>`<span class="online-users-chip">${u}${u===currentUserName && isVIPUser?'⭐':''}</span>`).join('')}`;
    }
    
    function updateChatPrivateSelect() {
        let select = document.getElementById('chatPrivateSelect');
        let users = allRooms[currentRoom]?.users.filter(u => u !== currentUserName) || [];
        select.innerHTML = '<option value="">🔒 اختر مستلماً</option>' + users.map(u=>`<option value="${u}">${u}</option>`).join('');
    }
    
    function chatSendPublic() {
        let text = document.getElementById('chatPublicMsg').value.trim();
        if(!text || !currentRoom) return;
        let msg = { type:'public', sender:currentUserName, text, time:Date.now() };
        allRooms[currentRoom].messages.push(msg);
        saveRooms();
        displayChatMessages();
        document.getElementById('chatPublicMsg').value = '';
    }
    
    function chatSendPrivate() {
        let target = document.getElementById('chatPrivateSelect').value;
        let text = document.getElementById('chatPrivateMsg').value.trim();
        if(!target || !text) return alert("اختر المستلم واكتب رسالة");
        let msg = { type:'private', sender:currentUserName, target, text, time:Date.now() };
        allRooms[currentRoom].messages.push(msg);
        saveRooms();
        displayChatMessages();
        document.getElementById('chatPrivateMsg').value = '';
    }
    
    function displayChatMessages() {
        let div = document.getElementById('chatMessagesDiv');
        if(!currentRoom || !allRooms[currentRoom]) return;
        let msgs = allRooms[currentRoom].messages.slice(-40);
        div.innerHTML = '';
        msgs.forEach(msg => {
            if(msg.type === 'private' && msg.sender !== currentUserName && msg.target !== currentUserName) return;
            let el = document.createElement('div');
            el.className = 'message-item' + (msg.type==='private' ? ' private' : '');
            el.innerHTML = `<div class="message-sender">${msg.sender} ${msg.type==='private' ? `🔒 → ${msg.target}` : ''}</div><div class="message-text">${msg.text || (msg.image ? '📷 صورة' : '')}</div>`;
            if(msg.image) el.innerHTML += `<img src="${msg.image}" style="max-width:100%; max-height:100px; border-radius:10px; margin-top:5px;">`;
            div.appendChild(el);
        });
        div.scrollTop = div.scrollHeight;
    }
    
    function chatSendImage() {
        if(!isVIPUser) { alert("❌ خاصية VIP فقط! قم بالترقية"); return; }
        let input = document.createElement('input');
        input.type='file'; input.accept='image/*';
        input.onchange = e => {
            let file = e.target.files[0];
            if(file) {
                let reader = new FileReader();
                reader.onload = ev => {
                    let msg = { type:'public', sender:currentUserName, image:ev.target.result, time:Date.now() };
                    allRooms[currentRoom].messages.push(msg);
                    saveRooms();
                    displayChatMessages();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    function chatLeaveRoom() {
        if(currentRoom && allRooms[currentRoom]) {
            allRooms[currentRoom].users = allRooms[currentRoom].users.filter(u => u !== currentUserName);
            saveRooms();
        }
        if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
        micActive = false;
        currentRoom = null;
        document.getElementById('chatRoomLoginArea').classList.remove('hidden');
        document.getElementById('chatRoomArea').classList.add('hidden');
        document.getElementById('chatRoomStatus').innerHTML = "⚪ غير متصل";
        document.getElementById('chatMicBtn').innerHTML = "🎙️ تفعيل الميكروفون";
        updateChatAvailableRooms();
    }
    
    async function startChatMicrophone() {
        if(!currentRoom) return;
        try {
            if(!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micActive = true;
                document.getElementById('chatMicBtn').innerHTML = "🎙️ ميكروفون ON";
                document.getElementById('chatVoiceStatus').innerHTML = '<span class="voice-wave-mini"></span> 🎤 الصوت مفعل';
            }
        } catch(e) { console.log("Mic error"); }
    }
    
    function chatToggleMic() {
        if(!currentRoom) { alert("ادخل غرفة أولاً"); return; }
        if(!localStream) { startChatMicrophone(); return; }
        let audioTrack = localStream.getAudioTracks()[0];
        if(audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            micActive = audioTrack.enabled;
            document.getElementById('chatMicBtn').innerHTML = micActive ? "🎙️ ميكروفون ON" : "🔴 ميكروفون OFF";
            document.getElementById('chatVoiceStatus').innerHTML = micActive ? '<span class="voice-wave-mini"></span> 🎤 الصوت مفعل' : '<span class="voice-wave-mini"></span> 🔇 الصوت مكتوم';
        }
    }
    
    // ==================== Music 100% ====================
    function toggleMusic() {
        if(!music) {
            music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
            music.loop = true;
            music.volume = 1.0;
        }
        if(musicPlaying) {
            music.pause();
            document.getElementById('musicBtn').innerHTML = "🎵 تشغيل";
        } else {
            music.play().catch(e => console.log("Auto-play prevented"));
            document.getElementById('musicBtn').innerHTML = "🔇 إيقاف";
        }
        musicPlaying = !musicPlaying;
    }
    
    // ==================== Open/Close Chat Page ====================
    document.getElementById('openChatBtn').addEventListener('click', () => {
        document.getElementById('chatPage').classList.remove('hidden');
        updateChatAvailableRooms();
        let saved = localStorage.getItem('didogame_username');
        if(saved) { currentUserName = saved; document.getElementById('chatUserName').value = currentUserName; }
    });
    
    document.getElementById('closeChatBtn').addEventListener('click', () => {
        document.getElementById('chatPage').classList.add('hidden');
    });
    
    // Auto refresh chat
    setInterval(() => {
        if(currentRoom && allRooms[currentRoom]) {
            updateChatUsers();
            updateChatPrivateSelect();
            displayChatMessages();
        }
    }, 2000);
    
    // الإعلان المتغير
    const ads = ["📺 إعلان ممول - اشترك الآن!", "🎮 لعبة الأسبوع - العب مجاناً!", "💰 خصم 50% على العضوية VIP", "🚀 تحديث جديد - ألعاب حصرية"];
    let adIndex = 0;
    setInterval(() => {
        adIndex = (adIndex + 1) % ads.length;
        document.getElementById('permanentAd').innerHTML = ads[adIndex];
    }, 10000);
    
    // ==================== Initialize ====================
    loadRooms();
    updateRanking();
    renderAllGames();
    updateChatAvailableRooms();
    
    let savedVIP = localStorage.getItem('didogame_vip');
    if(savedVIP === 'true') { isVIPUser = true; document.getElementById('registerBtn').innerHTML = '👑 VIP مفعل'; document.getElementById('registerBtn').classList.add('vip-active'); document.getElementById('chatVipImageBtn').style.display = 'inline-block'; }
    
    let savedName = localStorage.getItem('didogame_username');
    if(savedName) { currentUserName = savedName; document.getElementById('chatUserName').value = currentUserName; }
    else { setTimeout(()=>{ let n=prompt("👋 مرحباً! أدخل اسم المستخدم:","أحمد"); if(n) { currentUserName=n; localStorage.setItem('didogame_username',currentUserName); document.getElementById('chatUserName').value=currentUserName; } }, 500); }
    
    window.chatSetUsername = chatSetUsername;
    window.chatJoinRoom = chatJoinRoom;
    window.chatCreateRoom = chatCreateRoom;
    window.chatSendPublic = chatSendPublic;
    window.chatSendPrivate = chatSendPrivate;
    window.chatSendImage = chatSendImage;
    window.chatLeaveRoom = chatLeaveRoom;
    window.chatToggleMic = chatToggleMic;
    window.quickChatJoin = quickChatJoin;
    window.upgradeToVIP = upgradeToVIP;
    window.closeGame = closeGame;
    window.toggleMusic = toggleMusic;
</script>
</body>
</html>
