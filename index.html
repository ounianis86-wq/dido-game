<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comic Game World</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
overflow-x:hidden;
}

/* الخلفية */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#1e3a8a55,transparent 40%),
radial-gradient(circle at bottom,#7c3aed44,transparent 40%);
z-index:-1;
}

/* الهيدر */

header{
padding:30px 20px;
text-align:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
box-shadow:0 0 30px rgba(0,0,0,0.5);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:42px;
font-weight:bold;
color:#38bdf8;
text-shadow:0 0 20px #38bdf8;
}

.subtitle{
margin-top:10px;
color:#cbd5e1;
}

/* فقاعات القصص */

.bubble{
position:absolute;
background:white;
color:black;
padding:12px 18px;
border-radius:20px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
animation:float 3s infinite ease-in-out;
}

.bubble::after{
content:"";
position:absolute;
bottom:-10px;
right:20px;
border-width:10px;
border-style:solid;
border-color:white transparent transparent transparent;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}
}

.b1{
top:160px;
left:20px;
}

.b2{
top:280px;
right:20px;
}

/* الأقسام */

.worlds{
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* الكروت */

.world-card{
position:relative;
height:300px;
border-radius:25px;
overflow:hidden;
cursor:pointer;
transition:0.4s;
border:4px solid rgba(255,255,255,0.1);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.world-card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px rgba(56,189,248,0.6);
}

.world-card img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
transition:0.4s;
}

.world-card:hover img{
transform:scale(1.1);
filter:brightness(0.9);
}

/* النص */

.world-title{
position:absolute;
bottom:20px;
right:20px;
font-size:28px;
font-weight:bold;
text-shadow:0 0 10px black;
}

/* زر */

.enter-btn{
position:absolute;
top:20px;
left:20px;
background:#38bdf8;
border:none;
padding:10px 18px;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.enter-btn:hover{
background:#0ea5e9;
transform:scale(1.1);
}

/* الفوتر */

footer{
padding:30px;
text-align:center;
color:#94a3b8;
}

/* موبايل */

@media(max-width:700px){

.logo{
font-size:30px;
}

.world-card{
height:240px;
}

.world-title{
font-size:22px;
}

}

</style>
</head>

<body>
