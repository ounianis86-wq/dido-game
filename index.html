<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DidoGame - تجربة دردشة VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 10px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a2a, #1a0033);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10,10,30,0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            height: 95vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px #ff00ff30;
            border: 1px solid #ff44ff;
        }

        .content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Login Section */
        .login-section {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #ff44ff;
        }

        .login-section h3 {
            color: white;
            margin-bottom: 15px;
        }

        .login-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            text-align: center;
        }

        .login-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .vip-badge {
            background: #ff44ff;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 15px;
            margin-left: 5px;
        }

        /* Chat Section */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .username-display {
            color: #ffaa88;
            font-size: 0.8rem;
            text-align: center;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        .chat-messages {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 10px;
            overflow-y: auto;
            max-height: 400px;
        }

        .message {
            background: rgba(255,68,255,0.2);
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 8px;
            border: 1px solid #ff44ff;
        }

        .message-sender {
            color: #ff44ff;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .message-text {
            color: white;
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .message-image {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .message-audio {
            margin-top: 5px;
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .send-btn, .image-btn, .audio-btn {
            background: #ff44ff;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
        }

        .call-section {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,68,255,0.1);
            border-radius: 15px;
            text-align: center;
        }

        .call-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px #ff44ff; }
            50% { box-shadow: 0 0 20px #ff44ff; }
        }

        .upgrade-btn.vip-active {
            background: #333;
            animation: none;
            cursor: default;
        }

        .music-btn {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.7rem;
            border: 1px solid #0ff;
        }

        .hidden {
            display: none;
        }

        .online-users {
            font-size: 0.7rem;
            color: #00ff88;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        
        <!-- Login Section -->
        <div id="loginSection" class="login-section">
            <h3>🎮 DidoGame - تجربة دردشة VIP 🎮</h3>
            <input type="text" id="loginName" class="login-input" placeholder="اسم المستخدم">
            <button class="login-btn" onclick="login()">🚀 دخول</button>
            <div class="online-users" id="onlineUsers">👥 جاري التحميل...</div>
        </div>
        
        <!-- Chat Section -->
        <div id="chatSection" class="chat-section hidden">
            <div class="username-display" id="usernameDisplay"></div>
            <div class="online-users" id="chatOnlineUsers">👥 المتصلون: --</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" class="chat-input" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">📤</button>
                <button class="image-btn" id="imageBtn" onclick="sendImage()">🖼️</button>
                <button class="audio-btn" id="audioBtn" onclick="toggleRecording()">🎙️</button>
            </div>
            
            <div class="call-section" id="callSection">
                <div style="color:#ffaa88; font-size:0.7rem;">🔊 دردشة صوتية VIP 🔊</div>
                <div>
                    <select id="userToCall" class="chat-input" style="width:60%;">
                        <option value="">اختر مستخدم للاتصال...</option>
                    </select>
                    <button class="call-btn" onclick="startCall()">📞 اتصال</button>
                </div>
                <div id="callStatus" style="color:#ff44ff; font-size:0.6rem;"></div>
            </div>
        </div>
        
    </div>
    
    <div class="bottom-bar">
        <button class="upgrade-btn" id="upgradeBtn" onclick="upgradeToVIP()">👑 ترقية VIP (صور + مكالمات)</button>
        <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵 تشغيل</div>
    </div>
</div>

<script>
    // ==================== Local Storage Data (Demo Mode) ====================
    let currentUser = null;
    let isVIP = false;
    let messages = [];
    let users = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let activeCall = null;
    
    // Load saved data
    function loadData() {
        const savedMessages = localStorage.getItem('chat_messages');
        if (savedMessages) {
            messages = JSON.parse(savedMessages);
        }
        
        const savedUsers = localStorage.getItem('chat_users');
        if (savedUsers) {
            users = JSON.parse(savedUsers);
        }
    }
    
    function saveMessages() {
        localStorage.setItem('chat_messages', JSON.stringify(messages));
    }
    
    function saveUsers() {
        localStorage.setItem('chat_users', JSON.stringify(users));
    }
    
    function login() {
        const name = document.getElementById('loginName').value.trim();
        if (!name) {
            alert("الرجاء إدخال اسم المستخدم");
            return;
        }
        
        // Check if user exists
        let user = users.find(u => u.username === name);
        if (!user) {
            user = {
                username: name,
                isVIP: false,
                online: true
            };
            users.push(user);
            saveUsers();
        } else {
            user.online = true;
            saveUsers();
        }
        
        currentUser = user;
        isVIP = user.isVIP;
        
        // Update UI
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('chatSection').classList.remove('hidden');
        document.getElementById('usernameDisplay').innerHTML = `👤 ${currentUser.username} ${isVIP ? '<span class="vip-badge">VIP ⭐</span>' : ''}`;
        
        updateVIPFeatures();
        loadMessages();
        updateUsersList();
        
        // Refresh users list periodically
        setInterval(updateUsersList, 2000);
        setInterval(refreshMessages, 1000);
    }
    
    function updateVIPFeatures() {
        const imageBtn = document.getElementById('imageBtn');
        const audioBtn = document.getElementById('audioBtn');
        const callSection = document.getElementById('callSection');
        const upgradeBtn = document.getElementById('upgradeBtn');
        
        if (isVIP) {
            imageBtn.style.display = 'block';
            audioBtn.style.display = 'block';
            callSection.style.display = 'block';
            upgradeBtn.innerHTML = '👑 VIP مفعل';
            upgradeBtn.classList.add('vip-active');
        } else {
            imageBtn.style.display = 'none';
            audioBtn.style.display = 'none';
            callSection.style.display = 'none';
            upgradeBtn.innerHTML = '⭐ ترقية VIP (صور + مكالمات صوتية) ⭐';
            upgradeBtn.classList.remove('vip-active');
        }
    }
    
    function upgradeToVIP() {
        if (isVIP) {
            alert("✨ أنت بالفعل عضو VIP! ✨");
            return;
        }
        
        const confirm = window.confirm(
            "🎉✨ ترقية إلى العضوية المميزة VIP ✨🎉\n\n" +
            "💰 السعر: 9.99$ شهرياً\n\n" +
            "✅ المميزات:\n" +
            "   • 📸 إرسال الصور\n" +
            "   • 🎙️ تسجيل وإرسال الرسائل الصوتية\n" +
            "   • 📞 مكالمات صوتية مباشرة\n\n" +
            "هل تريد الترقية؟"
        );
        
        if (confirm) {
            isVIP = true;
            currentUser.isVIP = true;
            
            // Update in users array
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            if (userIndex !== -1) {
                users[userIndex].isVIP = true;
                saveUsers();
            }
            
            updateVIPFeatures();
            document.getElementById('usernameDisplay').innerHTML = `👤 ${currentUser.username} <span class="vip-badge">VIP ⭐</span>`;
            alert("🎉 تهانينا! أصبحت عضواً مميزاً في DidoGame VIP 🎉");
        }
    }
    
    function sendMessage() {
        const text = document.getElementById('messageInput').value.trim();
        if (!text) return;
        
        const message = {
            username: currentUser.username,
            text: text,
            isVIP: isVIP,
            timestamp: Date.now()
        };
        
        messages.push(message);
        saveMessages();
        displayMessages();
        document.getElementById('messageInput').value = '';
    }
    
    function sendImage() {
        if (!isVIP) {
            alert("❌ إرسال الصور متاح فقط للمستخدمين المميزين VIP!");
            return;
        }
        
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const message = {
                        username: currentUser.username,
                        imageUrl: event.target.result,
                        isVIP: isVIP,
                        timestamp: Date.now()
                    };
                    messages.push(message);
                    saveMessages();
                    displayMessages();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    async function toggleRecording() {
        if (!isVIP) {
            alert("❌ التسجيل الصوتي متاح فقط للمستخدمين المميزين VIP!");
            return;
        }
        
        if (isRecording) {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('audioBtn').innerHTML = '🎙️';
            }
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    
                    const message = {
                        username: currentUser.username,
                        audioUrl: audioUrl,
                        isVIP: isVIP,
                        timestamp: Date.now()
                    };
                    messages.push(message);
                    saveMessages();
                    displayMessages();
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('audioBtn').innerHTML = '⏹️';
                
                setTimeout(() => {
                    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        isRecording = false;
                        document.getElementById('audioBtn').innerHTML = '🎙️';
                    }
                }, 15000);
                
            } catch (err) {
                alert("لا يمكن الوصول إلى الميكروفون: " + err.message);
            }
        }
    }
    
    function loadMessages() {
        displayMessages();
    }
    
    function refreshMessages() {
        displayMessages();
    }
    
    function displayMessages() {
        const messagesDiv = document.getElementById('chatMessages');
        messagesDiv.innerHTML = '';
        
        const last50 = messages.slice(-50);
        
        last50.forEach(msg => {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const senderSpan = document.createElement('div');
            senderSpan.className = 'message-sender';
            senderSpan.innerHTML = msg.username + (msg.isVIP ? ' <span class="vip-badge">VIP</span>' : '');
            
            messageDiv.appendChild(senderSpan);
            
            if (msg.text) {
                const textSpan = document.createElement('div');
                textSpan.className = 'message-text';
                textSpan.textContent = msg.text;
                messageDiv.appendChild(textSpan);
            }
            
            if (msg.imageUrl) {
                const img = document.createElement('img');
                img.src = msg.imageUrl;
                img.className = 'message-image';
                img.onclick = () => window.open(msg.imageUrl, '_blank');
                messageDiv.appendChild(img);
            }
            
            if (msg.audioUrl) {
                const audio = document.createElement('audio');
                audio.src = msg.audioUrl;
                audio.controls = true;
                audio.className = 'message-audio';
                messageDiv.appendChild(audio);
            }
            
            messagesDiv.appendChild(messageDiv);
        });
        
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function updateUsersList() {
        const onlineUsers = users.filter(u => u.online && u.username !== currentUser?.username);
        const select = document.getElementById('userToCall');
        
        if (select) {
            select.innerHTML = '<option value="">اختر مستخدم للاتصال...</option>';
            onlineUsers.forEach(user => {
                const option = document.createElement('option');
                option.value = user.username;
                option.textContent = user.username + (user.isVIP ? ' (VIP ⭐)' : '');
                select.appendChild(option);
            });
        }
        
        document.getElementById('chatOnlineUsers').innerHTML = `👥 المتصلون: ${onlineUsers.length + 1}`;
        document.getElementById('onlineUsers').innerHTML = `👥 متصلون: ${users.filter(u => u.online).length}`;
    }
    
    function startCall() {
        if (!isVIP) {
            alert("❌ المكالمات الصوتية متاحة فقط للمستخدمين المميزين VIP!");
            return;
        }
        
        const targetUsername = document.getElementById('userToCall').value;
        if (!targetUsername) {
            alert("الرجاء اختيار مستخدم للاتصال به");
            return;
        }
        
        const targetUser = users.find(u => u.username === targetUsername);
        if (!targetUser || !targetUser.online) {
            alert("المستخدم غير متصل حالياً");
            return;
        }
        
        if (!targetUser.isVIP) {
            alert("يمكنك الاتصال فقط بالمستخدمين المميزين VIP");
            return;
        }
        
        document.getElementById('callStatus').innerHTML = `📞 جاري الاتصال بـ ${targetUsername}...`;
        
        // Simulate call
        setTimeout(() => {
            document.getElementById('callStatus').innerHTML = "📞 متصل...";
            showActiveCall(targetUsername);
        }, 2000);
    }
    
    function showActiveCall(callerName) {
        const callDiv = document.createElement('div');
        callDiv.id = 'activeCall';
        callDiv.style.position = 'fixed';
        callDiv.style.bottom = '100px';
        callDiv.style.left = '50%';
        callDiv.style.transform = 'translateX(-50%)';
        callDiv.style.backgroundColor = '#1a0033';
        callDiv.style.border = '2px solid #ff44ff';
        callDiv.style.borderRadius = '20px';
        callDiv.style.padding = '15px';
        callDiv.style.zIndex = '2000';
        callDiv.style.textAlign = 'center';
        callDiv.style.width = '90%';
        callDiv.style.maxWidth = '300px';
        callDiv.style.background = 'linear-gradient(135deg, #1a0033, #0a002a)';
        callDiv.innerHTML = `
            <div style="color:white; margin-bottom:10px;">🎙️ مكالمة صوتية مع ${callerName}</div>
            <button onclick="endCall()" style="background:#ff3366; border:none; padding:8px 20px; border-radius:20px; color:white; cursor:pointer;">❌ إنهاء</button>
        `;
        document.body.appendChild(callDiv);
        
        // Play ringtone
        const audio = new Audio();
        audio.volume = 0.3;
        setTimeout(() => {
            const callDivExists = document.getElementById('activeCall');
            if (callDivExists) {
                const endBtn = callDivExists.querySelector('button');
                if (endBtn) {
                    endBtn.style.animation = 'pulse 1s infinite';
                }
            }
        }, 500);
    }
    
    function endCall() {
        const callDiv = document.getElementById('activeCall');
        if (callDiv) callDiv.remove();
        document.getElementById('callStatus').innerHTML = "📞 انتهت المكالمة";
        setTimeout(() => {
            document.getElementById('callStatus').innerHTML = "";
        }, 3000);
    }
    
    // Music
    let musicPlaying = false;
    let music = null;
    
    function toggleMusic() {
        if (!music) {
            music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
            music.loop = true;
            music.volume = 0.3;
        }
        
        if (musicPlaying) {
            music.pause();
            document.getElementById('musicBtn').innerHTML = '🎵 تشغيل';
        } else {
            music.play().catch(e => console.log('Auto-play prevented'));
            document.getElementById('musicBtn').innerHTML = '🔇 إيقاف';
        }
        musicPlaying = !musicPlaying;
    }
    
    // Cleanup on page close
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            if (userIndex !== -1) {
                users[userIndex].online = false;
                saveUsers();
            }
        }
    });
    
    // Initialize
    loadData();
</script>
</body>
</html>
