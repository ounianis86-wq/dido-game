<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - 3D Anime City | العب مباشرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 10px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(10,10,30,0.85);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            overflow: hidden;
            min-height: 90vh;
            box-shadow: 0 0 40px #ff00ff30;
            position: relative;
        }

        .content {
            padding: 15px;
        }

        /* شخصية أنمي */
        .anime-hero {
            background: linear-gradient(135deg, #1a0a3a80, #0a0a2a80);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #ff44ff;
        }
        
        .character-img {
            width: 120px;
            height: 120px;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid #ff44ff;
            position: relative;
        }
        
        .controller-on-hand {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #ff44ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid white;
        }
        
        .character-info {
            text-align: center;
        }
        
        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff);
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin: 5px 0;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.9rem;
        }
        
        .challenge-look {
            font-size: 0.7rem;
            color: #ffaa88;
        }

        /* Premium banner */
        .premium-banner {
            background: linear-gradient(135deg, #ff44ff, #aa44ff);
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }
        
        .premium-banner span {
            color: white;
            font-size: 0.7rem;
        }
        
        .premium-banner .upgrade {
            background: #ffcc00;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Ranking */
        .ranking-section {
            background: #1a1a3a80;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ff44ff55;
        }
        
        .section-title {
            color: white;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ranking-horizontal {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .ranking-horizontal::-webkit-scrollbar {
            display: none;
        }
        
        .rank-card {
            min-width: 100px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            border: 1px solid #ff44ff40;
        }
        
        .rank-number {
            width: 30px;
            height: 30px;
            background: #ff44ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin: 0 auto 5px;
        }
        
        .rank-avatar {
            font-size: 2rem;
            margin: 5px 0;
        }
        
        .rank-name {
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .rank-points {
            color: #ffcc00;
            font-size: 0.6rem;
        }

        /* Categories */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .cat-badge {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 6px 15px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
        }

        /* Two rows for games */
        .two-rows {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .game-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        
        .game-row::-webkit-scrollbar {
            display: none;
        }
        
        .game-card {
            min-width: 140px;
            width: 140px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            border: 1px solid #ff44ff40;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff44ff;
        }
        
        .game-img {
            width: 100%;
            height: 100px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 8px;
        }
        
        .game-title {
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }
        
        .game-cat {
            color: #aa88ff;
            font-size: 0.55rem;
        }

        /* Back button */
        .back-btn {
            background: #ff44ff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            display: inline-block;
        }

        /* Ad popup */
        .ad-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(10px);
            border: 2px solid #ff44ff;
            border-radius: 20px;
            padding: 15px 25px;
            text-align: center;
            z-index: 1000;
            display: none;
        }
        
        .ad-popup button {
            background: #ff44ff;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Game modal */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-modal iframe {
            width: 95%;
            height: 80%;
            border-radius: 20px;
            border: 2px solid #ff44ff;
            background: white;
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff3366;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #000000aa;
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 30px;
            color: #0ff;
            cursor: pointer;
            z-index: 100;
            font-size: 0.7rem;
        }

        .page {
            transition: all 0.3s ease;
        }
        .page-hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        
        <!-- الصفحة الرئيسية -->
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img">
                    <div class="controller-on-hand">🎮</div>
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚔️ DIDO-GAME ⚔️</div>
                    <h2>😤 نظرة التحدي!</h2>
                    <div class="challenge-look">"هيا تحداني!"</div>
                </div>
            </div>
            
            <div class="premium-banner" id="premiumBtn">
                <span>👑 حساب مميز</span>
                <span class="upgrade">بدون إعلانات - اضغط للترقية</span>
            </div>
            
            <div class="ranking-section">
                <div class="section-title">🏆 ترتيب اللاعبين المتميزين</div>
                <div class="ranking-horizontal" id="rankingList"></div>
            </div>
            
            <div class="section-title">🎮 أنواع الألعاب</div>
            <div class="categories" id="categoriesList">
                <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
            </div>
            
            <div class="section-title">🔥 جميع الألعاب</div>
            <div class="two-rows" id="gamesContainer"></div>
        </div>

        <!-- الصفحة الفرعية (لنوع معين) -->
        <div id="categoryPage" class="page page-hidden">
            <button class="back-btn" id="backToHomeBtn">🔙 العقل إلى الرئيسية</button>
            <div class="section-title" id="categoryTitle">🎮 ألعاب الأكشن</div>
            <div class="two-rows" id="categoryGamesContainer"></div>
        </div>

    </div>
</div>

<div id="adPopup" class="ad-popup">
    <div>📺 إعلان قصير</div>
    <div style="font-size:12px; margin:5px 0;">انتظر 5 ثوانٍ</div>
    <button onclick="closeAd()">تخطي الإعلان ▶</button>
</div>

<div id="gameModal" class="game-modal hidden">
    <div class="close-modal" onclick="closeGame()">✕</div>
    <iframe id="gameIframe" src="" allowfullscreen></iframe>
</div>

<div class="music-btn" id="musicToggle">🎵 تشغيل الموسيقى</div>

<script>
    const gamesData = [
        { id:1, name:"Sonic", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, avatar:"🦔" },
        { id:2, name:"Subway Surfers", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, avatar:"🏃" },
        { id:3, name:"Temple Run 2", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, avatar:"🏛️" },
        { id:4, name:"Hill Climb", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, avatar:"🚗" },
        { id:5, name:"Slope", img:"https://images.hdqwalls.com/wallpapers/slope-game-hd.jpg", url:"https://www.crazygames.com/embed/slope", cat:"racing", points:220, avatar:"⚡" },
        { id:6, name:"Street Fighter", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, avatar:"👊" },
        { id:7, name:"Mortal Kombat", img:"https://images.hdqwalls.com/wallpapers/mortal-kombat-11-4k-2020-45.jpg", url:"https://www.crazygames.com/embed/mortal-kombat", cat:"fighting", points:280, avatar:"💀" },
        { id:8, name:"Among Us", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, avatar:"👽" },
        { id:9, name:"Gardenscapes", img:"https://images.hdqwalls.com/wallpapers/gardenscapes-2020-2021-4k-47.jpg", url:"https://www.crazygames.com/embed/gardenscapes", cat:"puzzle", points:70, avatar:"🌷" },
        { id:10, name:"Free Fire", img:"https://images.hdqwalls.com/wallpapers/free-fire-2020-game-4k-g6.jpg", url:"https://www.crazygames.com/embed/free-fire", cat:"action", points:350, avatar:"🔥" },
        { id:11, name:"Call of Duty", img:"https://images.hdqwalls.com/wallpapers/call-of-duty-mobile-2020-04-m3.jpg", url:"https://www.crazygames.com/embed/call-of-duty", cat:"action", points:320, avatar:"🔫" },
        { id:12, name:"Basketball Stars", img:"https://images.hdqwalls.com/wallpapers/basketball-4k-2021-6m.jpg", url:"https://www.crazygames.com/embed/basketball-stars", cat:"racing", points:160, avatar:"🏀" }
    ];
    
    let isPremium = false;
    let adTimeout = null;
    let pendingGameCallback = null;
    
    // ترتيب اللاعبين
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points).slice(0,6);
        document.getElementById('rankingList').innerHTML = sorted.map((g,idx)=>`
            <div class="rank-card">
                <div class="rank-number">#${idx+1}</div>
                <div class="rank-avatar">${g.avatar}</div>
                <div class="rank-name">${g.name}</div>
                <div class="rank-points">⭐ ${g.points} نقطة</div>
            </div>
        `).join('');
    }
    
    // عرض جميع الألعاب في الصفحة الرئيسية (صفين)
    function renderAllGames() {
        const filtered = gamesData;
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        
        document.getElementById('gamesContainer').innerHTML = `
            <div class="game-row">
                ${row1.map(g=>`
                    <div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}">
                        <div class="game-img" style="background-image: url('${g.img}');"></div>
                        <div class="game-title">${g.name}</div>
                        <div class="game-cat">${g.cat}</div>
                    </div>
                `).join('')}
            </div>
            <div class="game-row">
                ${row2.map(g=>`
                    <div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}">
                        <div class="game-img" style="background-image: url('${g.img}');"></div>
                        <div class="game-title">${g.name}</div>
                        <div class="game-cat">${g.cat}</div>
                    </div>
                `).join('')}
            </div>
        `;
        
        attachGameClickEvents('#gamesContainer');
    }
    
    // عرض ألعاب نوع معين في الصفحة الفرعية
    function renderCategoryGames(category, categoryName) {
        const filtered = gamesData.filter(g => g.cat === category);
        document.getElementById('categoryTitle').innerHTML = `🎮 ${categoryName}`;
        
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">
                ${row1.map(g=>`
                    <div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}">
                        <div class="game-img" style="background-image: url('${g.img}');"></div>
                        <div class="game-title">${g.name}</div>
                        <div class="game-cat">${g.cat}</div>
                    </div>
                `).join('')}
            </div>
            <div class="game-row">
                ${row2.map(g=>`
                    <div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}">
                        <div class="game-img" style="background-image: url('${g.img}');"></div>
                        <div class="game-title">${g.name}</div>
                        <div class="game-cat">${g.cat}</div>
                    </div>
                `).join('')}
            </div>
        `;
        
        attachGameClickEvents('#categoryGamesContainer');
    }
    
    // ربط أحداث النقر على الألعاب
    function attachGameClickEvents(containerId) {
        document.querySelectorAll(`${containerId} .game-card`).forEach(card=>{
            card.addEventListener('click', (e)=>{
                e.stopPropagation();
                const url = card.getAttribute('data-url');
                const name = card.getAttribute('data-name');
                const id = parseInt(card.getAttribute('data-id'));
                launchGame(url, name, id);
            });
        });
    }
    
    // تشغيل اللعبة
    function launchGame(url, name, gameId) {
        if(isPremium) {
            openGameDirect(url, name);
        } else {
            showAd(()=>{
                openGameDirect(url, name);
                addPointsToPlayer(gameId, 5);
            });
        }
    }
    
    function openGameDirect(url, name) {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameIframe');
        iframe.src = url;
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    
    function closeGame() {
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameIframe');
        modal.classList.add('hidden');
        iframe.src = '';
        document.body.style.overflow = 'auto';
    }
    
    function addPointsToPlayer(gameId, points) {
        const game = gamesData.find(g=>g.id === gameId);
        if(game) {
            game.points += points;
            updateRanking();
        }
    }
    
    function showAd(callback) {
        const adDiv = document.getElementById('adPopup');
        adDiv.style.display = 'block';
        pendingGameCallback = callback;
        if(adTimeout) clearTimeout(adTimeout);
        adTimeout = setTimeout(()=> closeAd(), 5000);
    }
    
    function closeAd() {
        const adDiv = document.getElementById('adPopup');
        adDiv.style.display = 'none';
        if(adTimeout) clearTimeout(adTimeout);
        if(pendingGameCallback) {
            pendingGameCallback();
            pendingGameCallback = null;
        }
    }
    
    // التنقل بين الصفحات
    function showHomePage() {
        document.getElementById('homePage').classList.remove('page-hidden');
        document.getElementById('categoryPage').classList.add('page-hidden');
    }
    
    function showCategoryPage(category, categoryName) {
        renderCategoryGames(category, categoryName);
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    // Premium
    document.getElementById('premiumBtn').addEventListener('click', ()=>{
        isPremium = true;
        alert('🎉 أصبحت حساباً مميزاً! لن تظهر لك إعلانات بعد الآن.');
        document.getElementById('premiumBtn').style.opacity = '0.7';
    });
    
    // أزرار الأنواع - تفتح صفحة فرعية
    document.querySelectorAll('.cat-badge').forEach(badge=>{
        badge.addEventListener('click', ()=>{
            const cat = badge.getAttribute('data-cat');
            let catName = "";
            if(cat === "action") catName = "ألعاب الأكشن";
            else if(cat === "racing") catName = "ألعاب السباقات";
            else if(cat === "fighting") catName = "ألعاب القتال";
            else if(cat === "puzzle") catName = "ألعاب الألغاز";
            showCategoryPage(cat, catName);
        });
    });
    
    // زر العودة للرئيسية
    document.getElementById('backToHomeBtn').addEventListener('click', ()=>{
        showHomePage();
    });
    
    // إغلاق نافذة اللعبة
    document.getElementById('gameModal').addEventListener('click', (e)=>{
        if(e.target === document.getElementById('gameModal')) closeGame();
    });
    
    // موسيقى
    const music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3');
    music.loop = true;
    music.volume = 0.1;
    let playing = false;
    const musicBtn = document.getElementById('musicToggle');
    musicBtn.onclick = () => {
        if(playing) { music.pause(); musicBtn.innerHTML = '🎵 تشغيل الموسيقى'; }
        else { music.play().catch(e=>{}); musicBtn.innerHTML = '🔇 إيقاف الموسيقى'; }
        playing = !playing;
    };
    document.body.addEventListener('touchstart', ()=>{
        if(!playing) { music.play().catch(e=>{}); playing=true; musicBtn.innerHTML='🔇 إيقاف الموسيقى'; }
    }, {once:true});
    
    // بدء التشغيل
    updateRanking();
    renderAllGames();
</script>
</body>
</html>
