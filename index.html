<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dido Game</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#050816;
overflow-x:hidden;
color:white;
}

/* =========================
   الواجهة الرئيسية
========================= */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
animation:glow 5s infinite alternate;
}

.hero h1{
font-size:80px;
font-weight:900;
background:linear-gradient(45deg,#ff00aa,#7b4dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.hero p{
font-size:24px;
max-width:700px;
opacity:0.9;
}

/* =========================
   قسم الألعاب
========================= */

.games-section{
padding:80px 5%;
}

.section-title{
font-size:45px;
margin-bottom:40px;
color:white;
text-align:center;
text-shadow:0 0 20px #ff00aa;
}

.games-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
}

.game{
background:#111827;
border-radius:25px;
overflow:hidden;
border:2px solid #ffffff10;
position:relative;
transition:0.4s;
cursor:pointer;
}

.game:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px #ff00aa55;
}

.game img{
width:100%;
height:220px;
object-fit:cover;
}

.game-info{
padding:20px;
color:white;
}

.game-info h3{
font-size:28px;
margin-bottom:10px;
}

.game-info p{
opacity:0.8;
margin-bottom:20px;
}

.play{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff00aa,#7b4dff);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.play:hover{
transform:scale(1.05);
}

/* =========================
   نافذة اللعبة
========================= */

.game-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
backdrop-filter:blur(10px);
}

.game-box{
width:95%;
height:90%;
background:#08111f;
border-radius:25px;
overflow:hidden;
border:2px solid #ff00aa;
box-shadow:0 0 40px #ff00aa88;
display:flex;
flex-direction:column;
}

.game-top{
height:70px;
background:linear-gradient(45deg,#ff00aa,#7b4dff);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
font-size:24px;
font-weight:bold;
}

.close-game{
width:45px;
height:45px;
border:none;
border-radius:50%;
background:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

#gameFrame{
flex:1;
width:100%;
border:none;
background:black;
}

/* =========================
   زر الموسيقى
========================= */

#musicBtn{
position:fixed;
bottom:120px;
left:20px;
width:70px;
height:70px;
border:none;
border-radius:50%;
background:linear-gradient(45deg,#ff00aa,#7b4dff);
color:white;
font-size:30px;
z-index:999;
box-shadow:0 0 25px #ff00aa;
cursor:pointer;
}

/* =========================
   تأثيرات
========================= */

@keyframes glow{

0%{
box-shadow:0 0 25px #ff00aa44;
}

100%{
box-shadow:0 0 45px #8c52ff;
}

}

/* =========================
   Responsive
========================= */

@media(max-width:768px){

.hero h1{
font-size:50px;
}

.hero p{
font-size:18px;
}

.section-title{
font-size:35px;
}

}

</style>

</head>

<body>

<!-- =========================
     الواجهة الرئيسية
========================= -->

<section class="hero">

<h1>Dido Game</h1>

<p>
أفضل منصة ألعاب أنمي تحتوي على ألعاب قتال وسباقات ورعب ومغامرات تعمل مباشرة داخل الموقع
</p>

</section>

<!-- =========================
     قسم الألعاب
========================= -->

<section class="games-section">

<h2 class="section-title">
🔥 عالم الألعاب
</h2>

<div class="games-grid">

<!-- لعبة 1 -->

<div class="game">

<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop">

<div class="game-info">

<h3>Anime Fighters</h3>

<p>
قتالات أنمي ملحمية وسريعة
</p>

<button class="play">
🎮 العب الآن
</button>

</div>

</div>

<!-- لعبة 2 -->

<div class="game">

<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">

<div class="game-info">

<h3>Car Racing</h3>

<p>
سباقات سيارات مجنونة
</p>

<button class="play">
🏎️ ابدأ السباق
</button>

</div>

</div>

<!-- لعبة 3 -->

<div class="game">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop">

<div class="game-info">

<h3>Zombie Hunter</h3>

<p>
قاتل الزومبي وابق حياً
</p>

<button class="play">
🧟 ابدأ الحرب
</button>

</div>

</div>

</div>

</section>

<!-- =========================
     نافذة تشغيل الألعاب
========================= -->

<div id="gameModal" class="game-modal">

<div class="game-box">

<div class="game-top">

<h2 id="gameTitle">🎮 اللعبة</h2>

<button class="close-game" onclick="closeGame()">✖</button>

</div>

<iframe id="gameFrame" src=""></iframe>

</div>

</div>

<!-- =========================
     موسيقى الخلفية
========================= -->

<audio id="bgMusic" loop>

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=cyberpunk-gaming-112191.mp3" type="audio/mp3">

</audio>

<button id="musicBtn" onclick="toggleMusic()">
🎵
</button>

<script>

/* =========================
   روابط الألعاب
========================= */

const games = {

"Anime Fighters":
"https://www.crazygames.com/embed/swordbattle-io",

"Car Racing":
"https://www.crazygames.com/embed/madalin-stunt-cars-2",

"Zombie Hunter":
"https://www.crazygames.com/embed/dead-zed"

};

/* =========================
   تشغيل الألعاب
========================= */

document.querySelectorAll(".play").forEach((btn,index)=>{

btn.addEventListener("click",()=>{

const title =
document.querySelectorAll(".game-info h3")[index].innerText;

openGame(title);

});

});

function openGame(title){

document.getElementById("gameTitle").innerText =
"🎮 " + title;

document.getElementById("gameFrame").src =
games[title];

document.getElementById("gameModal").style.display =
"flex";

}

/* =========================
   إغلاق اللعبة
========================= */

function closeGame(){

document.getElementById("gameModal").style.display =
"none";

document.getElementById("gameFrame").src = "";

}

/* =========================
   الموسيقى
========================= */

const music =
document.getElementById("bgMusic");

let playing = false;

function toggleMusic(){

if(!playing){

music.play();

playing = true;

document.getElementById("musicBtn").innerHTML =
"🔊";

}else{

music.pause();

playing = false;

document.getElementById("musicBtn").innerHTML =
"🎵";

}

}

/* =========================
   تشغيل تلقائي للموسيقى
========================= */

document.body.addEventListener("click",()=>{

if(!playing){

music.play();

playing = true;

document.getElementById("musicBtn").innerHTML =
"🔊";

}

},{once:true});

</script>

</body>
</html>
