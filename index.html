<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Game</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial;
overflow:hidden;
color:white;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:linear-gradient(#1a1a1a,#000);
}

#player{
position:absolute;
bottom:20px;
left:50%;
width:70px;
height:70px;
background:cyan;
border-radius:15px;
transform:translateX(-50%);
box-shadow:0 0 20px cyan;
}

.coin{
position:absolute;
width:40px;
height:40px;
background:gold;
border-radius:50%;
box-shadow:0 0 15px yellow;
}

.enemy{
position:absolute;
width:50px;
height:50px;
background:red;
border-radius:10px;
box-shadow:0 0 15px red;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:100;
font-size:22px;
}

#gameover{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:20px;
display:none;
text-align:center;
}

button{
padding:12px 20px;
font-size:20px;
border:none;
border-radius:10px;
background:cyan;
cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<div id="ui">
⭐ <span id="score">0</span><br>
🏆 Level: <span id="level">1</span>
</div>

<div id="player"></div>

<div id="gameover">
<h1>Game Over</h1>
<button onclick="restart()">إكمال اللعب</button>
</div>

</div>

<audio id="music" loop autoplay>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=gaming-music-95247.mp3">
</audio>

<script>
const game=document.getElementById("game");
const player=document.getElementById("player");
const scoreText=document.getElementById("score");
const levelText=document.getElementById("level");
const gameover=document.getElementById("gameover");
const music=document.getElementById("music");

let x=window.innerWidth/2;
let score=0;
let level=parseInt(localStorage.getItem("level")) || 1;
let playing=true;

levelText.innerText=level;

document.body.addEventListener("touchmove",(e)=>{
x=e.touches[0].clientX;
player.style.left=x+"px";
});

document.body.addEventListener("mousemove",(e)=>{
x=e.clientX;
player.style.left=x+"px";
});

function createCoin(){
if(!playing) return;

const coin=document.createElement("div");
coin.classList.add("coin");

coin.style.left=Math.random()*
(window.innerWidth-40)+"px";

coin.style.top="-50px";

game.appendChild(coin);

let speed=3+level;

const fall=setInterval(()=>{

let top=parseInt(coin.style.top);
coin.style.top=top+speed+"px";

const coinRect=coin.getBoundingClientRect();
const playerRect=player.getBoundingClientRect();

if(
coinRect.left<playerRect.right &&
coinRect.right>playerRect.left &&
coinRect.top<playerRect.bottom &&
coinRect.bottom>playerRect.top
){
score++;
scoreText.innerText=score;

coin.remove();
clearInterval(fall);

if(score%15===0){
level++;
localStorage.setItem("level",level);
levelText.innerText=level;
}
}

if(top>window.innerHeight){
coin.remove();
clearInterval(fall);
}

},20);
}

function createEnemy(){
if(!playing) return;

const enemy=document.createElement("div");
enemy.classList.add("enemy");

enemy.style.left=Math.random()*
(window.innerWidth-50)+"px";

enemy.style.top="-60px";

game.appendChild(enemy);

let speed=4+level;

const fall=setInterval(()=>{

let top=parseInt(enemy.style.top);
enemy.style.top=top+speed+"px";

const enemyRect=enemy.getBoundingClientRect();
const playerRect=player.getBoundingClientRect();

if(
enemyRect.left<playerRect.right &&
enemyRect.right>playerRect.left &&
enemyRect.top<playerRect.bottom &&
enemyRect.bottom>playerRect.top
){
playing=false;
gameover.style.display="block";
clearInterval(fall);
}

if(top>window.innerHeight){
enemy.remove();
clearInterval(fall);
}

},20);
}

function restart(){
playing=true;
gameover.style.display="none";
}

setInterval(createCoin,900);
setInterval(createEnemy,1400);

document.body.addEventListener("click",()=>{
music.play();
});
</script>

</body>
</html>
