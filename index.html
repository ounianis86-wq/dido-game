 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dido Game Hub</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      background:linear-gradient(90deg,#2563eb,#7c3aed);
      padding:25px;
      text-align:center;
      box-shadow:0 4px 10px rgba(0,0,0,0.4);
    }

    header h1{
      font-size:38px;
      margin-bottom:10px;
    }

    .categories{
      display:flex;
      gap:10px;
      padding:20px;
      overflow:auto;
    }

    .categories button{
      border:none;
      padding:12px 20px;
      border-radius:30px;
      background:#1e293b;
      color:white;
      cursor:pointer;
      transition:0.3s;
      min-width:max-content;
    }

    .categories button:hover{
      background:#3b82f6;
    }

    .games{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:170px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
    }

    .card h3{
      margin-bottom:10px;
    }

    iframe{
      width:100%;
      height:220px;
      border:none;
      border-radius:12px;
      margin-top:10px;
      background:white;
    }

    footer{
      text-align:center;
      padding:30px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>🎮 Dido Game Hub</h1>
  <p>منصة ألعاب تحتوي على ألعاب كثيرة ومتنوعة</p>
</header>

<div class="categories">
  <button>🏎️ سباقات</button>

  <button>⚔️ أكشن</button>
  <button>👾 أركيد</button>
  <button>🚀 مغامرات</button>
</div>

<div class="games">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
    <div class="card-content">
      <h3>سباق السيارات</h3>

    <div class="card-content">
      <h3>لعبة الذكاء 2048</h3>

    <div class="card-content">
      <h3>مغامرة النينجا</h3>

  <div class="card">

    <div class="card-content">
      <h3>الطائرات الحربية</h3>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=1200&auto=format&fit=crop">

</div>

<footer>
  جميع الحقوق محفوظة © Dido Game Hub
</footer>

</body>
</html>
