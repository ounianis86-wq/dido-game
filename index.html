<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - 3D Anime City | العب مباشرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 6px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(5,5,20,0.75);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            overflow: hidden;
            height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #ff00ff, 0 0 20px #00ffff, 0 0 10px #ff44ff80;
            position: relative;
            border: 1px solid rgba(255,68,255,0.3);
            animation: borderPulse 2s ease-in-out infinite;
        }
        
        @keyframes borderPulse {
            0% { box-shadow: 0 0 20px #ff00ff, 0 0 10px #00ffff; border-color: rgba(255,68,255,0.3); }
            50% { box-shadow: 0 0 50px #ff44ff, 0 0 30px #00ffff, 0 0 20px #ff44ff; border-color: rgba(255,68,255,0.8); }
            100% { box-shadow: 0 0 20px #ff00ff, 0 0 10px #00ffff; border-color: rgba(255,68,255,0.3); }
        }

        .content {
            padding: 8px 10px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }

        .anime-hero {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20, #ff44ff20);
            border-radius: 25px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 20px #ff44ff, inset 0 0 15px #ff44ff20;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px #ff44ff, inset 0 0 10px #ff44ff20; border-color: #ff44ff; }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff, inset 0 0 20px #ff44ff40; border-color: #00ffff; }
            100% { box-shadow: 0 0 10px #ff44ff, inset 0 0 10px #ff44ff20; border-color: #ff44ff; }
        }
        
        .character-img {
            width: 120px;
            height: 120px;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 3px solid #ff44ff;
            position: relative;
            box-shadow: 0 0 25px #ff44ff, 0 0 15px #00ffff;
            animation: rotateGlow 3s linear infinite;
        }
        
        @keyframes rotateGlow {
            0% { box-shadow: 0 0 15px #ff44ff; }
            50% { box-shadow: 0 0 35px #00ffff, 0 0 20px #ff44ff; }
            100% { box-shadow: 0 0 15px #ff44ff; }
        }
        
        .controller-on-hand {
            position: absolute;
            bottom: -8px;
            right: -8px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 2px solid white;
            box-shadow: 0 0 15px #00ffff;
            animation: spin 4s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .character-info {
            text-align: center;
        }
        
        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff, #00ffff);
            padding: 5px 14px;
            border-radius: 22px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin: 4px 0;
            font-family: monospace;
            letter-spacing: 2px;
            box-shadow: 0 0 15px #ff44ff;
            animation: textGlow 2s ease-in-out infinite;
        }
        
        @keyframes textGlow {
            0% { box-shadow: 0 0 10px #ff44ff; background: linear-gradient(135deg, #ff3366, #ff44ff); }
            100% { box-shadow: 0 0 25px #00ffff; background: linear-gradient(135deg, #ff44ff, #00ffff); }
        }
        
        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.85rem;
            animation: rainbowText 3s linear infinite;
        }
        
        @keyframes rainbowText {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .challenge-look {
            font-size: 0.65rem;
            color: #ffaa88;
            text-shadow: 0 0 8px #ff44ff;
        }

        .ranking-section {
            margin-bottom: 10px;
            text-align: center;
        }
        
        .ranking-circles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .rank-circle {
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .rank-circle:hover {
            transform: scale(1.1);
        }
        
        .gold-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 3px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px #ffd700, 0 0 10px #ffaa00;
            animation: goldPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 10px #ffd700; }
            50% { box-shadow: 0 0 30px #ffd700, 0 0 20px #ffaa00; }
        }
        
        .silver-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 3px;
            border: 1.5px solid #c0c0c0;
            box-shadow: 0 0 15px #c0c0c0;
        }
        
        .bronze-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #cd7f32, #b8651a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 3px;
            border: 1.5px solid #cd7f32;
            box-shadow: 0 0 15px #cd7f32;
        }
        
        .rank-name {
            color: white;
            font-size: 0.55rem;
            font-weight: bold;
            margin-top: 2px;
            text-shadow: 0 0 5px #ff44ff;
        }
        
        .rank-points {
            color: #ffcc00;
            font-size: 0.5rem;
            text-shadow: 0 0 3px #ffaa00;
        }
        
        .crown-icon {
            font-size: 0.75rem;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 5px gold);
        }

        .categories-section {
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        
        .cat-badge {
            background: linear-gradient(135deg, #ff44ff30, #00ffff30);
            border: 1px solid #ff44ff;
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px #ff44ff;
        }
        
        .cat-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #ff44ff, 0 0 10px #00ffff;
            background: linear-gradient(135deg, #ff44ff60, #00ffff60);
            border-color: #00ffff;
        }

        /* الإعلان الثابت - يظهر دائماً في وسط الصفحة ولا يختفي أبداً */
        .fixed-permanent-ad {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border: 3px solid #ff44ff;
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            box-shadow: 0 0 25px #ff44ff, inset 0 0 10px #ff44ff30;
            animation: permanentAdGlow 2s ease-in-out infinite;
        }
        
        @keyframes permanentAdGlow {
            0%, 100% { box-shadow: 0 0 15px #ff44ff; border-color: #ff44ff; }
            50% { box-shadow: 0 0 35px #00ffff, 0 0 20px #ff44ff; border-color: #00ffff; }
        }
        
        .fixed-permanent-ad-icon {
            font-size: 2.2rem;
            margin-bottom: 5px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .fixed-permanent-ad-title {
            color: white;
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 0 0 5px #ff44ff;
        }
        
        .fixed-permanent-ad-text {
            color: #ffaa88;
            font-size: 0.6rem;
            margin-top: 5px;
        }
        
        .ad-refresh-note {
            color: #88ffaa;
            font-size: 0.5rem;
            margin-top: 8px;
            border-top: 1px dashed #ff44ff;
            padding-top: 5px;
        }

        /* إعلان مؤقت - يظهر عند دخول اللعبة فقط للمستخدم العادي */
        .temp-ad-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .temp-ad-box {
            background: linear-gradient(135deg, #1a0033, #0a002a);
            border: 3px solid #ff44ff;
            border-radius: 30px;
            padding: 25px 20px;
            text-align: center;
            max-width: 280px;
            width: 85%;
            box-shadow: 0 0 50px #ff44ff;
        }
        
        .temp-ad-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .temp-ad-title {
            color: white;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .temp-ad-timer {
            color: #ff44ff;
            font-size: 2rem;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .temp-ad-button {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .temp-ad-button.active {
            cursor: pointer;
            opacity: 1;
            animation: btnPulse 0.8s infinite;
        }
        
        @keyframes btnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .games-wrapper {
            margin-top: 0;
            margin-bottom: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .two-rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 0;
        }
        
        .game-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .game-row::-webkit-scrollbar {
            display: none;
        }
        
        .game-card {
            min-width: 100px;
            width: 100px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 14px;
            padding: 7px;
            text-align: center;
            border: 1px solid #ff44ff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px #ff44ff;
        }
        
        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff, 0 0 15px #ff44ff;
            background: linear-gradient(145deg, #1a1a3a, #0f0f2a);
        }
        
        .game-img {
            width: 100%;
            height: 70px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }
        
        .game-card:hover .game-img {
            box-shadow: 0 0 15px #ff44ff;
        }
        
        .game-title {
            color: white;
            font-size: 0.55rem;
            font-weight: bold;
            text-shadow: 0 0 3px #ff44ff;
        }
        
        .game-cat {
            color: #00ffff;
            font-size: 0.45rem;
            text-shadow: 0 0 3px #00ffff;
        }

        .back-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 5px 14px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 8px;
            cursor: pointer;
            display: inline-block;
            font-size: 0.55rem;
            box-shadow: 0 0 15px #ff44ff;
            transition: all 0.2s ease;
        }
        
        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #00ffff;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 12px;
            border-top: 1px solid #ff44ff;
            margin-top: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .register-btn {
            background: linear-gradient(135deg, #ff44ff30, #00ffff30);
            border: 1px solid #ff44ff;
            padding: 3px 10px;
            border-radius: 18px;
            color: white;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px #ff44ff;
        }
        
        .register-btn.vip-active {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            box-shadow: 0 0 15px #ff44ff;
        }
        
        .register-btn:hover {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            box-shadow: 0 0 20px #ff44ff;
            transform: scale(1.05);
        }
        
        .music-bottom-btn {
            background: #000000aa;
            backdrop-filter: blur(5px);
            padding: 3px 10px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.5rem;
            border: 1px solid #0ff;
            box-shadow: 0 0 8px #0ff;
            transition: all 0.2s ease;
        }
        
        .music-bottom-btn:hover {
            box-shadow: 0 0 20px #0ff;
            transform: scale(1.05);
        }

        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-modal iframe {
            width: 95%;
            height: 80%;
            border-radius: 15px;
            border: 3px solid #ff44ff;
            background: white;
            box-shadow: 0 0 50px #ff44ff, 0 0 30px #00ffff;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ff3366, #ff44ff);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff44ff;
            transition: all 0.2s ease;
        }
        
        .close-modal:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #ff3366;
        }
        
        .hidden {
            display: none;
        }

        .page {
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .page-hidden {
            display: none;
        }
        
        .section-title {
            color: white;
            font-size: 0.6rem;
            margin: 5px 0 3px 0;
            text-align: center;
            text-shadow: 0 0 8px #ff44ff;
            letter-spacing: 1px;
        }
        
        .vip-badge {
            background: #ff44ff;
            color: white;
            font-size: 0.45rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img">
                    <div class="controller-on-hand">🎮</div>
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚡ DIDO-GAME ⚡</div>
                    <h2>😤 نظرة التحدي النيونية!</h2>
                    <div class="challenge-look">"هيا تحداني في عالم النيون!"</div>
                </div>
            </div>
            
            <div class="ranking-section">
                <div class="ranking-circles" id="rankingList"></div>
            </div>
            
            <div class="categories-section">
                <div class="categories" id="categoriesList">
                    <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                    <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                    <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                    <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
                </div>
            </div>
            
            <!-- الإعلان الثابت - يظهر دائماً للجميع ولا يختفي أبداً -->
            <div class="fixed-permanent-ad" id="permanentAd">
                <div class="fixed-permanent-ad-icon" id="adIcon">📺✨</div>
                <div class="fixed-permanent-ad-title" id="adTitle">إعلان ممول</div>
                <div class="fixed-permanent-ad-text" id="adText">هذا الإعلان يظهر للجميع بشكل دائم</div>
                <div class="ad-refresh-note" id="adRefreshNote">🔄 يتغير تلقائياً كل 10 ثوانٍ</div>
            </div>
            
            <div class="games-wrapper">
                <div class="two-rows" id="gamesContainer"></div>
            </div>
        </div>

        <div id="categoryPage" class="page page-hidden">
            <button class="back-btn" id="backToHomeBtn">🔙 العودة إلى النيون</button>
            <div class="two-rows" id="categoryGamesContainer"></div>
        </div>

    </div>
    
    <div class="bottom-bar">
        <div class="register-btn" id="registerBtn">📝 ترقية إلى VIP</div>
        <div class="music-bottom-btn" id="musicBottomBtn">🎵 تشغيل</div>
    </div>
</div>

<!-- الإعلان المؤقت - يظهر فقط للمستخدم العادي عند دخول اللعبة -->
<div id="tempAdOverlay" class="temp-ad-overlay hidden">
    <div class="temp-ad-box">
        <div class="temp-ad-icon">📺⏳</div>
        <div class="temp-ad-title">إعلان أثناء اللعب</div>
        <div class="temp-ad-text" style="color:#ffaa88; font-size:0.7rem; margin:5px 0;">لا يمكن تخطيه</div>
        <div class="temp-ad-timer" id="tempAdTimer">5</div>
        <button class="temp-ad-button" id="tempAdBtn" disabled>⏳ انتظر...</button>
    </div>
</div>

<div id="gameModal" class="game-modal hidden">
    <div class="close-modal" onclick="closeGame()">✕</div>
    <iframe id="gameIframe" src="" allowfullscreen></iframe>
</div>

<script>
    const gamesData = [
        { id:1, name:"Sonic", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, avatar:"🦔", playerName:"Shadow" },
        { id:2, name:"Subway Surfers", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, avatar:"🏃", playerName:"Speed" },
        { id:3, name:"Temple Run 2", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, avatar:"🏛️", playerName:"RunKing" },
        { id:4, name:"Hill Climb", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, avatar:"🚗", playerName:"Climber" },
        { id:5, name:"Slope", img:"https://images.hdqwalls.com/wallpapers/slope-game-hd.jpg", url:"https://www.crazygames.com/embed/slope", cat:"racing", points:220, avatar:"⚡", playerName:"Fast" },
        { id:6, name:"Street Fighter", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, avatar:"👊", playerName:"Fighter" },
        { id:7, name:"Mortal Kombat", img:"https://images.hdqwalls.com/wallpapers/mortal-kombat-11-4k-2020-45.jpg", url:"https://www.crazygames.com/embed/mortal-kombat", cat:"fighting", points:280, avatar:"💀", playerName:"Scorpion" },
        { id:8, name:"Among Us", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, avatar:"👽", playerName:"Impostor" },
        { id:9, name:"Gardenscapes", img:"https://images.hdqwalls.com/wallpapers/gardenscapes-2020-2021-4k-47.jpg", url:"https://www.crazygames.com/embed/gardenscapes", cat:"puzzle", points:70, avatar:"🌷", playerName:"Garden" },
        { id:10, name:"Free Fire", img:"https://images.hdqwalls.com/wallpapers/free-fire-2020-game-4k-g6.jpg", url:"https://www.crazygames.com/embed/free-fire", cat:"action", points:350, avatar:"🔥", playerName:"Fire" },
        { id:11, name:"Call of Duty", img:"https://images.hdqwalls.com/wallpapers/call-of-duty-mobile-2020-04-m3.jpg", url:"https://www.crazygames.com/embed/call-of-duty", cat:"action", points:320, avatar:"🔫", playerName:"Soldier" },
        { id:12, name:"Basketball Stars", img:"https://images.hdqwalls.com/wallpapers/basketball-4k-2021-6m.jpg", url:"https://www.crazygames.com/embed/basketball-stars", cat:"racing", points:160, avatar:"🏀", playerName:"Hooper" }
    ];
    
    // قائمة الإعلانات الثابتة (تتغير تلقائياً)
    const permanentAds = [
        { icon: "📺✨", title: "إعلان ممول", text: "اشترك الآن في عروضنا الحصرية!" },
        { icon: "🎮🔥", title: "لعبة الأسبوع", text: "جرب لعبة جديدة كل أسبوع!" },
        { icon: "💰💎", title: "خصم 50%", text: "عروض لا تُفوت! اشترك الآن" },
        { icon: "🚀⚡", title: "تحديث جديد", text: "أحدث الإصدارات متوفرة الآن" },
        { icon: "🎁🎉", title: "هدية اليوم", text: "احصل على مكافآت يومية" },
        { icon: "🏆👑", title: "البطولة الكبرى", text: "سجل الآن واربح الجوائز" }
    ];
    
    let isPremium = false;
    let pendingGameCallback = null;
    let adInterval = null;
    let currentAdIndex = 0;
    let tempAdInterval = null;
    
    // تحديث الإعلان الثابت (يتغير كل 10 ثوانٍ)
    function refreshPermanentAd() {
        currentAdIndex = (currentAdIndex + 1) % permanentAds.length;
        const ad = permanentAds[currentAdIndex];
        document.getElementById('adIcon').innerHTML = ad.icon;
        document.getElementById('adTitle').innerHTML = ad.title;
        document.getElementById('adText').innerHTML = ad.text;
    }
    
    // بدء التغيير التلقائي للإعلان الثابت
    function startPermanentAdRotation() {
        if (adInterval) clearInterval(adInterval);
        adInterval = setInterval(() => {
            refreshPermanentAd();
        }, 10000);
    }
    
    // إعلان مؤقت عند دخول اللعبة (للمستخدم العادي فقط)
    function showTempAd(callback) {
        pendingGameCallback = callback;
        const overlay = document.getElementById('tempAdOverlay');
        const timerElement = document.getElementById('tempAdTimer');
        const btn = document.getElementById('tempAdBtn');
        
        overlay.classList.remove('hidden');
        let seconds = 5;
        timerElement.textContent = seconds;
        btn.disabled = true;
        btn.classList.remove('active');
        btn.textContent = '⏳ انتظر...';
        
        if (tempAdInterval) clearInterval(tempAdInterval);
        
        tempAdInterval = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(tempAdInterval);
                btn.disabled = false;
                btn.classList.add('active');
                btn.textContent = '✅ متابعة';
            }
        }, 1000);
        
        // إعداد زر المتابعة
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.id = 'tempAdBtn';
        
        newBtn.onclick = () => {
            if (!newBtn.disabled) {
                overlay.classList.add('hidden');
                if (tempAdInterval) clearInterval(tempAdInterval);
                if (pendingGameCallback) {
                    pendingGameCallback();
                    pendingGameCallback = null;
                }
            }
        };
    }
    
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points);
        const gold = sorted[0];
        const silver = sorted[1];
        const bronze = sorted[2];
        
        document.getElementById('rankingList').innerHTML = `
            <div class="rank-circle">
                <div class="crown-icon">🥈</div>
                <div class="silver-circle">${silver ? silver.avatar : '👤'}</div>
                <div class="rank-name">${silver ? silver.playerName : '---'}</div>
                <div class="rank-points">⭐ ${silver ? silver.points : 0}</div>
            </div>
            <div class="rank-circle">
                <div class="crown-icon">👑</div>
                <div class="gold-circle">${gold ? gold.avatar : '👤'}</div>
                <div class="rank-name">${gold ? gold.playerName : '---'}</div>
                <div class="rank-points">⭐ ${gold ? gold.points : 0}</div>
            </div>
            <div class="rank-circle">
                <div class="crown-icon">🥉</div>
                <div class="bronze-circle">${bronze ? bronze.avatar : '👤'}</div>
                <div class="rank-name">${bronze ? bronze.playerName : '---'}</div>
                <div class="rank-points">⭐ ${bronze ? bronze.points : 0}</div>
            </div>
        `;
    }
    
    function renderAllGames() {
        const filtered = gamesData;
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        
        document.getElementById('gamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
        `;
        attachGameClickEvents('#gamesContainer');
    }
    
    function renderCategoryGames(category, categoryName) {
        const filtered = gamesData.filter(g => g.cat === category);
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}" data-name="${g.name}"><div class="game-img" style="background-image: url('${g.img}');"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat} ✨</div></div>`).join('')}</div>
        `;
        attachGameClickEvents('#categoryGamesContainer');
    }
    
    function attachGameClickEvents(containerId) {
        document.querySelectorAll(`${containerId} .game-card`).forEach(card=>{
            card.addEventListener('click', (e)=>{
                e.stopPropagation();
                const url = card.getAttribute('data-url');
                const name = card.getAttribute('data-name');
                const id = parseInt(card.getAttribute('data-id'));
                launchGame(url, name, id);
            });
        });
    }
    
    function launchGame(url, name, gameId) {
        if (isPremium) {
            // المستخدم المميز: يدخل اللعبة مباشرة دون أي إعلان
            openGameDirect(url, name);
            addPointsToPlayer(gameId, 5);
        } else {
            // المستخدم العادي: يشاهد إعلاناً لمدة 5 ثوانٍ قبل الدخول
            showTempAd(() => {
                openGameDirect(url, name);
                addPointsToPlayer(gameId, 5);
            });
        }
    }
    
    function openGameDirect(url, name) {
        document.getElementById('gameIframe').src = url;
        document.getElementById('gameModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    
    function closeGame() {
        document.getElementById('gameModal').classList.add('hidden');
        document.getElementById('gameIframe').src = '';
        document.body.style.overflow = 'auto';
    }
    
    function addPointsToPlayer(gameId, points) {
        const game = gamesData.find(g=>g.id === gameId);
        if(game) { game.points += points; updateRanking(); }
    }
    
    function showHomePage() {
        document.getElementById('homePage').classList.remove('page-hidden');
        document.getElementById('categoryPage').classList.add('page-hidden');
    }
    
    function showCategoryPage(category, categoryName) {
        renderCategoryGames(category, categoryName);
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    // الترقية إلى VIP
    document.getElementById('registerBtn').addEventListener('click', ()=>{
        if (!isPremium) {
            isPremium = true;
            const btn = document.getElementById('registerBtn');
            btn.innerHTML = '👑 VIP مفعل';
            btn.classList.add('vip-active');
            alert('🎉✨ تهانينا! أصبحت حساباً مميزاً ✨🎉\n\n✅ لن تظهر لك أي إعلانات أثناء اللعب بعد الآن!\n⚠️ ملاحظة: الإعلان الثابت في المنتصف يظهر للجميع.');
        } else {
            alert('أنت بالفعل حساب مميز! 🎉');
        }
    });
    
    document.querySelectorAll('.cat-badge').forEach(badge=>{
        badge.addEventListener('click', ()=>{
            const cat = badge.getAttribute('data-cat');
            let catName = cat === "action" ? "ألعاب الأكشن" : cat === "racing" ? "ألعاب السباقات" : cat === "fighting" ? "ألعاب القتال" : "ألعاب الألغاز";
            showCategoryPage(cat, catName);
        });
    });
    
    document.getElementById('backToHomeBtn').addEventListener('click', ()=> showHomePage());
    document.getElementById('gameModal').addEventListener('click', (e)=>{ if(e.target === document.getElementById('gameModal')) closeGame(); });
    
    // 🎵 موسيقى إلكترونية حماسية 🎵
    const music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    music.loop = true;
    music.volume = 0.12;
    let playing = true;
    const musicBottomBtn = document.getElementById('musicBottomBtn');
    musicBottomBtn.innerHTML = '🔇 إيقاف';
    
    const autoPlay = music.play();
    autoPlay.then(() => {
        playing = true;
        musicBottomBtn.innerHTML = '🔇 إيقاف';
    }).catch(() => {
        playing = false;
        musicBottomBtn.innerHTML = '🎵 تشغيل';
        const playOnInteraction = () => {
            music.play();
            playing = true;
            musicBottomBtn.innerHTML = '🔇 إيقاف';
            document.removeEventListener('click', playOnInteraction);
            document.removeEventListener('touchstart', playOnInteraction);
        };
        document.addEventListener('click', playOnInteraction);
        document.addEventListener('touchstart', playOnInteraction);
    });
    
    musicBottomBtn.onclick = () => {
        if(playing) { 
            music.pause(); 
            musicBottomBtn.innerHTML = '🎵 تشغيل'; 
            playing = false;
        } else { 
            music.play().catch(e => {}); 
            musicBottomBtn.innerHTML = '🔇 إيقاف'; 
            playing = true;
        }
    };
    
    // بدء تشغيل الإعلان الثابت المتغير
    startPermanentAdRotation();
    
    updateRanking();
    renderAllGames();
</script>
</body>
</html>
