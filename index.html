<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DIDO GAME - NEON ANIME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #0a0a0f 0%, #000000 100%);
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            padding: 12px;
            min-height: 100vh;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        /* توهج نيون قوي جداً */
        .neon-glow {
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
        }
        .neon-pink-glow {
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
        }
        
        .app {
            max-width: 480px;
            margin: 0 auto;
        }

        /* شعار نيون قوي */
        .logo-ps {
            background: linear-gradient(145deg, #0a0a2a, #050510);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            margin-bottom: 15px;
            border: 2px solid #00ffff;
            box-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, inset 0 0 10px #00ffff;
            animation: neonFlash 0.8s ease-in-out infinite alternate;
        }
        @keyframes neonFlash {
            from { box-shadow: 0 0 10px #0ff, 0 0 20px #0ff, inset 0 0 5px #0ff; border-color: #0ff; }
            to { box-shadow: 0 0 30px #ff00ff, 0 0 50px #ff00ff, inset 0 0 15px #ff00ff; border-color: #ff00ff; }
        }
        .ps-grip {
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            width: 35px;
            height: 35px;
            border-radius: 35px;
            box-shadow: 0 0 15px cyan, 0 0 25px magenta;
        }
        .logo-text h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            font-weight: 800;
        }
        .logo-text p {
            font-size: 0.55rem;
            color: #ff66ff;
            text-shadow: 0 0 8px magenta;
        }

        /* شريط الموسيقى وترتيب اللاعبين */
        .top-bar {
            background: #0a0a1acc;
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 6px 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #ffff00;
            box-shadow: 0 0 15px #ffff00, 0 0 25px #ffff00;
        }
        .music-control {
            background: #ff00ff40;
            border-radius: 30px;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #ff00ff;
        }
        .music-control button {
            background: #ff00ff;
            border: none;
            padding: 5px 10px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 12px #ff00ff;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .leaderboard {
            background: #00ffff40;
            border-radius: 30px;
            padding: 5px 10px;
            font-size: 0.7rem;
            border: 1px solid #0ff;
            text-shadow: 0 0 5px cyan;
        }
        .leaderboard span {
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 8px yellow;
        }

        /* نظام الحسابات */
        .account-section {
            background: #0a0a2a;
            border-radius: 35px;
            padding: 10px 15px;
            margin-bottom: 15px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 10px #ff00ff inset;
        }
        .account-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .plan {
            background: #1a1a4a;
            border-radius: 30px;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid #0ff;
            box-shadow: 0 0 8px cyan;
        }
        button {
            background: #ff00ff;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #ff00ff;
            transition: 0.05s linear;
            font-size: 0.75rem;
        }
        button:active {
            transform: scale(0.96);
        }
        .perks {
            font-size: 0.6rem;
            margin-top: 6px;
            color: #0ff;
            text-shadow: 0 0 5px cyan;
        }

        /* شبكة الألعاب - نوافذ أصغر */
        .games-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 12px 0 20px;
        }
        .game-window-card {
            background: #0a0a1aee;
            backdrop-filter: blur(5px);
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, 0 0 25px #00ffff;
            transition: 0.1s;
        }
        .anime-header {
            background-size: cover;
            background-position: center;
            padding: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 8px magenta, 0 0 15px cyan;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        /* صور أنمي حقيقية على كل بطاقة */
        .header-guess { 
            background: linear-gradient(0deg, #000000aa, #00000088), url('https://i.pinimg.com/236x/6b/8b/7a/6b8b7a5b8e3b6f5d4c3b2a1e0f9e8d7c.jpg');
            background-size: cover;
            background-position: center;
        }
        .header-memory { 
            background: linear-gradient(0deg, #000000aa, #00000088), url('https://i.pinimg.com/236x/8e/4f/9a/8e4f9a8b7c6d5e4f3a2b1c0d9e8f7a6b.jpg');
            background-size: cover;
            background-position: center;
        }
        .header-tictac { 
            background: linear-gradient(0deg, #000000aa, #00000088), url('https://i.pinimg.com/236x/2a/3b/4c/2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d.jpg');
            background-size: cover;
            background-position: center;
        }
        /* صور احتياطية إذا لم تظهر الصور */
        .header-guess::before { content: "🔮 神秘数字 🔮"; display: block; font-size: 1rem; }
        .header-memory::before { content: "🧬 記憶の対決 🧬"; display: block; font-size: 1rem; }
        .header-tictac::before { content: "⚔️ 三目勝負 ⚔️"; display: block; font-size: 1rem; }
        
        .window-body {
            padding: 12px;
        }
        .window-body p {
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: #ccddff;
        }
        .launch-btn {
            width: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            margin-top: 5px;
            padding: 8px;
            font-size: 0.8rem;
            color: black;
            font-weight: bold;
            text-shadow: 0 0 5px white;
            box-shadow: 0 0 20px cyan;
        }

        /* نافذة اللعبة المفتوحة - أصغر */
        .modal-game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: #0a0a2a;
            border-radius: 35px;
            width: 100%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 15px;
            border: 3px solid #00ffff;
            box-shadow: 0 0 30px #00ffff, 0 0 50px #ff00ff;
        }
        .close-modal {
            background: #ff00ff;
            float: right;
            margin-bottom: 8px;
            padding: 4px 12px;
            font-size: 0.7rem;
        }
        footer {
            text-align: center;
            font-size: 0.55rem;
            margin-top: 15px;
            color: #0ff;
            text-shadow: 0 0 5px cyan;
        }
        .hidden { display: none; }
        input {
            background: #1a1a3a;
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 40px;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
        }
        .game-message {
            background: #000000aa;
            border-radius: 30px;
            padding: 6px;
            text-shadow: 0 0 5px cyan;
            font-size: 0.7rem;
        }
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2a;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff00ff;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="logo-ps">
        <div class="ps-grip"></div>
        <div class="logo-text">
            <h1>DIDO GAME</h1>
            <p>✦ NEON ANIME ARCADE ✦</p>
        </div>
        <div class="ps-grip"></div>
    </div>

    <div class="top-bar">
        <div class="music-control">
            <span>🎵 NEON</span>
            <button id="toggleMusicBtn">🔊 تشغيل</button>
        </div>
        <div class="leaderboard" id="leaderboardDisplay">
            🏆 أفضل الشهر: <span id="topPlayerName">—</span> (<span id="topScoreVal">0</span>)
        </div>
    </div>

    <div class="account-section" id="accountSection">
        <div class="account-badge">
            <div class="plan" id="planType">🎴 مجاني</div>
            <button id="upgradeBtn">⭐ ترقية مميز</button>
        </div>
        <div class="perks" id="perksList">✨ 3 محاولات يومية ✨</div>
    </div>

    <div class="games-grid">
        <div class="game-window-card">
            <div class="anime-header header-guess"></div>
            <div class="window-body">
                <p>خمن الرقم السري - قوة الحدس الأنمي النيون</p>
                <button class="launch-btn" data-game="guess">🎮 فتح البوابة</button>
            </div>
        </div>
        <div class="game-window-card">
            <div class="anime-header header-memory"></div>
            <div class="window-body">
                <p>طابق الأزواج وارفع تصنيفك في القاعة النيون</p>
                <button class="launch-btn" data-game="memory">🌀 تحدى ذاكرتك</button>
            </div>
        </div>
        <div class="game-window-card">
            <div class="anime-header header-tictac"></div>
            <div class="window-body">
                <p>معركة الساموراي X & O بلمسة نيون ساطعة</p>
                <button class="launch-btn" data-game="tictac">🔥 خوض المعركة</button>
            </div>
        </div>
    </div>
    <footer>💜 مميز: 5 محاولات + اسم ذهبي نيون + مكافآت +20%</footer>
</div>

<div id="gameModal" class="modal-game hidden">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">✖ إغلاق</button>
        <div id="modalGameInner"></div>
    </div>
</div>

<script>
    // ========== موسيقى تعمل بشكل مضمون (ملف أساسي قصير) ==========
    // استخدام ملف موسيقى قصير ومضمون التشغيل
    const bgMusic = new Audio('https://actions.google.com/sound/bar/office-door-bell-ring.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.25;
    let musicPlaying = false;
    
    function playMusic() {
        bgMusic.play().then(() => {
            musicPlaying = true;
            document.getElementById('toggleMusicBtn').innerHTML = '🔇 كتم';
        }).catch(e => {
            console.log("تشغيل الموسيقى يحتاج تفاعل");
            musicPlaying = false;
        });
    }
    function pauseMusic() {
        bgMusic.pause();
        musicPlaying = false;
        document.getElementById('toggleMusicBtn').innerHTML = '🎵 تشغيل';
    }
    
    document.getElementById('toggleMusicBtn').addEventListener('click', () => {
        if(musicPlaying) {
            pauseMusic();
        } else {
            playMusic();
        }
    });
    
    // تشغيل الموسيقى عند أول لمسة في الصفحة (لحل مشكلة حظر المتصفح)
    document.body.addEventListener('touchstart', function initMusic() {
        if(!musicPlaying) {
            playMusic();
        }
        document.body.removeEventListener('touchstart', initMusic);
    }, { once: true });
    
    // محاولة تشغيل تلقائي فورية (قد تنجح في بعض المتصفحات)
    setTimeout(() => {
        if(!musicPlaying) {
            bgMusic.play().catch(() => {});
        }
    }, 100);
    
    // ========== نظام الحسابات ==========
    let isPremium = false;
    const planSpan = document.getElementById('planType');
    const perksSpan = document.getElementById('perksList');
    function updateAccountUI() {
        if(isPremium) {
            planSpan.innerHTML = '👑 مميز نيون 👑';
            planSpan.style.background = "linear-gradient(90deg,#ff00ff,#00ffff)";
            planSpan.style.color = "black";
            perksSpan.innerHTML = '✨ 5 محاولات ✨ اسم ذهبي ✨ +20% نقاط ✨';
        } else {
            planSpan.innerHTML = '🎴 مجاني';
            planSpan.style.background = "#1a1a4a";
            planSpan.style.color = "#0ff";
            perksSpan.innerHTML = '✨ 3 محاولات يومية ✨';
        }
        updateLeaderboardDisplay();
    }
    document.getElementById('upgradeBtn').addEventListener('click',()=>{
        if(confirm("⭐ ترقية إلى مميز نيون (4.99$) تجريبياً؟ مزايا رائعة!")){
            isPremium = true;
            updateAccountUI();
            alert("✨ تم الترقية! استمتع بالمزايا النيون ✨");
        }
    });
    
    // ========== لوحة المتصدرين ==========
    let topPlayers = JSON.parse(localStorage.getItem('dido_topPlayers')) || [];
    function updateLeaderboardDisplay() {
        if(topPlayers.length===0){
            document.getElementById('topPlayerName').innerText = "—";
            document.getElementById('topScoreVal').innerText = "0";
            return;
        }
        topPlayers.sort((a,b)=>b.score - a.score);
        const top = topPlayers[0];
        document.getElementById('topPlayerName').innerHTML = top.isPremiumBonus ? `👑✨ ${top.name} ✨👑` : top.name;
        document.getElementById('topScoreVal').innerText = top.score;
    }
    function recordScore(playerName, gameScore) {
        if(!playerName || playerName.trim()==="") playerName = "مقاتل نيون";
        let effectiveScore = gameScore;
        if(isPremium) effectiveScore = Math.floor(gameScore * 1.2);
        topPlayers.push({ name: playerName.slice(0,10), score: effectiveScore, isPremiumBonus: isPremium });
        topPlayers.sort((a,b)=>b.score - a.score);
        topPlayers = topPlayers.slice(0,12);
        localStorage.setItem('dido_topPlayers', JSON.stringify(topPlayers));
        updateLeaderboardDisplay();
    }
    
    // ========== المحاولات اليومية ==========
    function canPlayGame() {
        let attemptsUsed = parseInt(localStorage.getItem('dido_attempts_today') || '0');
        let lastDate = localStorage.getItem('dido_last_date');
        const today = new Date().toDateString();
        if(lastDate !== today){
            localStorage.setItem('dido_last_date', today);
            localStorage.setItem('dido_attempts_today', '0');
            attemptsUsed = 0;
        }
        let maxAttempts = isPremium ? 5 : 3;
        if(attemptsUsed >= maxAttempts) {
            alert(`⚠️ استنفذت محاولاتك (${maxAttempts}/${maxAttempts}) - عود غداً!`);
            return false;
        }
        return true;
    }
    function consumeAttempt() {
        let attemptsUsed = parseInt(localStorage.getItem('dido_attempts_today') || '0');
        let lastDate = localStorage.getItem('dido_last_date');
        const today = new Date().toDateString();
        if(lastDate !== today){
            localStorage.setItem('dido_last_date', today);
            attemptsUsed = 0;
        }
        attemptsUsed++;
        localStorage.setItem('dido_attempts_today', attemptsUsed);
        alert(`✅ تبقى ${(isPremium?5:3)-attemptsUsed} محاولة اليوم`);
    }
    
    // ========== فتح الألعاب ==========
    function openGameModal(gameType){
        if(!canPlayGame()) return;
        const modal = document.getElementById('gameModal');
        const inner = document.getElementById('modalGameInner');
        modal.classList.remove('hidden');
        if(gameType === 'guess') renderGuessGame(inner);
        else if(gameType === 'memory') renderMemoryGame(inner);
        else if(gameType === 'tictac') renderTicTacGame(inner);
    }
    function closeModal(){ document.getElementById('gameModal').classList.add('hidden'); }
    document.getElementById('closeModalBtn').addEventListener('click',closeModal);
    document.querySelectorAll('.launch-btn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            const game = btn.getAttribute('data-game');
            openGameModal(game);
        });
    });
    
    // ========== لعبة التخمين ==========
    let secretNumber = Math.floor(Math.random()*100)+1;
    let guessAttemptsCount = 0;
    function renderGuessGame(container){
        secretNumber = Math.floor(Math.random()*100)+1;
        guessAttemptsCount = 0;
        container.innerHTML = `
            <h3 style="color:#0ff; text-shadow:0 0 15px cyan; font-size:1.2rem;">🔮 خمن الرقم النيون 🔮</h3>
            <p style="font-size:0.8rem;">1 - 100</p>
            <input type="number" id="guessNum" placeholder="رقمك" style="width:90%; padding:8px;">
            <button id="guessAction" style="background:#ff00ff; margin-top:8px; width:90%;">خمن!</button>
            <div id="guessMsgGame" class="game-message" style="margin:8px;">✨ ابدأ ✨</div>
            <button id="finishGuessBtn" style="background:#00ffff; color:black;">🏆 إنهاء</button>
        `;
        let finishFlag = false;
        document.getElementById('guessAction').onclick = () => {
            if(finishFlag) return;
            let val = parseInt(document.getElementById('guessNum').value);
            let msgDiv = document.getElementById('guessMsgGame');
            if(isNaN(val)){ msgDiv.innerText = "ادخل رقماً!"; return; }
            guessAttemptsCount++;
            if(val === secretNumber){
                msgDiv.innerHTML = `🎉 فوز! الرقم ${secretNumber} بعد ${guessAttemptsCount} محاولات 🎉`;
                finishFlag = true;
                consumeAttempt();
                recordScore("خمن نيون", Math.max(100 - (guessAttemptsCount*2), 10));
                setTimeout(()=>closeModal(),1300);
            } else if(val < secretNumber) msgDiv.innerText = `⬆️ أكبر من ${val} | محاولة ${guessAttemptsCount}`;
            else msgDiv.innerText = `⬇️ أصغر من ${val} | محاولة ${guessAttemptsCount}`;
            document.getElementById('guessNum').value = '';
        };
        document.getElementById('finishGuessBtn').onclick = () => {
            if(!finishFlag){
                if(confirm("إنهاء بدون فوز؟")){
                    consumeAttempt();
                    recordScore("مغامر", 10);
                    closeModal();
                }
            } else closeModal();
        };
    }
    
    // ========== لعبة الذاكرة ==========
    let memCards=[], memFlipped=[], memMatched=[], memLock=false, memFirst=null;
    function renderMemoryGame(container){
        const icons = ['🌸','🍥','⚡','💀','🎴','🍙','🐉','👘'];
        let deck = [...icons,...icons];
        for(let i=deck.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
        memCards=deck; memFlipped=new Array(16).fill(false); memMatched=new Array(16).fill(false); memLock=false; memFirst=null;
        function renderBoard(){
            let html = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:6px;">`;
            for(let i=0;i<memCards.length;i++){
                let content = '';
                let bg='#aa55ff';
                if(memMatched[i]) { content='✓'; bg='#00ffcc';}
                else if(memFlipped[i]) { content=memCards[i]; bg='#ff66ff';}
                else { content='?'; bg='#9a4eff';}
                html += `<div data-idx="${i}" style="background:${bg}; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center; font-size:1.3rem; border-radius:16px; box-shadow:0 0 6px cyan;">${content}</div>`;
            }
            html += `</div><div id="memMsgModal" style="margin:8px; font-size:0.7rem; color:#0ff;">💜 اقلب بطاقتين</div><button id="memFinishBtn" style="background:#ffff00; color:black;">🏆 تسجيل</button>`;
            container.innerHTML = html;
            document.querySelectorAll('[data-idx]').forEach(el=>{
                el.addEventListener('click',()=>{
                    if(memLock) return;
                    let idx = parseInt(el.getAttribute('data-idx'));
                    if(memMatched[idx] || memFlipped[idx]) return;
                    if(memFirst===null){
                        memFlipped[idx]=true; memFirst=idx; renderBoard();
                    } else {
                        memFlipped[idx]=true; renderBoard(); memLock=true;
                        if(memCards[memFirst]===memCards[idx]){
                            memMatched[memFirst]=true; memMatched[idx]=true;
                            memFlipped[memFirst]=false; memFlipped[idx]=false;
                            memFirst=null; memLock=false; renderBoard();
                            if(memMatched.every(v=>v===true)) document.getElementById('memMsgModal').innerText='🏆 أكملت!';
                        } else {
                            setTimeout(()=>{
                                memFlipped[memFirst]=false; memFlipped[idx]=false;
                                memFirst=null; memLock=false; renderBoard();
                            },600);
                        }
                    }
                });
            });
            document.getElementById('memFinishBtn').onclick = ()=>{
                let matchedCount = memMatched.filter(v=>v===true).length;
                let score = matchedCount * 5;
                consumeAttempt();
                recordScore("ذاكرة نيون", score);
                closeModal();
            };
        }
        renderBoard();
    }
    
    // ========== تيك تاك تو ==========
    let ticBoard=[], ticTurn='X', ticOver=false;
    function renderTicTacGame(container){
        ticBoard=['','','','','','','','','']; ticTurn='X'; ticOver=false;
        function renderTic(){
            let html = `<h3 style="color:#ff00ff; text-shadow:0 0 12px magenta; font-size:1rem;">⚔️ X & O نيون ⚔️ دور: ${ticTurn}</h3><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:200px; margin:auto;">`;
            for(let i=0;i<9;i++){
                html += `<div data-tidx="${i}" style="background:#b84eff; aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:2rem; border-radius:20px; box-shadow:0 0 10px cyan;">${ticBoard[i]}</div>`;
            }
            html += `</div><div id="ticMsgModal" style="font-size:0.7rem;"></div><button id="finishTicBtn" style="background:#00ffcc; color:black; margin-top:10px;">🏆 تسجيل</button>`;
            container.innerHTML = html;
            document.querySelectorAll('[data-tidx]').forEach(cell=>{
                cell.addEventListener('click',()=>{
                    if(ticOver) return;
                    let idx = parseInt(cell.getAttribute('data-tidx'));
                    if(ticBoard[idx]!=='') return;
                    ticBoard[idx]=ticTurn;
                    let win = checkWin(ticBoard);
                    if(win){
                        document.getElementById('ticMsgModal').innerHTML=`🏆 الفائز ${win} نيون 🏆`;
                        ticOver=true;
                        renderTic();
                        return;
                    }
                    if(ticBoard.every(v=>v!=='')){
                        document.getElementById('ticMsgModal').innerHTML='تعادل نيون';
                        ticOver=true;
                        renderTic();
                        return;
                    }
                    ticTurn = (ticTurn==='X')?'O':'X';
                    renderTic();
                });
            });
            document.getElementById('finishTicBtn').onclick = ()=>{
                let winnerPoints = 0;
                let winRes = checkWin(ticBoard);
                if(winRes==='X') winnerPoints=50;
                else if(winRes==='O') winnerPoints=50;
                else if(ticBoard.every(v=>v!=='')) winnerPoints=20;
                else winnerPoints=5;
                consumeAttempt();
                recordScore("مبارز نيون", winnerPoints);
                closeModal();
            };
        }
        function checkWin(board){ const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let l of lines) if(board[l[0]] && board[l[0]]===board[l[1]] && board[l[0]]===board[l[2]]) return board[l[0]]; return null; }
        renderTic();
    }
    
    updateAccountUI();
</script>
</body>
</html>
