<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - 3D Anime City | Messenger Style Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 6px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(5,5,20,0.8);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #ff00ff, 0 0 20px #00ffff;
            border: 1px solid rgba(255,68,255,0.3);
            position: relative;
        }

        .content {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }

        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .page-hidden {
            display: none;
        }

        /* Hero Section */
        .anime-hero {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 15px #ff44ff;
        }
        
        .character-img {
            width: 65px;
            height: 65px;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            border-radius: 50%;
            border: 2px solid #ff44ff;
            position: relative;
        }
        
        .controller-on-hand {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            border: 1px solid white;
        }
        
        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff, #00ffff);
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.7rem;
        }

        /* Ranking */
        .ranking-section {
            margin-bottom: 12px;
            text-align: center;
        }
        
        .ranking-circles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .rank-item {
            text-align: center;
        }
        
        .gold-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 3px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }
        
        .silver-circle {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 3px;
            border: 1.5px solid #c0c0c0;
            box-shadow: 0 0 15px #c0c0c0;
        }
        
        .bronze-circle {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #cd7f32, #b8651a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 3px;
            border: 1.5px solid #cd7f32;
            box-shadow: 0 0 15px #cd7f32;
        }
        
        .rank-name {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }
        
        .rank-points {
            color: #ffcc00;
            font-size: 0.45rem;
        }

        /* Categories */
        .categories-section {
            margin-bottom: 10px;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        
        .cat-badge {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 5px 14px;
            border-radius: 22px;
            color: white;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .cat-badge:hover {
            background: #ff44ff60;
            transform: scale(1.02);
        }

        /* Ad */
        .fixed-permanent-ad {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border: 2px solid #ff44ff;
            border-radius: 20px;
            padding: 8px;
            margin: 10px 0;
            text-align: center;
            color: white;
            font-size: 0.65rem;
        }

        /* Games */
        .games-wrapper {
            margin: 5px 0;
        }
        
        .two-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .game-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .game-row::-webkit-scrollbar {
            display: none;
        }
        
        .game-card {
            min-width: 95px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 14px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ff44ff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff;
        }
        
        .game-img {
            width: 100%;
            height: 65px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 4px;
        }
        
        .game-title {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }

        /* Bottom Bar */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            border-top: 1px solid #ff44ff;
            background: rgba(0,0,0,0.7);
            position: relative;
        }
        
        .register-btn {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 5px 12px;
            border-radius: 18px;
            color: white;
            font-size: 0.5rem;
            cursor: pointer;
        }
        
        .register-btn.vip-active {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
        }
        
        .chat-circle-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 10px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff44ff, #ff00aa, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px #ff44ff;
            transition: all 0.3s ease;
            animation: circlePulse 1.5s ease-in-out infinite;
            z-index: 10;
        }
        
        @keyframes circlePulse {
            0% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff; transform: translateX(-50%) scale(1.05); }
            100% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
        }
        
        .chat-circle-btn span {
            font-size: 1.8rem;
        }
        
        .music-bottom-btn {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.5rem;
            border: 1px solid #0ff;
        }

        /* ========== SECURITY PANEL ========== */
        .security-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .security-card {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border-radius: 30px;
            padding: 25px;
            width: 85%;
            max-width: 350px;
            border: 2px solid #ff44ff;
            box-shadow: 0 0 50px #ff44ff;
            text-align: center;
        }
        
        .security-card h2 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .security-card p {
            color: #aaa;
            font-size: 0.7rem;
            margin-bottom: 20px;
        }
        
        .security-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.9rem;
        }
        
        .security-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        
        .security-hint {
            color: #ffaa88;
            font-size: 0.6rem;
            margin-top: 15px;
        }

        /* ========== MESSENGER 100% STYLE ========== */
        .chat-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 900;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        /* Messenger Main Container */
        .messenger-full {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0a0a1a;
        }
        
        /* Messenger Header */
        .messenger-header {
            padding: 12px 16px;
            background: #0a0a1a;
            border-bottom: 1px solid #2c2c3a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #ff44ff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .messenger-header h2 {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .header-actions span {
            color: #ff44ff;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        /* Chats List (Inbox) */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #1f1f2e;
        }
        
        .chat-item:hover {
            background: #1f1f2e;
        }
        
        .chat-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-name {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .chat-lock {
            font-size: 0.7rem;
            color: #ffaa88;
        }
        
        .chat-last-msg {
            color: #8e8e9e;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-time {
            color: #8e8e9e;
            font-size: 0.65rem;
            flex-shrink: 0;
        }
        
        /* Open Chat View (When a room is selected) */
        .open-chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0a0a1a;
        }
        
        .chat-header {
            padding: 12px 16px;
            background: #0a0a1a;
            border-bottom: 1px solid #2c2c3a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-header .back-btn {
            font-size: 1.3rem;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-name {
            color: white;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .chat-header-status {
            color: #00ff88;
            font-size: 0.65rem;
        }
        
        .chat-header-actions {
            display: flex;
            gap: 15px;
        }
        
        .chat-header-actions span {
            color: #ff44ff;
            font-size: 1.1rem;
            cursor: pointer;
        }
        
        /* Messages Container */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* Message Bubbles - Exact Messenger Style */
        .message-row {
            display: flex;
            width: 100%;
        }
        
        .message-row.outgoing {
            justify-content: flex-end;
        }
        
        .message-row.incoming {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            word-break: break-word;
        }
        
        .message-bubble.outgoing {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-bubble.incoming {
            background: #1f1f2e;
            color: white;
            border-bottom-left-radius: 5px;
        }
        
        .message-bubble.private {
            background: #2a2a3e;
            border: 1px solid #00ff88;
        }
        
        .message-sender-name {
            font-size: 0.6rem;
            color: #ffaa88;
            margin-bottom: 4px;
        }
        
        .message-time {
            font-size: 0.45rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            text-align: right;
        }
        
        .private-tag {
            font-size: 0.5rem;
            color: #00ff88;
            margin-left: 5px;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            padding: 8px 16px;
            color: #8e8e9e;
            font-size: 0.7rem;
            font-style: italic;
        }
        
        /* Message Input Area */
        .message-input-area {
            padding: 12px;
            background: #0a0a1a;
            border-top: 1px solid #2c2c3a;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .message-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            background: #1f1f2e;
            color: white;
            font-size: 0.9rem;
        }
        
        .message-input:focus {
            outline: none;
            background: #2a2a3e;
        }
        
        .input-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .mic-btn, .send-btn {
            background: none;
            border: none;
            color: #ff44ff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
        }
        
        /* Create Room Modal (Messenger Style) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: #1f1f2e;
            border-radius: 20px;
            padding: 20px;
            width: 85%;
            max-width: 320px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            border: none;
            background: #2a2a3e;
            color: white;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
        }
        
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-modal iframe {
            width: 95%;
            height: 80%;
            border-radius: 15px;
            border: 3px solid #ff44ff;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff3366;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img">
                    <div class="controller-on-hand">🎮</div>
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚡ DIDO-GAME ⚡</div>
                    <h2>😤 نظرة التحدي النيونية!</h2>
                </div>
            </div>
            
            <div class="ranking-section">
                <div class="ranking-circles" id="rankingList"></div>
            </div>
            
            <div class="categories-section">
                <div class="categories" id="categoriesList">
                    <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                    <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                    <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                    <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
                </div>
            </div>
            
            <div class="fixed-permanent-ad" id="permanentAd">📺 إعلان ممول - اشترك الآن!</div>
            
            <div class="games-wrapper">
                <div class="two-rows" id="gamesContainer"></div>
            </div>
        </div>
        
        <div id="categoryPage" class="page page-hidden">
            <button class="create-btn" id="backToHomeBtn" style="margin-bottom:10px;">🔙 العودة</button>
            <div class="two-rows" id="categoryGamesContainer"></div>
        </div>
    </div>
    
    <div class="bottom-bar">
        <div class="register-btn" id="registerBtn" onclick="upgradeToVIP()">👑 ترقية VIP</div>
        <div class="chat-circle-btn" id="openChatBtn">
            <span>💬</span>
        </div>
        <div class="music-bottom-btn" id="musicBtn" onclick="toggleMusic()">🎵 تشغيل</div>
    </div>
</div>

<!-- لوحة الأمان -->
<div id="securityPanel" class="security-panel">
    <div class="security-card">
        <h2>🔐 إعدادات الأمان</h2>
        <p>أدخل بياناتك للدخول إلى الدردشة</p>
        <input type="text" id="securityUsername" class="security-input" placeholder="👤 اسم المستخدم" value="أحمد">
        <input type="password" id="securityRoomPassword" class="security-input" placeholder="🔒 كلمة مرور الغرفة (اختياري)">
        <input type="text" id="securityRoomName" class="security-input" placeholder="🏠 اسم الغرفة" value="الغرفة الرئيسية">
        <button class="security-btn" onclick="submitSecurityAndEnter()">🚪 دخول إلى الدردشة</button>
        <div class="security-hint">💡 يمكنك إنشاء غرفة جديدة أو الانضمام إلى غرفة موجودة</div>
    </div>
</div>

<!-- صفحة الدردشة بتصميم الماسنجر 100% -->
<div id="chatPage" class="chat-page hidden">
    <div class="messenger-full">
        <!-- Inbox View (قائمة المحادثات) -->
        <div id="inboxView" style="display: flex; flex-direction: column; height: 100%;">
            <div class="messenger-header">
                <div class="header-left">
                    <button class="back-btn" id="closeChatFromInbox">✕</button>
                    <h2>المحادثات</h2>
                </div>
                <div class="header-actions">
                    <span id="newChatBtn" style="cursor: pointer;">✏️</span>
                    <span>☰</span>
                </div>
            </div>
            <div class="chats-list" id="chatsListContainer"></div>
        </div>
        
        <!-- Open Chat View (عند فتح محادثة) -->
        <div id="openChatView" style="display: none; flex-direction: column; height: 100%;">
            <div class="chat-header">
                <button class="back-btn" id="backToInboxBtn">←</button>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="openChatRoomName">الغرفة</div>
                    <div class="chat-header-status" id="openChatStatus">🟢 متصل</div>
                </div>
                <div class="chat-header-actions">
                    <span>🔔</span>
                    <span>⋮</span>
                </div>
            </div>
            <div class="messages-area" id="openChatMessages"></div>
            <div class="typing-indicator" id="typingIndicator" style="display: none;">✍️ شخص ما يكتب...</div>
            <div class="message-input-area">
                <div class="input-wrapper">
                    <input type="text" id="openMessageInput" class="message-input" placeholder="اكتب رسالة...">
                    <div class="input-actions">
                        <button class="mic-btn" id="micBtnOpen" onclick="toggleMicrophoneOpen()">🎙️</button>
                        <button class="send-btn" id="sendMsgOpen" onclick="sendMessageOpen()">📤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="gameModal" class="game-modal hidden">
    <div class="close-modal" onclick="closeGameModal()">✕</div>
    <iframe id="gameIframe" src="" allow="microphone; autoplay"></iframe>
</div>

<script>
    // ==================== Games Data ====================
    const gamesData = [
        { id:1, name:"Sonic", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, avatar:"🦔", playerName:"Shadow" },
        { id:2, name:"Subway Surfers", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, avatar:"🏃", playerName:"Speed" },
        { id:3, name:"Temple Run 2", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, avatar:"🏛️", playerName:"RunKing" },
        { id:4, name:"Hill Climb", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, avatar:"🚗", playerName:"Climber" },
        { id:5, name:"Street Fighter", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, avatar:"👊", playerName:"Fighter" },
        { id:6, name:"Among Us", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, avatar:"👽", playerName:"Impostor" }
    ];
    
    // ==================== Global Variables ====================
    let currentUser = null;
    let currentOpenRoom = null;
    let isVIP = false;
    let allRooms = {};
    let audioStream = null;
    let bgMusic = null;
    let isMusicPlaying = false;
    let privateTarget = null;
    let securityPassword = "";
    let sessionTimer = null;
    let typingTimeout = null;

    // ==================== Security Helpers ====================
    function encryptMessage(text) {
        return btoa(unescape(encodeURIComponent(text)));
    }
    
    function decryptMessage(encrypted) {
        try {
            return decodeURIComponent(escape(atob(encrypted)));
        } catch(e) {
            return "⚠️ رسالة مشفرة";
        }
    }

    function startSessionTimer() {
        if(sessionTimer) clearTimeout(sessionTimer);
        sessionTimer = setTimeout(() => {
            alert("🔐 انتهت الجلسة بسبب عدم النشاط (5 دقائق). سيتم تسجيل الخروج.");
            logout();
        }, 5 * 60 * 1000);
    }

    function resetSessionTimer() {
        if(currentUser) startSessionTimer();
    }

    function logout() {
        if(sessionTimer) clearTimeout(sessionTimer);
        currentUser = null;
        currentOpenRoom = null;
        if(audioStream) {
            audioStream.getTracks().forEach(track => track.stop());
            audioStream = null;
        }
        document.getElementById('chatPage').classList.add('hidden');
        document.getElementById('securityUsername').value = '';
        document.getElementById('securityRoomPassword').value = '';
        document.getElementById('securityRoomName').value = 'الغرفة الرئيسية';
    }

    function validatePassword(pass) {
        if(pass && pass.length < 3) {
            alert("⚠️ كلمة المرور يجب أن تكون 3 أحرف على الأقل");
            return false;
        }
        return true;
    }

    // ==================== Games Functions ====================
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points);
        document.getElementById('rankingList').innerHTML = `
            <div class="rank-item"><div class="silver-circle">${sorted[1]?.avatar||'👤'}</div><div class="rank-name">${sorted[1]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[1]?.points||0}</div></div>
            <div class="rank-item"><div class="gold-circle">${sorted[0]?.avatar||'👤'}</div><div class="rank-name">${sorted[0]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[0]?.points||0}</div></div>
            <div class="rank-item"><div class="bronze-circle">${sorted[2]?.avatar||'👤'}</div><div class="rank-name">${sorted[2]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[2]?.points||0}</div></div>
        `;
    }
    
    function renderAllGames() {
        const mid = Math.ceil(gamesData.length/2);
        const row1 = gamesData.slice(0,mid);
        const row2 = gamesData.slice(mid);
        document.getElementById('gamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
        `;
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.dataset.id);
                const game = gamesData.find(g=>g.id===id);
                if(game) { game.points += 5; updateRanking(); }
                document.getElementById('gameIframe').src = card.dataset.url;
                document.getElementById('gameModal').classList.remove('hidden');
            });
        });
    }
    
    function showCategoryGames(category) {
        const filtered = gamesData.filter(g=>g.cat===category);
        const mid = Math.ceil(filtered.length/2);
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">${filtered.slice(0,mid).map(g=>`<div class="game-card" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
            <div class="game-row">${filtered.slice(mid).map(g=>`<div class="game-card" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
        `;
        document.querySelectorAll('#categoryGamesContainer .game-card').forEach(c=>{
            c.addEventListener('click',()=>{
                document.getElementById('gameIframe').src = c.dataset.url;
                document.getElementById('gameModal').classList.remove('hidden');
            });
        });
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    document.querySelectorAll('.cat-badge').forEach(b=>{
        b.addEventListener('click',()=>showCategoryGames(b.dataset.cat));
    });
    document.getElementById('backToHomeBtn').addEventListener('click',()=>{
        document.getElementById('homePage').classList.remove('page-hidden');
        document.getElementById('categoryPage').classList.add('page-hidden');
    });
    
    function closeGameModal() {
        document.getElementById('gameModal').classList.add('hidden');
        document.getElementById('gameIframe').src = '';
    }
    
    function upgradeToVIP() {
        if(isVIP) { alert("✨ أنت بالفعل عضو VIP!"); return; }
        if(confirm("✨ ترقية إلى VIP - 9.99$ شهرياً")) {
            isVIP = true;
            localStorage.setItem('didogame_vip', 'true');
            document.getElementById('registerBtn').innerHTML = '👑 VIP مفعل';
            document.getElementById('registerBtn').classList.add('vip-active');
            alert("🎉 تهانينا! أصبحت عضواً مميزاً");
        }
    }
    
    // ==================== Chat Functions (Messenger Style) ====================
    function saveRooms() {
        localStorage.setItem('didogame_rooms_secure', JSON.stringify(allRooms));
    }
    
    function loadRooms() {
        const data = localStorage.getItem('didogame_rooms_secure');
        if(data) allRooms = JSON.parse(data);
        else allRooms = {};
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function getLastMessage(room) {
        if(!room.messages || room.messages.length === 0) return "لا توجد رسائل";
        const lastMsg = room.messages[room.messages.length - 1];
        let text = lastMsg.text;
        if(lastMsg.encrypted) text = decryptMessage(lastMsg.text);
        if(text.length > 30) text = text.substring(0, 30) + "...";
        if(lastMsg.type === 'private') text = "🔒 رسالة خاصة";
        return text;
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsListContainer');
        const rooms = Object.keys(allRooms);
        if(rooms.length === 0) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:40px;">لا توجد محادثات<br>✏️ أنشئ محادثة جديدة</div>';
            return;
        }
        container.innerHTML = rooms.map(room => {
            const roomData = allRooms[room];
            const lastMsg = getLastMessage(roomData);
            return `
                <div class="chat-item" onclick="openRoomChat('${room.replace(/'/g, "\\'")}')">
                    <div class="chat-avatar">💬</div>
                    <div class="chat-info">
                        <div class="chat-name">
                            ${escapeHtml(room)}
                            ${roomData.password ? '<span class="chat-lock">🔒</span>' : ''}
                        </div>
                        <div class="chat-last-msg">${escapeHtml(lastMsg)}</div>
                    </div>
                    <div class="chat-time">الآن</div>
                </div>
            `;
        }).join('');
    }
    
    function openRoomChat(roomName) {
        const room = allRooms[roomName];
        if(!room) return;
        if(room.password && room.password !== securityPassword) {
            alert("❌ كلمة مرور الغرفة غير صحيحة!");
            return;
        }
        if(!room.users.includes(currentUser)) {
            room.users.push(currentUser);
            saveRooms();
        }
        currentOpenRoom = roomName;
        privateTarget = null;
        
        // Switch views
        document.getElementById('inboxView').style.display = 'none';
        document.getElementById('openChatView').style.display = 'flex';
        document.getElementById('openChatRoomName').innerHTML = escapeHtml(currentOpenRoom);
        
        displayMessagesInOpenChat();
        resetSessionTimer();
        
        // Simulate typing indicator for demo
        startTypingSimulation();
    }
    
    function startTypingSimulation() {
        const indicator = document.getElementById('typingIndicator');
        indicator.style.display = 'block';
        if(typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            indicator.style.display = 'none';
        }, 3000);
    }
    
    function displayMessagesInOpenChat() {
        const container = document.getElementById('openChatMessages');
        if(!currentOpenRoom || !allRooms[currentOpenRoom]) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">✨ اختر محادثة لبدء المراسلة</div>';
            return;
        }
        const messages = allRooms[currentOpenRoom].messages.slice(-50);
        if(messages.length === 0) {
            container.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">💬 لا توجد رسائل بعد<br>✨ اكتب أول رسالة</div>';
            return;
        }
        container.innerHTML = '';
        messages.forEach(msg => {
            if(msg.type === 'private' && msg.sender !== currentUser && msg.target !== currentUser) return;
            
            const isOutgoing = msg.sender === currentUser;
            const isPrivate = msg.type === 'private';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
            
            let bubbleClass = `message-bubble ${isOutgoing ? 'outgoing' : 'incoming'}`;
            if(isPrivate) bubbleClass += ' private';
            
            let senderHtml = '';
            if(!isOutgoing && msg.type !== 'private') {
                senderHtml = `<div class="message-sender-name">${escapeHtml(msg.sender)}</div>`;
            }
            
            let privateHtml = '';
            if(isPrivate && msg.target) {
                privateHtml = `<span class="private-tag">🔒 إلى ${escapeHtml(msg.target)}</span>`;
            }
            
            let messageText = msg.text;
            if(msg.encrypted) {
                messageText = decryptMessage(msg.text);
            } else {
                messageText = escapeHtml(msg.text);
            }
            
            messageDiv.innerHTML = `
                <div class="${bubbleClass}">
                    ${senderHtml}
                    <div>${messageText}</div>
                    ${privateHtml}
                    <div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessageOpen() {
        const input = document.getElementById('openMessageInput');
        const text = input.value.trim();
        if(!text || !currentOpenRoom || !currentUser) return;
        
        const encryptedText = encryptMessage(text);
        
        let msg;
        if(privateTarget) {
            msg = {
                type: 'private',
                sender: currentUser,
                target: privateTarget,
                text: encryptedText,
                encrypted: true,
                time: Date.now()
            };
        } else {
            msg = {
                type: 'public',
                sender: currentUser,
                text: encryptedText,
                encrypted: true,
                time: Date.now()
            };
        }
        allRooms[currentOpenRoom].messages.push(msg);
        saveRooms();
        displayMessagesInOpenChat();
        input.value = '';
        resetSessionTimer();
        
        // Update chats list to show last message
        renderChatsList();
    }
    
    function showNewChatModal() {
        const roomName = prompt("أدخل اسم الغرفة الجديدة:", "غرفة جديدة");
        if(!roomName) return;
        if(allRooms[roomName]) { alert("الغرفة موجودة"); return; }
        
        const usePassword = confirm("هل تريد حماية الغرفة بكلمة مرور؟");
        let password = null;
        if(usePassword) {
            password = prompt("أدخل كلمة مرور الغرفة:", "");
            if(password && password.length < 3) { alert("كلمة المرور قصيرة جداً"); return; }
        }
        
        allRooms[roomName] = {
            password: password,
            users: [currentUser],
            messages: []
        };
        saveRooms();
        renderChatsList();
        alert(`تم إنشاء الغرفة "${roomName}" بنجاح`);
    }
    
    function backToInbox() {
        document.getElementById('openChatView').style.display = 'none';
        document.getElementById('inboxView').style.display = 'flex';
        currentOpenRoom = null;
        privateTarget = null;
        renderChatsList();
    }
    
    // ==================== Audio ====================
    async function startMicrophone() {
        try {
            if(!audioStream) {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // For speech to text simulation
                alert("🎤 تم تفعيل الميكروفون (محاكاة تحويل الصوت لنص)");
            }
        } catch(e) { console.log("Mic error"); }
    }
    
    function toggleMicrophoneOpen() {
        if(!currentOpenRoom) { alert("افتح محادثة أولاً"); return; }
        if(!audioStream) { startMicrophone(); return; }
        const audioTrack = audioStream.getAudioTracks()[0];
        if(audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            alert(audioTrack.enabled ? "🎙️ الميكروفون نشط" : "🔴 الميكروفون غير نشط");
        }
    }
    
    // ==================== Music ====================
    function toggleMusic() {
        if(!bgMusic) {
            bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 1.0;
        }
        if(isMusicPlaying) {
            bgMusic.pause();
            document.getElementById('musicBtn').innerHTML = "🎵 تشغيل";
        } else {
            bgMusic.play().catch(e => console.log("Auto-play prevented"));
            document.getElementById('musicBtn').innerHTML = "🔇 إيقاف";
        }
        isMusicPlaying = !isMusicPlaying;
    }
    
    // ==================== Security & Entry ====================
    function submitSecurityAndEnter() {
        const username = document.getElementById('securityUsername').value.trim();
        const roomPassword = document.getElementById('securityRoomPassword').value;
        const roomName = document.getElementById('securityRoomName').value.trim();
        
        if(!username) { alert("❌ أدخل اسم المستخدم"); return; }
        if(!roomName) { alert("❌ أدخل اسم الغرفة"); return; }
        if(roomPassword && !validatePassword(roomPassword)) return;
        
        currentUser = username;
        securityPassword = roomPassword;
        
        localStorage.setItem('didogame_username', currentUser);
        
        document.getElementById('securityPanel').style.display = 'none';
        document.getElementById('chatPage').classList.remove('hidden');
        
        loadRooms();
        
        if(allRooms[roomName]) {
            if(allRooms[roomName].password && allRooms[roomName].password !== roomPassword) {
                alert("⚠️ كلمة المرور غير صحيحة! سيتم إنشاء غرفة جديدة.");
                createNewRoomWithName(roomName);
            } else {
                if(!allRooms[roomName].users.includes(currentUser)) {
                    allRooms[roomName].users.push(currentUser);
                    saveRooms();
                }
            }
        } else {
            createNewRoomWithName(roomName);
        }
        
        renderChatsList();
        startSessionTimer();
        
        // Show inbox view by default
        document.getElementById('inboxView').style.display = 'flex';
        document.getElementById('openChatView').style.display = 'none';
    }
    
    function createNewRoomWithName(roomName) {
        if(!currentUser) return;
        if(securityPassword && !validatePassword(securityPassword)) return;
        
        allRooms[roomName] = {
            password: securityPassword || null,
            users: [currentUser],
            messages: []
        };
        saveRooms();
    }
    
    // ==================== UI Events ====================
    document.getElementById('closeChatFromInbox').addEventListener('click', () => {
        document.getElementById('chatPage').classList.add('hidden');
    });
    
    document.getElementById('backToInboxBtn').addEventListener('click', backToInbox);
    
    document.getElementById('newChatBtn').addEventListener('click', showNewChatModal);
    
    document.getElementById('openChatBtn').addEventListener('click', () => {
        const savedUser = localStorage.getItem('didogame_username');
        if(currentUser) {
            document.getElementById('chatPage').classList.remove('hidden');
            document.getElementById('inboxView').style.display = 'flex';
            document.getElementById('openChatView').style.display = 'none';
            renderChatsList();
            startSessionTimer();
        } else {
            document.getElementById('securityPanel').style.display = 'flex';
            if(savedUser) {
                document.getElementById('securityUsername').value = savedUser;
            }
        }
    });
    
    // Auto refresh messages
    setInterval(() => {
        if(currentOpenRoom && allRooms[currentOpenRoom] && document.getElementById('openChatView').style.display === 'flex') {
            displayMessagesInOpenChat();
        }
        if(currentUser && document.getElementById('inboxView').style.display === 'flex') {
            renderChatsList();
        }
    }, 2000);
    
    // Ads rotation
    const ads = ["📺 إعلان ممول - اشترك الآن!", "🎮 لعبة الأسبوع - العب مجاناً!", "💰 خصم 50% على VIP"];
    let adIdx = 0;
    setInterval(() => {
        adIdx = (adIdx + 1) % ads.length;
        document.getElementById('permanentAd').innerHTML = ads[adIdx];
    }, 10000);
    
    // Initialize
    loadRooms();
    updateRanking();
    renderAllGames();
    
    const savedVIP = localStorage.getItem('didogame_vip');
    if(savedVIP === 'true') {
        isVIP = true;
        document.getElementById('registerBtn').innerHTML = '👑 VIP مفعل';
        document.getElementById('registerBtn').classList.add('vip-active');
    }
    
    const savedUser = localStorage.getItem('didogame_username');
    if(savedUser) {
        document.getElementById('securityUsername').value = savedUser;
    }
    
    // Expose functions globally
    window.upgradeToVIP = upgradeToVIP;
    window.closeGameModal = closeGameModal;
    window.toggleMusic = toggleMusic;
    window.submitSecurityAndEnter = submitSecurityAndEnter;
    window.openRoomChat = openRoomChat;
    window.sendMessageOpen = sendMessageOpen;
    window.toggleMicrophoneOpen = toggleMicrophoneOpen;
    window.backToInbox = backToInbox;
</script>
</body>
</html>
