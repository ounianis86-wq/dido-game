<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

header{
padding:20px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:30px;
font-weight:bold;
color:cyan;
}

nav{
display:flex;
gap:10px;
flex-wrap:wrap;
}

nav button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:20px;
overflow:hidden;
transition:0.3s;
box-shadow:0 0 10px rgba(0,255,255,0.2);
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.card button{
margin:10px;
padding:10px;
width:calc(100% - 20px);
border:none;
border-radius:10px;
background:cyan;
font-size:16px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
background:#111;
margin-top:30px;
}

.game-frame{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:999;
}

iframe{
width:100%;
height:100%;
border:none;
}

.close-btn{
position:absolute;
top:10px;
right:10px;
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:18px;
z-index:1000;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">Dido Game</div>

<nav>
<button>🏎️ سباقات</button>
<button>🧠 ذكاء</button>
<button>⚔️ مغامرات</button>
<button>🔫 أكشن</button>
<button>⚽ رياضة</button>
</nav>
</header>

<section class="hero">
<h1>أفضل منصة ألعاب عربية</h1>
<p>العب ألعاب مجانية مباشرة من هاتفك</p>
</section>

<section class="games">

<div class="card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
<h3>سباق السيارات</h3>
<button onclick="openGame('https://html5.gamemonetize.com/rcm8g7x5nv3l2br1m8h0yrt2y9v3r7ys/')">
تشغيل
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200&auto=format&fit=crop">
<h3>مغامرات النينجا</h3>
<button onclick="openGame('https://html5.gamemonetize.com/cxv4e7ux0m0v6sh4r5r0xv1m5j7d2n6f/')">
تشغيل
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1200&auto=format&fit=crop">
<h3>لعبة الذكاء</h3>
<button onclick="openGame('https://html5.gamemonetize.com/4m6rkg0j2m8n6k7v9x3y2d5f1s8a0c4/')">
تشغيل
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1200&auto=format&fit=crop">
<h3>كرة القدم</h3>
<button onclick="openGame('https://html5.gamemonetize.com/v1f5s6d8g7h9j2k4l3q1w0e5r6t8y9u/')">
تشغيل
</button>
</div>

</section>

<div class="game-frame" id="gameFrame">

<button class="close-btn" onclick="closeGame()">
إغلاق
</button>

<iframe id="game"></iframe>

</div>

<footer>
Dido Game 2026 ©
</footer>

<script>

const frame=document.getElementById("gameFrame");
const game=document.getElementById("game");

function openGame(url){
frame.style.display="block";
game.src=url;
}

function closeGame(){
frame.style.display="none";
game.src="";
}

</script>

</body>
</html>
