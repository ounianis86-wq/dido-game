<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أركيد الألعاب - بدون Google Play</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1e1e2f; color: white; }
        .game-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px; }
        .game-card { background: #28293d; padding: 15px; border-radius: 15px; width: 200px; cursor: pointer; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; margin-top: 20px; display: none; }
        button { background: #ff4757; color: white; border: none; padding: 10px 20px; margin: 10px; border-radius: 8px; cursor: pointer; }
        .back-btn { background: #1e90ff; }
    </style>
</head>
<body>
    <h1>🎮 ألعاب فورية - بدون العودة إلى Google Play</h1>
    <div class="game-list">
        <div class="game-card" data-game="https://html5.gamedistribution.com/6e3f6b7e8b9a4c2e8c4f5a1b3c7d9e2e/?gd_sdk_referrer_url=embed">
            <h3>كرة القدم</h3>
            <p>اضغط لتشغيل</p>
        </div>
        <div class="game-card" data-game="https://html5.gamedistribution.com/8f4a3b2c1d0e9f8a7b6c5d4e3f2a1b0c/">
            <h3>سباق السيارات</h3>
            <p>اضغط لتشغيل</p>
        </div>
        <div class="game-card" data-game="https://t1.gstatic.com/og/_/js/k=og.qtm.en_US.3Fz7XWZhrxU.o/m=wsem_market_web_embed_ris/rt=j/d=1/ed=1/rs=AA2YrTvGkXMqLqRqZ5LqGvXqXqQ/">
            <h3>سلة السيارات</h3>
            <p>اضغط لتشغيل</p>
        </div>
    </div>
    <button class="back-btn" id="backBtn" style="display:none;">🔙 العودة للألعاب</button>
    <iframe id="gameFrame" allow="autoplay; fullscreen"></iframe>

    <script>
        const games = document.querySelectorAll('.game-card');
        const frame = document.getElementById('gameFrame');
        const backBtn = document.getElementById('backBtn');

        games.forEach(game => {
            game.addEventListener('click', () => {
                const url = game.getAttribute('data-game');
                frame.src = url;
                frame.style.display = 'block';
                backBtn.style.display = 'inline-block';
                document.querySelector('.game-list').style.display = 'none';
            });
        });

        backBtn.addEventListener('click', () => {
            frame.src = '';
            frame.style.display = 'none';
            backBtn.style.display = 'none';
            document.querySelector('.game-list').style.display = 'flex';
        });
    </script>
</body>
</html>
