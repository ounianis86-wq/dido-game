<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a2a">
    <meta name="description" content="DidoGame - منصة ألعاب احترافية مع محادثة ومكالمات فيديو">
    <title>DidoGame | منصة الألعاب المتكاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Tajawal', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 50%, #0a0a1a 100%);
            min-height: 100vh;
            padding: 12px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            z-index: -2;
            animation: slowDrift 30s ease-in-out infinite alternate;
        }

        @keyframes slowDrift {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-2%, -1%); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,68,255,0.6), rgba(0,255,255,0.2));
            border-radius: 50%;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .app {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: linear-gradient(145deg, rgba(10,10,30,0.92), rgba(15,15,40,0.88));
            backdrop-filter: blur(20px);
            border-radius: 35px;
            overflow: hidden;
            height: 96vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,68,255,0.2), 0 0 30px rgba(255,68,255,0.3);
            position: relative;
            border: 1px solid rgba(255,68,255,0.4);
        }

        .glow-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff44ff, #00ffff, #ff44ff, transparent);
            animation: headerGlow 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes headerGlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .content {
            padding: 12px 12px 0px 12px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ff44ff #1a1a2e;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 10px;
        }

        .content::-webkit-scrollbar-thumb {
            background: #ff44ff;
            border-radius: 10px;
        }

        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
            animation: fadeInPage 0.4s ease;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-hidden {
            display: none;
        }

        .anime-hero {
            background: linear-gradient(135deg, rgba(255,68,255,0.15), rgba(0,255,255,0.1));
            border-radius: 25px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 18px;
            justify-content: center;
            border: 1px solid rgba(255,68,255,0.4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .anime-hero:hover {
            transform: translateY(-2px);
            border-color: #ff44ff;
            box-shadow: 0 0 25px rgba(255,68,255,0.3);
        }

        .character-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            box-shadow: 0 0 20px rgba(255,68,255,0.5);
            transition: transform 0.3s ease;
        }

        .character-img:hover {
            transform: scale(1.05);
        }

        .controller-on-hand {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 2px solid white;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff, #00ffff);
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            letter-spacing: 1px;
        }

        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: bold;
        }

        .ranking-section {
            margin-top: 10px;
            margin-bottom: 15px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 12px;
        }

        .ranking-title {
            color: #ffcc00;
            font-size: 0.7rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .ranking-circles {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 25px;
            flex-wrap: wrap;
        }

        .rank-item {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .rank-item:hover {
            transform: translateY(-5px);
        }

        .gold-circle {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 8px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 25px #ffd700;
            animation: goldPulse 2s ease-in-out infinite;
        }

        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 15px #ffd700; }
            50% { box-shadow: 0 0 35px #ffd700, 0 0 10px #ffaa00; }
        }

        .silver-circle {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 6px;
            border: 2px solid #c0c0c0;
            box-shadow: 0 0 15px #c0c0c0;
        }

        .bronze-circle {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #cd7f32, #b8651a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 6px;
            border: 2px solid #cd7f32;
            box-shadow: 0 0 15px #cd7f32;
        }

        .rank-name {
            color: white;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .rank-points {
            color: #ffcc00;
            font-size: 0.5rem;
        }

        .categories-section {
            margin-bottom: 15px;
        }

        .categories {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            justify-content: flex-start;
            overflow-x: auto;
            padding: 6px 2px 10px 2px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .categories::-webkit-scrollbar {
            height: 3px;
        }

        .cat-badge {
            background: linear-gradient(135deg, rgba(255,68,255,0.2), rgba(0,255,255,0.1));
            border: 1px solid rgba(255,68,255,0.5);
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 500;
        }

        .cat-badge:hover {
            background: linear-gradient(135deg, rgba(255,68,255,0.5), rgba(0,255,255,0.3));
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,68,255,0.3);
        }

        .more-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .more-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff44ff;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            z-index: 1500;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.3s ease;
        }

        @keyframes fadeInModal {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(20px); }
        }

        .modal-card {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 35px;
            padding: 25px;
            width: 90%;
            max-width: 380px;
            border: 2px solid #ff44ff;
            box-shadow: 0 0 60px rgba(255,68,255,0.4);
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .games-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        .game-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 5px 2px 12px 2px;
            scrollbar-width: thin;
            scrollbar-color: #ff44ff #1a1a2e;
            -webkit-overflow-scrolling: touch;
        }

        .game-card {
            min-width: calc(25% - 9px);
            width: calc(25% - 9px);
            max-width: calc(25% - 9px);
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 18px;
            padding: 10px 8px;
            text-align: center;
            border: 1px solid rgba(255,68,255,0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            scroll-snap-align: start;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #00ffff;
            box-shadow: 0 15px 30px rgba(0,255,255,0.2);
        }

        .fav-star {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .fav-star:hover {
            transform: scale(1.1);
        }

        .fav-star.active {
            color: #ffcc00;
            text-shadow: 0 0 8px #ffcc00;
        }

        .game-img {
            width: 100%;
            aspect-ratio: 1 / 0.9;
            background-size: cover;
            background-position: center;
            border-radius: 14px;
            margin-bottom: 8px;
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-img {
            transform: scale(1.02);
        }

        .game-title {
            color: white;
            font-size: 0.6rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== الشريط السفلي - توزيع جديد ========== */
        /* يمين: محفظة + VIP | يسار: إعدادات + مفضلة | وسط: دردشة */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: rgba(8, 8, 20, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 68, 255, 0.3);
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .bottom-bar::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff44ff, #00ffff, #ff44ff, transparent);
            border-radius: 2px;
        }

        .bottom-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .bottom-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            padding: 6px 12px;
            border-radius: 25px;
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 25px;
            height: 2px;
            background: linear-gradient(90deg, #ff44ff, #00ffff);
            border-radius: 2px;
            transition: transform 0.3s ease;
        }

        .nav-btn:hover::before {
            transform: translateX(-50%) scaleX(1);
        }

        .nav-btn:hover {
            transform: translateY(-3px);
        }

        .nav-btn .icon {
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .nav-btn .label {
            font-size: 0.55rem;
            color: #aaa;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn:hover .icon {
            transform: scale(1.15);
        }

        .nav-btn:hover .label {
            color: #ff44ff;
        }

        /* ألوان الأزرار الجانبية */
        .wallet-btn .icon { color: #ffd700; }
        .vip-btn .icon { color: #ff44ff; }
        .settings-btn .icon { color: #00ffff; }
        .favs-btn .icon { color: #ffcc00; }

        /* زر الدردشة في المنتصف - مميز */
        .chat-center-btn {
            background: linear-gradient(135deg, #ff44ff, #ff00aa);
            border-radius: 40px;
            padding: 6px 20px;
            box-shadow: 0 0 20px rgba(255,68,255,0.4);
        }

        .chat-center-btn .icon, .chat-center-btn .label {
            color: white;
        }

        .vip-btn.active {
            background: linear-gradient(135deg, rgba(255,68,255,0.4), rgba(0,255,255,0.4));
            border: 1px solid #ff44ff;
            border-radius: 40px;
            box-shadow: 0 0 15px rgba(255,68,255,0.5);
        }

        /* Chat محسّن */
        .chat-page {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 96%;
            max-width: 520px;
            height: 92%;
            max-height: 750px;
            background: linear-gradient(145deg, #0a0a1a, #0f0f2a);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            border-radius: 35px;
            border: 2px solid #ff44ff;
            box-shadow: 0 0 70px rgba(255,68,255,0.5);
            animation: zoomIn 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
            overflow: hidden;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .security-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 35px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border: 2px solid #ff44ff;
            box-shadow: 0 0 60px rgba(255,68,255,0.4);
            z-index: 1100;
            display: none;
            flex-direction: column;
            gap: 15px;
            animation: modalPop 0.3s ease;
        }

        .security-input {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,68,255,0.5);
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.9rem;
        }

        .security-input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }

        .security-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 14px;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .security-btn:hover {
            transform: scale(1.02);
        }

        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .game-modal iframe {
            width: 95%;
            height: 85%;
            border-radius: 20px;
            border: 3px solid #ff44ff;
            box-shadow: 0 0 50px rgba(255,68,255,0.5);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff3366;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .close-modal:hover {
            transform: scale(1.1);
            background: #ff5555;
        }

        .hidden {
            display: none !important;
        }

        .fixed-permanent-ad {
            background: linear-gradient(135deg, rgba(255,68,255,0.2), rgba(0,255,255,0.2));
            border: 1px solid #ff44ff;
            border-radius: 20px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            animation: adPulse 2s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes adPulse {
            0%, 100% { box-shadow: 0 0 5px #ff44ff; border-color: #ff44ff; }
            50% { box-shadow: 0 0 20px #ff44ff, 0 0 10px #00ffff; border-color: #00ffff; }
        }

        .back-btn-custom {
            background: rgba(255,68,255,0.2);
            border: 1px solid #ff44ff;
            padding: 8px 16px;
            border-radius: 25px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s;
            width: fit-content;
        }

        .back-btn-custom:hover {
            background: rgba(255,68,255,0.4);
            transform: translateX(-3px);
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #1f1f2e;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: rgba(255,68,255,0.1);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="app">
    <div class="glow-header"></div>
    <div class="content">
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img" id="mainAvatarImg">
                    <div class="controller-on-hand">🎮</div>😎
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚡ DIDO-GAME ⚡</div>
                    <h2 id="heroTagline">😤 تحدّي النيون!</h2>
                </div>
            </div>
            
            <div class="ranking-section">
                <div class="ranking-title">🏆 أفضل اللاعبين 🏆</div>
                <div class="ranking-circles" id="rankingList"></div>
            </div>
            
            <div class="categories-section">
                <div class="categories" id="categoriesList">
                    <div class="more-btn" id="moreCategoriesBtn">➕ المزيد</div>
                    <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                    <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                    <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                    <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
                </div>
            </div>
            
            <div class="fixed-permanent-ad" id="permanentAd">🎮 عرض خاص: اشترك في VIP واحصل على 50% خصم! 🎮</div>
            
            <div class="games-wrapper" id="gamesWrapper"></div>
        </div>
        
        <div id="categoryPage" class="page page-hidden">

        </div>
    </div>
    
    <!-- الشريط السفلي - التوزيع الجديد -->
    <!-- اليمين: محفظة + VIP | اليسار: إعدادات + مفضلة | الوسط: دردشة -->

        <div id="openChatView" style="display: none; flex-direction: column; height: 100%;">
            <div style="padding: 12px; background: #0f0f2a; border-bottom: 1px solid rgba(255,68,255,0.3); display: flex; align-items: center; gap: 12px;">

                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="openMessageInput" class="security-input" placeholder="اكتب رسالة..." style="flex:1;">
                    <button class="back-btn-custom" id="micBtnOpen" style="margin:0; width:40px; height:40px; border-radius:50%;">🎙️</button>
                    <button class="back-btn-custom" id="sendMsgOpen" style="margin:0; width:40px; height:40px; border-radius:50%;">📤</button>

<!-- Game Modal -->
<div id="gameModal" class="game-modal">
    <div class="close-modal" onclick="closeGameModal()">✕</div>
    <iframe id="gameIframe" src="" allow="fullscreen; autoplay"></iframe>
</div>

<script>
    // ==================== البيانات الأساسية ====================
    let currentLang = 'ar';
    let isVIP = false;
    let currentUser = null;
    let currentOpenRoom = null;
    let allRooms = {};
    let securityPassword = "";
    let favorites = JSON.parse(localStorage.getItem('didogame_favorites') || '[]');
    let audioStream = null;
    let sessionTimer = null;
    let privateTarget = null;
    
    // الألعاب
    const gamesData = [
        { id:1, name:"سونيك", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, playerName:"شادو" },
        { id:2, name:"متسابق المترو", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, playerName:"سبيد" },
        { id:3, name:"الهروب من المعبد", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, playerName:"الملك" },
        { id:4, name:"تسلق التلال", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, playerName:"متسلق" },
        { id:5, name:"المقاتل الشارعي", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, playerName:"المقاتل" },
        { id:6, name:"بيننا", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, playerName:"دجال" },
        { id:7, name:"كول أوف ديوتي", img:"https://images.hdqwalls.com/wallpapers/call-of-duty-mobile-2020-8k-2020-32.jpg", url:"https://www.crazygames.com/embed/call-of-duty-mobile", cat:"action", points:250, playerName:"جندي" },
        { id:8, name:"ماينكرافت", img:"https://images.hdqwalls.com/wallpapers/minecraft-2020-4k-6p.jpg", url:"https://www.crazygames.com/embed/minecraft-classic", cat:"puzzle", points:200, playerName:"باني" },
        { id:9, name:"فال جاي", img:"https://images.hdqwalls.com/wallpapers/fall-guys-ultimate-knockout-2020-58.jpg", url:"https://www.crazygames.com/embed/fall-guys", cat:"racing", points:180, playerName:"فول" },
        { id:10, name:"روبلكس", img:"https://images.hdqwalls.com/wallpapers/roblox-2020-artwork-4k-5k.jpg", url:"https://www.crazygames.com/embed/roblox", cat:"action", points:220, playerName:"نوب" }
    ];
    
    // ==================== دوال مساعدة ====================
    function saveFavorites() {
        localStorage.setItem('didogame_favorites', JSON.stringify(favorites));
    }
    
    function toggleFavorite(gameId) {
        const index = favorites.indexOf(gameId);
        if (index === -1) favorites.push(gameId);
        else favorites.splice(index, 1);
        saveFavorites();
        renderAllGames();
        renderFavoritesList();
    }
    
    function isFavorite(gameId) {
        return favorites.includes(gameId);
    }
    
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points);
        document.getElementById('rankingList').innerHTML = `
            <div class="rank-item"><div class="silver-circle">${sorted[1]?.playerName?.charAt(0) || '👤'}</div><div class="rank-name">${sorted[1]?.playerName || '---'}</div><div class="rank-points">⭐${sorted[1]?.points || 0}</div></div>
            <div class="rank-item"><div class="gold-circle">${sorted[0]?.playerName?.charAt(0) || '👑'}</div><div class="rank-name">${sorted[0]?.playerName || '---'}</div><div class="rank-points">⭐${sorted[0]?.points || 0}</div></div>
            <div class="rank-item"><div class="bronze-circle">${sorted[2]?.playerName?.charAt(0) || '👤'}</div><div class="rank-name">${sorted[2]?.playerName || '---'}</div><div class="rank-points">⭐${sorted[2]?.points || 0}</div></div>
        `;
    }
    
    function encryptMessage(text) {
        return btoa(unescape(encodeURIComponent(text)));
    }
    
    function decryptMessage(encrypted) {
        try { return decodeURIComponent(escape(atob(encrypted))); }
        catch(e) { return "رسالة مشفرة"; }
    }
    
    function saveRooms() {
        localStorage.setItem('didogame_rooms', JSON.stringify(allRooms));
    }
    
    function loadRooms() {
        const data = localStorage.getItem('didogame_rooms');
        if(data) allRooms = JSON.parse(data);
        else allRooms = {};
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatsListContainer');
        const rooms = Object.keys(allRooms);
        if(rooms.length === 0) {
            container.innerHTML = `<div style="color:#888; text-align:center; padding:40px;">📭 لا توجد محادثات<br>➕ أنشئ محادثة جديدة</div>`;
            return;
        }
        container.innerHTML = rooms.map(room => `
            <div class="chat-item" onclick="openRoomChat('${room.replace(/'/g, "\\'")}')">
                <div style="width:45px; height:45px; background:linear-gradient(135deg,#ff44ff,#00ffff); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">💬</div>
                <div style="flex:1;">
                    <div style="color:white; font-weight:bold;">${escapeHtml(room)}${allRooms[room].password ? ' 🔒' : ''}</div>
                    <div style="color:#888; font-size:0.65rem;">${allRooms[room].messages?.length || 0} رسائل</div>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function displayMessagesInOpenChat() {
        const container = document.getElementById('openChatMessages');
        if(!currentOpenRoom || !allRooms[currentOpenRoom]) {
            container.innerHTML = `<div style="color:#888; text-align:center; padding:20px;">✨ اختر محادثة لبدء المراسلة</div>`;
            return;
        }
        const messages = allRooms[currentOpenRoom].messages || [];
        if(messages.length === 0) {
            container.innerHTML = `<div style="color:#888; text-align:center; padding:20px;">💬 لا توجد رسائل بعد<br>✨ اكتب أول رسالة</div>`;
            return;
        }
        container.innerHTML = '';
        messages.slice(-50).forEach(msg => {
            if(msg.type === 'private' && msg.sender !== currentUser && msg.target !== currentUser) return;
            const isOutgoing = msg.sender === currentUser;
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.justifyContent = isOutgoing ? 'flex-end' : 'flex-start';
            div.style.marginBottom = '8px';
            let text = msg.encrypted ? decryptMessage(msg.text) : msg.text;
            div.innerHTML = `
                <div style="max-width:75%; background:${isOutgoing ? '#ff44ff' : '#1f1f2e'}; padding:8px 14px; border-radius:20px; ${isOutgoing ? 'border-bottom-right-radius:4px' : 'border-bottom-left-radius:4px'};">
                    ${!isOutgoing && msg.type !== 'private' ? `<div style="font-size:0.55rem; color:#ffaa88;">${escapeHtml(msg.sender)}</div>` : ''}
                    <div style="color:white; font-size:0.8rem; word-break:break-word;">${escapeHtml(text)}</div>
                    ${msg.type === 'private' ? `<div style="font-size:0.45rem; color:#00ff88;">🔒 خاص</div>` : ''}
                    <div style="font-size:0.4rem; color:#aaa; margin-top:4px;">${new Date(msg.time).toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
        const input = document.getElementById('openMessageInput');
        const text = input.value.trim();
        if(!text || !currentOpenRoom || !currentUser) return;
        const encryptedText = encryptMessage(text);
        const msg = privateTarget ? {
            type: 'private', sender: currentUser, target: privateTarget,
            text: encryptedText, encrypted: true, time: Date.now()
        } : {
            type: 'public', sender: currentUser,
            text: encryptedText, encrypted: true, time: Date.now()
        };
        if(!allRooms[currentOpenRoom].messages) allRooms[currentOpenRoom].messages = [];
        allRooms[currentOpenRoom].messages.push(msg);
        saveRooms();
        displayMessagesInOpenChat();
        input.value = '';
        renderChatsList();
        resetSessionTimer();
    }
    
    function openRoomChat(roomName) {
        if(allRooms[roomName]?.password && allRooms[roomName].password !== securityPassword) {
            alert("❌ كلمة مرور الغرفة غير صحيحة!");
            return;
        }
        currentOpenRoom = roomName;
        privateTarget = null;
        document.getElementById('inboxView').style.display = 'none';
        document.getElementById('openChatView').style.display = 'flex';
        document.getElementById('openChatRoomName').innerHTML = escapeHtml(currentOpenRoom);
        document.getElementById('videoCallBtn').style.display = isVIP ? 'inline-block' : 'none';
        displayMessagesInOpenChat();
        resetSessionTimer();
    }
    
    function backToInbox() {
        document.getElementById('openChatView').style.display = 'none';
        document.getElementById('inboxView').style.display = 'flex';
        currentOpenRoom = null;
        privateTarget = null;
        renderChatsList();
    }
    
    function startSessionTimer() {
        if(sessionTimer) clearTimeout(sessionTimer);
        sessionTimer = setTimeout(() => {
            alert("🔐 انتهت الجلسة بسبب عدم النشاط (5 دقائق)");
            logout();
        }, 5 * 60 * 1000);
    }
    
    function resetSessionTimer() {
        if(currentUser) startSessionTimer();
    }
    
    function logout() {
        if(sessionTimer) clearTimeout(sessionTimer);
        currentUser = null;
        currentOpenRoom = null;
        if(audioStream) audioStream.getTracks().forEach(t => t.stop());
        document.getElementById('chatPage').classList.add('hidden');
    }
    
    function submitSecurityAndEnter() {
        const username = document.getElementById('securityUsername').value.trim();
        const roomPassword = document.getElementById('securityRoomPassword').value;
        const roomName = document.getElementById('securityRoomName').value.trim();
        if(!username) { alert("❌ أدخل اسم المستخدم"); return; }
        if(!roomName) { alert("❌ أدخل اسم الغرفة"); return; }
        currentUser = username;
        securityPassword = roomPassword;
        localStorage.setItem('didogame_username', currentUser);
        document.getElementById('securityPanel').style.display = 'none';
        document.getElementById('chatPage').classList.remove('hidden');
        loadRooms();
        if(!allRooms[roomName]) {
            allRooms[roomName] = { password: roomPassword || null, users: [currentUser], messages: [] };
            saveRooms();
        } else if(allRooms[roomName].password && allRooms[roomName].password !== roomPassword) {
            alert("⚠️ كلمة المرور غير صحيحة! سيتم إنشاء غرفة جديدة.");
            const newName = roomName + "_" + Date.now();
            allRooms[newName] = { password: roomPassword || null, users: [currentUser], messages: [] };
            saveRooms();
        }
        renderChatsList();
        startSessionTimer();
        document.getElementById('inboxView').style.display = 'flex';
        document.getElementById('openChatView').style.display = 'none';
    }
    
    function upgradeToVIP() {
        if(isVIP) { alert("✨ أنت بالفعل عضو VIP!"); return; }
        isVIP = true;
        localStorage.setItem('didogame_vip', 'true');
        document.getElementById('registerBtn').classList.add('active');
        alert("🎉 تهانينا! أصبحت عضواً مميزاً (VIP)");
    }
    
    function startVideoCall() {
        if(!isVIP) { alert("🔒 مكالمات الفيديو متاحة فقط للمستخدمين المميزين (VIP)"); return; }
        alert("🎥 سيتم بدء مكالمة الفيديو قريباً... (قيد التطوير)");
    }
    
    async function startMicrophone() {
        try {
            if(!audioStream) {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                alert("🎙️ الميكروفون نشط");
            }
        } catch(e) { console.log("خطأ في الميكروفون"); }
    }
    
    function toggleMicrophone() {
        if(!currentOpenRoom) { alert("افتح محادثة أولاً"); return; }
        if(!audioStream) { startMicrophone(); return; }
        const audioTrack = audioStream.getAudioTracks()[0];
        if(audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            alert(audioTrack.enabled ? "🎙️ الميكروفون نشط" : "🔴 الميكروفون غير نشط");
        }
    }
    
    function renderAllGames() {
        const mid = Math.ceil(gamesData.length / 2);
        const row1 = gamesData.slice(0, mid);
        const row2 = gamesData.slice(mid);
        document.getElementById('gamesWrapper').innerHTML = `
            <div class="game-row">${row1.map(g => `
                <div class="game-card" onclick="playGame(${g.id})">
                    <div class="fav-star ${isFavorite(g.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${g.id})">${isFavorite(g.id) ? '⭐' : '☆'}</div>
                    <div class="game-img" style="background-image:url('${g.img}')"></div>
                    <div class="game-title">${g.name}</div>
                </div>
            `).join('')}</div>
            <div class="game-row">${row2.map(g => `
                <div class="game-card" onclick="playGame(${g.id})">
                    <div class="fav-star ${isFavorite(g.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${g.id})">${isFavorite(g.id) ? '⭐' : '☆'}</div>
                    <div class="game-img" style="background-image:url('${g.img}')"></div>
                    <div class="game-title">${g.name}</div>
                </div>
            `).join('')}</div>
        `;
    }
    
    function playGame(gameId) {
        const game = gamesData.find(g => g.id === gameId);
        if(game) {
            game.points += 5;
            updateRanking();
            document.getElementById('gameIframe').src = game.url;
            document.getElementById('gameModal').style.display = 'flex';
        }
    }
    
    function showCategoryGames(category) {
        const filtered = gamesData.filter(g => g.cat === category);
        const mid = Math.ceil(filtered.length / 2);
        const row1 = filtered.slice(0, mid);
        const row2 = filtered.slice(mid);
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g => `
                <div class="game-card" onclick="playGame(${g.id})">
                    <div class="fav-star ${isFavorite(g.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${g.id})">${isFavorite(g.id) ? '⭐' : '☆'}</div>
                    <div class="game-img" style="background-image:url('${g.img}')"></div>
                    <div class="game-title">${g.name}</div>
                </div>
            `).join('')}</div>
            <div class="game-row">${row2.map(g => `
                <div class="game-card" onclick="playGame(${g.id})">
                    <div class="fav-star ${isFavorite(g.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${g.id})">${isFavorite(g.id) ? '⭐' : '☆'}</div>
                    <div class="game-img" style="background-image:url('${g.img}')"></div>
                    <div class="game-title">${g.name}</div>
                </div>
            `).join('')}</div>
        `;
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    function renderFavoritesList() {
        const favGames = gamesData.filter(g => favorites.includes(g.id));
        const container = document.getElementById('favoritesList');
        if(!container) return;
        if(favGames.length === 0) {
            container.innerHTML = `<div style="color:#888; text-align:center; padding:40px;">⭐ لا توجد ألعاب مفضلة بعد<br>⭐ اضغط على النجمة في أي لعبة لإضافتها</div>`;
            return;
        }
        container.innerHTML = favGames.map(g => `
            <div class="favorite-item" onclick="playGame(${g.id})" style="display:flex; align-items:center; gap:12px; padding:10px; background:rgba(0,0,0,0.5); border-radius:15px; margin-bottom:8px; cursor:pointer;">
                <div style="width:50px; height:50px; background-image:url('${g.img}'); background-size:cover; border-radius:10px;"></div>
                <div style="flex:1;"><div style="color:white;">${g.name}</div><div style="color:#ff44ff; font-size:0.6rem;">${g.cat}</div></div>
                <button class="remove-fav" onclick="event.stopPropagation(); toggleFavorite(${g.id})" style="background:none; border:none; color:#ff3366; font-size:1.2rem; cursor:pointer;">🗑️</button>
            </div>
        `).join('');
    }
    
    function openFavoritesModal() { renderFavoritesList(); document.getElementById('favoritesModal').style.display = 'flex'; }
    function closeFavoritesModal() { document.getElementById('favoritesModal').style.display = 'none'; }
    function openWalletModal() { document.getElementById('walletModal').style.display = 'flex'; }
    function closeWalletModal() { document.getElementById('walletModal').style.display = 'none'; }
    function openPaymentModal() { if(isVIP) alert("✨ أنت بالفعل VIP!"); else { alert("💎 سيتم فتح بوابة الدفع قريباً"); upgradeToVIP(); } }
    function closeGameModal() { document.getElementById('gameModal').style.display = 'none'; document.getElementById('gameIframe').src = ''; }
    
    // جزيئات متحركة
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 4 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 10 + 5 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(p);
        }
    }
    
    // الإعلانات المتغيرة
    const ads = ["🎮 عرض VIP: خصم 50% لمدة محدودة! 🎮", "🔥 العب الآن واربح جوائز يومية! 🔥", "💰 اشترك في المحفظة واحصل على 10$ هدية! 💰", "⭐ أضف ألعابك المفضلة وشارك أصدقاءك! ⭐"];
    let adIdx = 0;
    setInterval(() => { adIdx = (adIdx + 1) % ads.length; document.getElementById('permanentAd').innerHTML = ads[adIdx]; }, 8000);
    
    // ==================== تهيئة الأحداث ====================
    document.getElementById('moreCategoriesBtn')?.addEventListener('click', () => {
        const cats = ['battle', 'sports', 'strategy', 'horror', 'rpg', 'simulation'];
        const catNames = ['🔫 معركة رويال', '⚽ رياضات', '🧠 استراتيجية', '👻 رعب', '⚔️ RPG', '🏙️ محاكاة'];
        let html = '<div class="modal-card" style="max-width:300px;"><h3 style="color:white;">🎮 تصنيفات إضافية</h3><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0;">';
        cats.forEach((c, i) => { html += `<div class="cat-badge" data-cat="${c}" style="cursor:pointer;" onclick="showCategoryGames('${c}'); document.getElementById('moreModal').style.display='none';">${catNames[i]}</div>`; });
        html += '</div><button class="security-btn" onclick="document.getElementById(\'moreModal\').style.display=\'none\'" style="padding:8px 20px;">إغلاق</button></div>';
        let modal = document.getElementById('moreModal');
        if(!modal) { modal = document.createElement('div'); modal.id = 'moreModal'; modal.className = 'modal-overlay'; document.body.appendChild(modal); }
        modal.innerHTML = html;
        modal.style.display = 'flex';
        modal.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
    });
    
    document.querySelectorAll('.cat-badge').forEach(b => {
        if(!b.classList.contains('more-btn')) b.addEventListener('click', () => showCategoryGames(b.dataset.cat));
    });
    document.getElementById('backToHomeBtn')?.addEventListener('click', () => {
        document.getElementById('homePage').classList.remove('page-hidden');
        document.getElementById('categoryPage').classList.add('page-hidden');
    });
    document.getElementById('openChatBtn')?.addEventListener('click', () => {
        const saved = localStorage.getItem('didogame_username');
        if(currentUser) { document.getElementById('chatPage').classList.remove('hidden'); renderChatsList(); }
        else { document.getElementById('securityPanel').style.display = 'flex'; if(saved) document.getElementById('securityUsername').value = saved; }
    });
    document.getElementById('closeChatFromInbox')?.addEventListener('click', () => document.getElementById('chatPage').classList.add('hidden'));
    document.getElementById('backToInboxBtn')?.addEventListener('click', backToInbox);
    document.getElementById('newChatBtn')?.addEventListener('click', () => {
        const name = prompt("اسم الغرفة الجديدة:", "غرفة جديدة");
        if(name && !allRooms[name]) { allRooms[name] = { password: null, users: [currentUser], messages: [] }; saveRooms(); renderChatsList(); }
        else if(name && allRooms[name]) alert("الغرفة موجودة مسبقاً");
    });
    document.getElementById('sendMsgOpen')?.addEventListener('click', sendMessage);
    document.getElementById('micBtnOpen')?.addEventListener('click', toggleMicrophone);
    document.getElementById('videoCallBtn')?.addEventListener('click', startVideoCall);
    document.getElementById('securityBtn')?.addEventListener('click', submitSecurityAndEnter);
    document.getElementById('walletBtn')?.addEventListener('click', openWalletModal);
    document.getElementById('favoritesBtn')?.addEventListener('click', openFavoritesModal);
    document.getElementById('registerBtn')?.addEventListener('click', openPaymentModal);
    document.getElementById('settingsBtn')?.addEventListener('click', () => { alert("⚙️ سيتم فتح الإعدادات قريباً"); });
    
    // إنشاء نماذج إضافية
    const favModal = document.createElement('div'); favModal.id = 'favoritesModal'; favModal.className = 'modal-overlay';
    favModal.innerHTML = `<div class="modal-card"><h3 style="color:white;">⭐ ألعابي المفضلة</h3><div id="favoritesList" style="max-height:400px; overflow-y:auto; margin:15px 0;"></div><button class="security-btn" onclick="closeFavoritesModal()" style="padding:8px 20px;">إغلاق</button></div>`;
    document.body.appendChild(favModal);
    const walletModal = document.createElement('div'); walletModal.id = 'walletModal'; walletModal.className = 'modal-overlay';
    walletModal.innerHTML = `<div class="modal-card"><h3 style="color:white;">💳 المحفظة الإلكترونية</h3><p style="color:#aaa; font-size:0.7rem;">اختر طريقة الدفع</p><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0;"><div class="cat-badge">💳 فيزا</div><div class="cat-badge">🅿️ باي بال</div><div class="cat-badge">₿ بيتكوين</div><div class="cat-badge">📱 STC Pay</div><div class="cat-badge">💙 فلوسي</div></div><button class="security-btn" onclick="closeWalletModal()" style="padding:8px 20px;">إغلاق</button></div>`;
    document.body.appendChild(walletModal);
    
    window.toggleFavorite = toggleFavorite;
    window.playGame = playGame;
    window.showCategoryGames = showCategoryGames;
    window.closeGameModal = closeGameModal;
    window.openRoomChat = openRoomChat;
    window.closeFavoritesModal = closeFavoritesModal;
    window.closeWalletModal = closeWalletModal;
    
    // التهيئة النهائية
    createParticles();
    updateRanking();
    renderAllGames();
    const savedVIP = localStorage.getItem('didogame_vip');
    if(savedVIP === 'true') { isVIP = true; document.getElementById('registerBtn').classList.add('active'); }
    const savedUser = localStorage.getItem('didogame_username');
    if(savedUser) document.getElementById('securityUsername').value = savedUser;
    loadRooms();
    
    setInterval(() => {
        if(currentOpenRoom && allRooms[currentOpenRoom] && document.getElementById('openChatView').style.display === 'flex')
            displayMessagesInOpenChat();
        if(currentUser && document.getElementById('inboxView').style.display === 'flex')
            renderChatsList();
    }, 2000);
</script>
</body>
</html>
