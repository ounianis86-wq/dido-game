<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DidoGame | 120 لعبة - منصة الألعاب المتكاملة</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo','Tajawal',sans-serif}
        body{background:linear-gradient(135deg,#0a0a1a,#0f0f2a);min-height:100vh;padding:12px}
        .app{max-width:550px;width:100%;margin:0 auto;background:rgba(10,10,30,0.9);backdrop-filter:blur(20px);border-radius:35px;overflow:hidden;height:96vh;display:flex;flex-direction:column;border:1px solid rgba(255,68,255,0.4)}
        .content{padding:12px;flex:1;overflow-y:auto}
        .page{display:flex;flex-direction:column;height:100%}
        .page-hidden{display:none}
        .anime-hero{background:linear-gradient(135deg,rgba(255,68,255,0.2),rgba(0,255,255,0.1));border-radius:25px;padding:15px;margin-bottom:15px;display:flex;align-items:center;gap:15px}
        .character-img{width:80px;height:80px;background:linear-gradient(135deg,#ff44ff,#00ffff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
        .controller-on-hand{position:absolute;bottom:-5px;right:-5px;background:#ff44ff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;border:2px solid white}
        .tshirt-text{background:linear-gradient(135deg,#ff3366,#ff44ff,#00ffff);padding:4px 12px;border-radius:20px;color:white;font-size:0.7rem;display:inline-block}
        .character-info h2{background:linear-gradient(135deg,#ffff00,#ff44ff,#00ffff);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:0.8rem;margin-top:5px}
        .ranking-section{background:rgba(0,0,0,0.3);border-radius:25px;padding:12px;margin-bottom:15px;text-align:center}
        .ranking-title{color:#ffcc00;font-size:0.7rem;margin-bottom:8px}
        .ranking-circles{display:flex;justify-content:center;gap:20px}
        .gold-circle,.silver-circle,.bronze-circle{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:5px}
        .gold-circle{background:linear-gradient(145deg,#ffd700,#ffaa00);border:2px solid #ffd700;box-shadow:0 0 15px #ffd700}
        .silver-circle{background:linear-gradient(145deg,#c0c0c0,#a0a0a0);border:2px solid #c0c0c0}
        .bronze-circle{background:linear-gradient(145deg,#cd7f32,#b8651a);border:2px solid #cd7f32}
        .rank-name{color:white;font-size:0.5rem}
        .rank-points{color:#ffcc00;font-size:0.45rem}
        .categories{display:flex;gap:8px;overflow-x:auto;padding:5px 0;margin-bottom:15px}
        .cat-badge{background:rgba(255,68,255,0.2);border:1px solid #ff44ff;padding:6px 14px;border-radius:25px;color:white;font-size:0.65rem;cursor:pointer;white-space:nowrap}
        .more-btn{background:linear-gradient(135deg,#ff44ff,#00ffff);border:none;padding:6px 14px;border-radius:25px;color:white;font-size:0.65rem;cursor:pointer}
        .games-wrapper{display:flex;flex-direction:column;gap:12px}
        .game-row{display:flex;gap:10px;overflow-x:auto;padding:5px 0}
        .game-card{min-width:100px;background:linear-gradient(145deg,#0f0f2a,#0a0a1a);border-radius:15px;padding:8px;text-align:center;border:1px solid rgba(255,68,255,0.3);cursor:pointer;position:relative}
        .game-card:hover{transform:translateY(-3px);border-color:#00ffff}
        .fav-star{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.6);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;cursor:pointer}
        .fav-star.active{color:#ffcc00}
        .game-img{width:100%;height:80px;background-size:cover;background-position:center;border-radius:10px;margin-bottom:5px}
        .game-title{color:white;font-size:0.55rem;font-weight:bold}
        .bottom-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:rgba(8,8,20,0.95);border-top:1px solid rgba(255,68,255,0.3)}
        .bottom-right,.bottom-left{display:flex;gap:10px}
        .nav-btn{display:flex;flex-direction:column;align-items:center;background:transparent;border:none;cursor:pointer;padding:5px 10px;border-radius:25px}
        .nav-btn .icon{font-size:1.2rem}
        .nav-btn .label{font-size:0.5rem;color:#aaa}
        .chat-center-btn{background:linear-gradient(135deg,#ff44ff,#ff00aa);border-radius:40px;padding:5px 15px}
        .chat-center-btn .icon,.chat-center-btn .label{color:white}
        .fixed-permanent-ad{background:rgba(255,68,255,0.2);border:1px solid #ff44ff;border-radius:20px;padding:10px;margin:10px 0;text-align:center;color:white;font-size:0.7rem}
        .game-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:2000;display:none;align-items:center;justify-content:center}
        .game-modal iframe{width:95%;height:85%;border-radius:20px;border:3px solid #ff44ff}
        .close-modal{position:absolute;top:15px;right:15px;background:#ff3366;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer}
        .back-btn-custom{background:rgba(255,68,255,0.2);border:1px solid #ff44ff;padding:6px 12px;border-radius:20px;color:white;font-size:0.7rem;cursor:pointer;margin-bottom:10px;display:inline-block}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:1500;display:none;align-items:center;justify-content:center}
        .modal-card{background:#1a1a2e;border-radius:30px;padding:20px;width:90%;max-width:350px;border:2px solid #ff44ff;text-align:center}
        .hidden{display:none}
        .chat-popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center}
        .chat-popup-container{width:95%;max-width:500px;height:85%;background:#0f0f2a;border-radius:30px;border:2px solid #ff44ff;overflow:hidden}
        .chat-header{padding:12px;background:#0a0a1a;border-bottom:1px solid #ff44ff;display:flex;align-items:center;gap:10px}
        .chat-messages{flex:1;overflow-y:auto;padding:15px}
        .chat-input-area{padding:12px;background:#0a0a1a;border-top:1px solid #ff44ff;display:flex;gap:10px}
        .chat-input{flex:1;padding:10px;border-radius:25px;border:none;background:#1f1f2e;color:white}
        .send-btn{background:#ff44ff;border:none;width:40px;height:40px;border-radius:50%;color:white;cursor:pointer}
        .security-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border-radius:30px;padding:25px;width:90%;max-width:350px;border:2px solid #ff44ff;z-index:3000;display:none;flex-direction:column;gap:12px}
        .security-input{padding:12px;border-radius:25px;border:1px solid #ff44ff;background:rgba(0,0,0,0.5);color:white}
        .security-btn{background:linear-gradient(135deg,#ff44ff,#00ffff);border:none;padding:12px;border-radius:25px;color:white;cursor:pointer}
    </style>
</head>
<body>

<div class="app">
    <div class="content">
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img"><div class="controller-on-hand">🎮</div>😎</div>
                <div class="character-info"><div class="tshirt-text">⚡ DIDO-GAME ⚡</div><h2>😤 120 لعبة جاهزة للعب!</h2></div>
            </div>
            <div class="ranking-section"><div class="ranking-title">🏆 أفضل اللاعبين 🏆</div><div class="ranking-circles" id="rankingList"></div></div>
            <div class="categories"><div class="more-btn" id="moreCategoriesBtn">➕ المزيد</div><div class="cat-badge" data-cat="action">🎯 أكشن</div><div class="cat-badge" data-cat="racing">🏎️ سباقات</div><div class="cat-badge" data-cat="fighting">🥊 قتال</div><div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div></div>

            <div class="games-wrapper" id="gamesWrapper"></div>
        </div>
        <div id="categoryPage" class="page page-hidden"><div class="back-btn-custom" id="backToHomeBtn">🔙 رجوع</div><div class="games-wrapper" id="categoryGamesContainer"></div></div>
    </div>
    <div class="bottom-bar">
        <div class="bottom-right"><button class="nav-btn" id="walletBtn"><span class="icon">💳</span><span class="label">المحفظة</span></button><button class="nav-btn" id="registerBtn"><span class="icon">👑</span><span class="label">VIP</span></button></div>

        <div class="bottom-left"><button class="nav-btn" id="settingsBtn"><span class="icon">⚙️</span><span class="label">الإعدادات</span></button><button class="nav-btn" id="favoritesBtn"><span class="icon">⭐</span><span class="label">المفضلة</span></button></div>

</div>

<div id="gameModal" class="game-modal"><div class="close-modal" onclick="closeGameModal()">✕</div><iframe id="gameIframe" src=""></iframe></div>
<div id="favoritesModal" class="modal-overlay"><div class="modal-card"><h3 style="color:white;">⭐ ألعابي المفضلة</h3><div id="favoritesList" style="max-height:300px;overflow-y:auto;margin:15px 0;"></div><button class="back-btn-custom" onclick="document.getElementById('favoritesModal').style.display='none'">إغلاق</button></div></div>
<div id="securityPanel" class="security-panel"><h3 style="color:white;text-align:center;">🔐 الدخول إلى الدردشة</h3><input type="text" id="chatUsername" class="security-input" placeholder="اسم المستخدم"><input type="text" id="chatRoom" class="security-input" placeholder="اسم الغرفة" value="الرئيسية"><button class="security-btn" id="joinChatBtn">دخول</button></div>
<div id="chatPopup" class="chat-popup-overlay"><div class="chat-popup-container"><div class="chat-header"><button id="closeChat" style="background:#ff3366;border:none;width:30px;height:30px;border-radius:50%;color:white;cursor:pointer;">✕</button><span id="chatRoomName" style="color:white;flex:1;">الغرفة</span></div><div class="chat-messages" id="chatMessages"></div><div class="chat-input-area"><input type="text" id="chatInput" class="chat-input" placeholder="اكتب رسالة..."><button class="send-btn" id="sendChatBtn">📤</button></div></div></div>

<script>
// ==================== 120 لعبة كاملة (جاهزة للعب) ====================
let gamesData = [];
let favorites = JSON.parse(localStorage.getItem('didogame_favorites') || '[]');
let isVIP = localStorage.getItem('isVIP') === 'true';
let currentUser = null;
let currentRoom = null;
let allMessages = {};

// قوائم الأسماء والروابط الحقيقية (من ألعاب تعمل على CrazyGames)

    "https://www.crazygames.com/embed/sonic-the-hedgehog", "https://www.crazygames.com/embed/subway-surfers", "https://www.crazygames.com/embed/temple-run-2", "https://www.crazygames.com/embed/minecraft-classic", "https://www.crazygames.com/embed/fortnite", "https://www.crazygames.com/embed/pubg", "https://www.crazygames.com/embed/roblox", "https://www.crazygames.com/embed/fall-guys", "https://www.crazygames.com/embed/among-us-online", "https://www.crazygames.com/embed/street-fighter",
    "https://www.crazygames.com/embed/motox3m", "https://www.crazygames.com/embed/drift-hunters", "https://www.crazygames.com/embed/hill-climb-racing", "https://www.crazygames.com/embed/2048", "https://www.crazygames.com/embed/cut-the-rope", "https://www.crazygames.com/embed/bubble-shooter", "https://www.crazygames.com/embed/tetris", "https://www.crazygames.com/embed/sudoku", "https://www.crazygames.com/embed/chess", "https://www.crazygames.com/embed/checkers",
    "https://www.crazygames.com/embed/basketball-stars", "https://www.crazygames.com/embed/soccer-physics", "https://www.crazygames.com/embed/granny", "https://www.crazygames.com/embed/kingdom-rush", "https://www.crazygames.com/embed/the-sims", "https://www.crazygames.com/embed/my-dolphin-show", "https://www.crazygames.com/embed/zombs-royale", "https://www.crazygames.com/embed/1v1-lol", "https://www.crazygames.com/embed/krunkerio", "https://www.crazygames.com/embed/slitherio",

    "https://www.crazygames.com/embed/basketball-stars", "https://www.crazygames.com/embed/soccer-physics", "https://www.crazygames.com/embed/baseball-pro", "https://www.crazygames.com/embed/tennis-masters", "https://www.crazygames.com/embed/volleyball-challenge", "https://www.crazygames.com/embed/penalty-kicks", "https://www.crazygames.com/embed/football-kick", "https://www.crazygames.com/embed/table-tennis", "https://www.crazygames.com/embed/bowling-master", "https://www.crazygames.com/embed/golf-star",
    "https://www.crazygames.com/embed/tower-defense", "https://www.crazygames.com/embed/age-of-war", "https://www.crazygames.com/embed/defense-battle", "https://www.crazygames.com/embed/strategy-war", "https://www.crazygames.com/embed/backgammon", "https://www.crazygames.com/embed/dominoes", "https://www.crazygames.com/embed/solitaire", "https://www.crazygames.com/embed/kingdom-rush", "https://www.crazygames.com/embed/tower-defense", "https://www.crazygames.com/embed/strategy-war",
    "https://www.crazygames.com/embed/dark-forest", "https://www.crazygames.com/embed/silent-house", "https://www.crazygames.com/embed/scary-maze", "https://www.crazygames.com/embed/horror-escape", "https://www.crazygames.com/embed/night-horror", "https://www.crazygames.com/embed/haunted-house", "https://www.crazygames.com/embed/dark-room", "https://www.crazygames.com/embed/scream", "https://www.crazygames.com/embed/shadow", "https://www.crazygames.com/embed/zombie",
    "https://www.crazygames.com/embed/adventure", "https://www.crazygames.com/embed/dungeon-crawler", "https://www.crazygames.com/embed/hero-wars", "https://www.crazygames.com/embed/magic-spells", "https://www.crazygames.com/embed/dragon-slayer", "https://www.crazygames.com/embed/knight", "https://www.crazygames.com/embed/wizard", "https://www.crazygames.com/embed/warrior", "https://www.crazygames.com/embed/archer", "https://www.crazygames.com/embed/legend",
    "https://www.crazygames.com/embed/city-builder", "https://www.crazygames.com/embed/farm-life", "https://www.crazygames.com/embed/restaurant-dash", "https://www.crazygames.com/embed/virtual-pet", "https://www.crazygames.com/embed/driving-simulator", "https://www.crazygames.com/embed/flying-simulator", "https://www.crazygames.com/embed/fishing-simulator", "https://www.crazygames.com/embed/building-simulator", "https://www.crazygames.com/embed/farm-simulator", "https://www.crazygames.com/embed/city-simulator"

const iconsList = ["🦔","🏃","🏛️","⛏️","🎯","🔫","🧱","🫘","👽","👊","🏍️","🚗","🏔️","🔢","✂️","🫧","🧩","🔢","♜","⬛","🏀","⚽","👵","🏰","🏙️","🐬","🧟","🎮","🎯","🐍","⚔️","🛡️","🚀","🧟‍♂️","🔫","💣","🏟️","👑","🌊","🧟","🏀","⚽","⚾","🎾","🏐","⚽","🏈","🏓","🎳","⛳","🏰","⚔️","🛡️","📊","🎲","🀄","🃏","🏰","🛡️","🎯","🌲","🏠","🌀","🚪","🌙","🏚️","🏠","🌑","😱","👥","🧟","🗡️","🏰","⚔️","🔮","🐉","⚔️","🏰","🧙","🗡️","🏹","📖","🏗️","🌾","🍔","🐕","🚗","✈️","🎣","🔨","🌽","🌆"];

const categoriesList = ["action","racing","fighting","puzzle","battle","sports","strategy","horror","rpg","simulation"];

// إنشاء 120 لعبة كاملة
for(let i = 0; i < 120; i++) {
    let catIndex = i % categoriesList.length;
    gamesData.push({
        id: i + 1,
        name: gameTitles[i % gameTitles.length] + (Math.floor(i / 20) + 1),
        icon: iconsList[i % iconsList.length],
        img: "https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg?w=100",
        url: gameUrls[i % gameUrls.length],
        cat: categoriesList[catIndex],
        points: 100 + Math.floor(Math.random() * 400),
        playerName: "بطل" + (i + 1)
    });
}

// تحديث الترتيب
function updateRanking() {
    let sorted = [...gamesData].sort((a,b)=>b.points - a.points);
    document.getElementById('rankingList').innerHTML = `
        <div class="rank-item"><div class="silver-circle">${sorted[1]?.icon || '👤'}</div><div class="rank-name">${sorted[1]?.name?.substring(0,8) || '---'}</div><div class="rank-points">⭐${sorted[1]?.points || 0}</div></div>
        <div class="rank-item"><div class="gold-circle">${sorted[0]?.icon || '👑'}</div><div class="rank-name">${sorted[0]?.name?.substring(0,8) || '---'}</div><div class="rank-points">⭐${sorted[0]?.points || 0}</div></div>
        <div class="rank-item"><div class="bronze-circle">${sorted[2]?.icon || '👤'}</div><div class="rank-name">${sorted[2]?.name?.substring(0,8) || '---'}</div><div class="rank-points">⭐${sorted[2]?.points || 0}</div></div>
    `;
}

// عرض جميع الألعاب
function renderAllGames() {
    let container = document.getElementById('gamesWrapper');
    let rows = [];
    for(let i = 0; i < gamesData.length; i += 8) {
        rows.push(gamesData.slice(i, i + 8));
    }
    container.innerHTML = rows.map(row => `<div class="game-row">${row.map(game => `
        <div class="game-card" onclick="playGame(${game.id})">
            <div class="fav-star ${favorites.includes(game.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${game.id})">${favorites.includes(game.id) ? '⭐' : '☆'}</div>
            <div class="game-img" style="background-image:url('${game.img}')"></div>
            <div class="game-title">${game.name}</div>
        </div>
    `).join('')}</div>`).join('');
}

// تشغيل اللعبة
function playGame(id) {
    let game = gamesData.find(g => g.id === id);
    if(game) {
        game.points += 5;
        updateRanking();
        document.getElementById('gameIframe').src = game.url;
        document.getElementById('gameModal').style.display = 'flex';
        localStorage.setItem('gamesData', JSON.stringify(gamesData));
    }
}

function closeGameModal() {
    document.getElementById('gameModal').style.display = 'none';
    document.getElementById('gameIframe').src = '';
}

// نظام المفضلات
function toggleFavorite(id) {
    let idx = favorites.indexOf(id);
    if(idx === -1) favorites.push(id);
    else favorites.splice(idx,1);
    localStorage.setItem('didogame_favorites', JSON.stringify(favorites));
    renderAllGames();
    showFavoritesList();
}

function showFavoritesList() {
    let favGames = gamesData.filter(g => favorites.includes(g.id));
    let container = document.getElementById('favoritesList');
    if(favGames.length === 0) container.innerHTML = '<div style="color:#888;text-align:center;padding:20px;">⭐ لا توجد ألعاب مفضلة بعد</div>';
    else container.innerHTML = favGames.map(g => `<div onclick="playGame(${g.id});document.getElementById('favoritesModal').style.display='none';" style="display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,0.1);border-radius:10px;margin-bottom:8px;cursor:pointer;"><div style="width:40px;height:40px;background:#ff44ff;border-radius:10px;display:flex;align-items:center;justify-content:center;">${g.icon}</div><div style="flex:1;"><div style="color:white;">${g.name}</div><div style="color:#ffcc00;font-size:0.6rem;">⭐${g.points}</div></div><button onclick="event.stopPropagation();toggleFavorite(${g.id})" style="background:#ff3366;border:none;padding:5px 10px;border-radius:10px;color:white;cursor:pointer;">✕</button></div>`).join('');
}

// عرض الألعاب حسب التصنيف
function showCategoryGames(category) {
    let filtered = gamesData.filter(g => g.cat === category);
    let container = document.getElementById('categoryGamesContainer');
    let rows = [];
    for(let i = 0; i < filtered.length; i += 8) {
        rows.push(filtered.slice(i, i + 8));
    }
    container.innerHTML = rows.map(row => `<div class="game-row">${row.map(game => `
        <div class="game-card" onclick="playGame(${game.id})">
            <div class="fav-star ${favorites.includes(game.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${game.id})">${favorites.includes(game.id) ? '⭐' : '☆'}</div>
            <div class="game-img" style="background-image:url('${game.img}')"></div>
            <div class="game-title">${game.name}</div>
        </div>
    `).join('')}</div>`).join('');
    document.getElementById('homePage').classList.add('page-hidden');
    document.getElementById('categoryPage').classList.remove('page-hidden');
}

// الدردشة
let chatRooms = JSON.parse(localStorage.getItem('chatRooms') || '{}');

function openChat() {
    if(currentUser) {
        document.getElementById('chatPopup').style.display = 'flex';
        loadMessages();
    } else {
        document.getElementById('securityPanel').style.display = 'flex';
    }
}

function joinChat() {
    let user = document.getElementById('chatUsername').value.trim();
    let room = document.getElementById('chatRoom').value.trim();
    if(!user) { alert("أدخل اسم المستخدم"); return; }
    if(!room) { alert("أدخل اسم الغرفة"); return; }
    currentUser = user;
    currentRoom = room;
    if(!chatRooms[room]) chatRooms[room] = [];
    localStorage.setItem('chatRooms', JSON.stringify(chatRooms));
    document.getElementById('securityPanel').style.display = 'none';
    document.getElementById('chatPopup').style.display = 'flex';
    document.getElementById('chatRoomName').innerHTML = room + " - " + user;
    loadMessages();
}

function loadMessages() {
    let container = document.getElementById('chatMessages');
    let msgs = chatRooms[currentRoom] || [];
    container.innerHTML = msgs.map(m => `<div style="margin-bottom:10px;"><span style="color:#ff44ff;">${m.user}:</span> <span style="color:white;">${m.text}</span><div style="font-size:0.6rem;color:#888;">${new Date(m.time).toLocaleTimeString()}</div></div>`).join('');
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    let input = document.getElementById('chatInput');
    let text = input.value.trim();
    if(!text || !currentRoom) return;
    if(!chatRooms[currentRoom]) chatRooms[currentRoom] = [];
    chatRooms[currentRoom].push({user: currentUser, text: text, time: Date.now()});
    localStorage.setItem('chatRooms', JSON.stringify(chatRooms));
    input.value = '';
    loadMessages();
}

// ربط الأزرار والوظائف
document.getElementById('openChatBtn').onclick = openChat;
document.getElementById('joinChatBtn').onclick = joinChat;
document.getElementById('closeChat').onclick = () => document.getElementById('chatPopup').style.display = 'none';
document.getElementById('sendChatBtn').onclick = sendMessage;
document.getElementById('chatInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
document.getElementById('walletBtn').onclick = () => alert("💳 المحفظة الإلكترونية\n\nطرق الدفع: فيزا، باي بال، عملات رقمية، STC Pay");
document.getElementById('registerBtn').onclick = () => { if(isVIP) alert("✨ أنت عضو VIP"); else { isVIP=true; localStorage.setItem('isVIP','true'); alert("🎉 أصبحت عضواً مميزاً VIP"); } };
document.getElementById('settingsBtn').onclick = () => alert("⚙️ الإعدادات\nاللغة: العربية\nالإصدار: 2.0 (120 لعبة)");
document.getElementById('favoritesBtn').onclick = () => { showFavoritesList(); document.getElementById('favoritesModal').style.display = 'flex'; };
document.getElementById('backToHomeBtn').onclick = () => { document.getElementById('homePage').classList.remove('page-hidden'); document.getElementById('categoryPage').classList.add('page-hidden'); };
document.querySelectorAll('.cat-badge').forEach(b => { if(!b.classList.contains('more-btn')) b.onclick = () => showCategoryGames(b.dataset.cat); });

// نافذة التصنيفات الإضافية
document.getElementById('moreCategoriesBtn').onclick = () => {
    let extra = ['battle','sports','strategy','horror','rpg','simulation'];
    let names = ['🔫 معركة','⚽ رياضة','🧠 استراتيجية','👻 رعب','⚔️ RPG','🏙️ محاكاة'];
    let html = '<div class="modal-card"><h3 style="color:white;">تصنيفات إضافية</h3><div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:15px 0;">';
    extra.forEach((c,i) => html += `<div class="cat-badge" style="cursor:pointer;" onclick="showCategoryGames('${c}');document.getElementById('moreModal').style.display='none';">${names[i]}</div>`);
    html += '</div><button class="back-btn-custom" onclick="document.getElementById(\'moreModal\').style.display=\'none\'">إغلاق</button></div>';
    let modal = document.getElementById('moreModal');
    if(!modal) { modal = document.createElement('div'); modal.id = 'moreModal'; modal.className = 'modal-overlay'; document.body.appendChild(modal); }
    modal.innerHTML = html; modal.style.display = 'flex';
    modal.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
};

// إعلانات متحركة
let ads = ["🎮 120 لعبة جاهزة! اختر لعبتك 🎮", "🔥 العب واربح نقاطاً! 🔥", "💰 اشترك في VIP واحصل على مميزات 💰", "⭐ أضف ألعابك المفضلة ⭐"];
let adIdx = 0;
setInterval(() => { adIdx = (adIdx+1)%ads.length; document.getElementById('permanentAd').innerHTML = ads[adIdx]; }, 5000);

// تحميل البيانات المحفوظة
let saved = localStorage.getItem('gamesData');
if(saved) gamesData = JSON.parse(saved);
updateRanking();
renderAllGames();
if(document.getElementById('chatUsername')) document.getElementById('chatUsername').value = localStorage.getItem('chatUser') || '';
</script>
