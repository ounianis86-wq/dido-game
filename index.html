<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Games</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    overflow:hidden;
}

/* ================= واجهة الموقع ================= */

#home{
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,#111827,#1e293b);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

#home h1{
    font-size:55px;
    color:gold;
}

#home p{
    font-size:22px;
    opacity:0.8;
}

.menu-btn{
    width:250px;
    padding:18px;
    margin:10px;
    border:none;
    border-radius:15px;
    font-size:22px;
    background:gold;
    color:black;
    font-weight:bold;
}

/* ================= اللعبة ================= */

#game{
    width:100vw;
    height:100vh;
    position:relative;
    display:none;
    overflow:hidden;
    background:linear-gradient(to bottom,#1e3c72,#2a5298);
}

#player{
    width:90px;
    height:90px;
    border-radius:20px;
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(45deg,#ffd700,#ff8c00);
    box-shadow:0 0 30px gold;
}

.coin{
    width:50px;
    height:50px;
    border-radius:50%;
    background:gold;
    position:absolute;
    top:-60px;
    box-shadow:0 0 20px yellow;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:100;
    font-size:24px;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:55px;
    font-weight:bold;
    display:none;
}

.control-btn{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:18px;
}

</style>
</head>

<body>

<!-- ================= الصفحة الرئيسية ================= -->

<div id="home">

<h1>DIDO GAMES</h1>

<p>Arcade • Action • Fun</p>

<button class="menu-btn" onclick="startGame()">
🎮 Start Game
</button>

<button class="menu-btn">
🏆 Leaderboard
</button>

<button class="menu-btn">
⚙ Settings
</button>

</div>


<!-- ================= اللعبة ================= -->

<div id="game">

<div id="ui">

<div id="score">Score: 0</div>
<div id="level">Level: 1</div>

<button class="control-btn" onclick="pauseGame()">
⏸ Pause
</button>

<button class="control-btn" onclick="resumeGame()">
▶ Resume
</button>

</div>

<div id="player"></div>
<div class="coin" id="coin"></div>

<div id="message"></div>

</div>


<script>

/* ================= عناصر ================= */

const home = document.getElementById("home");
const game = document.getElementById("game");

const player = document.getElementById("player");
const coin = document.getElementById("coin");

const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");

const message = document.getElementById("message");


/* ================= أصوات ================= */

/* موسيقى جديدة أقوى */

const bgMusic = new Audio(
"https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=8-bit-arcade-110958.mp3"
);

bgMusic.loop = true;
bgMusic.volume = 0.5;

const collectSound = new Audio(
"https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-229.wav"
);

const loseSound = new Audio(
"https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav"
);


/* ================= بيانات اللعبة ================= */

let score = 0;

let level = 1;

let speed = 4;

let isPaused = false;

let gameOver = false;

let savedLevel = 1;

let savedSpeed = 4;

let playerX = window.innerWidth / 2;

let coinX = Math.random() * (window.innerWidth - 50);

let coinY = -60;


/* ================= بدء اللعبة ================= */

async function startGame(){

    home.style.display = "none";

    game.style.display = "block";

    try{

        await bgMusic.play();

    }catch(e){

        console.log("music blocked");

    }

}


/* ================= لمس ================= */

document.addEventListener("touchmove",(e)=>{

    if(gameOver) return;

    playerX = e.touches[0].clientX - 45;

    if(playerX < 0)
        playerX = 0;

    if(playerX > window.innerWidth - 90)
        playerX = window.innerWidth - 90;

    player.style.left = playerX + "px";

});


/* ================= الحلقة ================= */

function gameLoop(){

    if(!isPaused && !gameOver){

        coinY += speed;

        coin.style.top = coinY + "px";

        coin.style.left = coinX + "px";


        /* جمع العملة */

        if(

            coinY > window.innerHeight - 160 &&

            coinX > playerX - 50 &&

            coinX < playerX + 90

        ){

            score++;

            scoreText.innerHTML =
            "Score: " + score;

            collectSound.currentTime = 0;

            collectSound.play();


            /* مستويات أطول بكثير */

            if(score % 30 === 0){

                level++;

                speed += 0.8;

                savedLevel = level;

                savedSpeed = speed;

                levelText.innerHTML =
                "Level: " + level;

                showMessage("LEVEL " + level);

            }

            resetCoin();

        }


        /* خسارة */

        if(coinY > window.innerHeight){

            gameOver = true;

            loseSound.play();

            bgMusic.pause();

            showMessage("GAME OVER");

            setTimeout(()=>{

                if(confirm(
                "Continue From Level "
                + savedLevel + " ?"
                )){

                    continueGame();

                }

            },1000);

        }

    }

    requestAnimationFrame(gameLoop);

}


/* ================= متابعة اللعب ================= */

async function continueGame(){

    gameOver = false;

    level = savedLevel;

    speed = savedSpeed;

    coinY = -60;

    coinX = Math.random()
    * (window.innerWidth - 50);

    try{

        await bgMusic.play();

    }catch(e){}

}


/* ================= إعادة العملة ================= */

function resetCoin(){

    coinY = -60;

    coinX = Math.random()
    * (window.innerWidth - 50);

}


/* ================= رسائل ================= */

function showMessage(text){

    message.innerHTML = text;

    message.style.display = "block";

    setTimeout(()=>{

        message.style.display = "none";

    },2000);

}


/* ================= تحكم ================= */

function pauseGame(){

    isPaused = true;

    bgMusic.pause();

}

async function resumeGame(){

    isPaused = false;

    try{

        await bgMusic.play();

    }catch(e){}

}


/* ================= تشغيل ================= */

gameLoop();

</script>

</body>
</html>
