<style>
.games-section{
padding:40px;
background:#0f172a;
color:white;
}

.games-title{
font-size:40px;
text-align:center;
margin-bottom:30px;
}

.games-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.game-card{
background:#1e293b;
padding:20px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.4);
text-align:center;
}

.game-card h2{
margin-bottom:10px;
}

canvas{
background:black;
border:3px solid white;
border-radius:12px;
width:100%;
max-width:500px;
margin-top:10px;
}

.score{
margin-top:10px;
font-size:20px;
}

.play-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

.play-btn:hover{
background:#7c3aed;
}
</style>

<section class="games-section">

<h1 class="games-title">Dido Game Arcade</h1>

<div class="games-grid">

<div class="game-card">
<h2>لعبة جمع العملات</h2>

<canvas id="coinGame" width="500" height="500"></canvas>

<div class="score">
النقاط:
<span id="coinScore">0</span>
</div>
</div>

<div class="game-card">
<h2>لعبة السباق</h2>

<canvas id="raceGame" width="500" height="500"></canvas>

<div class="score">
النقاط:
<span id="raceScore">0</span>
</div>
</div>

<div class="game-card">
<h2>لعبة الذاكرة</h2>

<h3 id="memoryText">اضغط ابدأ</h3>

<button class="play-btn" onclick="startMemoryGame()">
ابدأ اللعبة
</button>
</div>

</div>

</section>

<audio id="coinSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<script>
/* ---------------------- */
/* لعبة العملات */
/* ---------------------- */

const coinCanvas=document.getElementById("coinGame");
const cctx=coinCanvas.getContext("2d");

let player={
x:220,
y:430,
size:50
};

let coins=[];
let coinScore=0;
let level=1;
let gameOver=false;

function createCoin(){
coins.push({
x:Math.random()*470,
y:-20,
size:18
});
}

setInterval(()=>{
if(!gameOver){
createCoin();
}
},900);

function drawPlayer(){
cctx.fillStyle="cyan";
cctx.fillRect(player.x,player.y,player.size,player.size);
}

function drawCoins(){
cctx.fillStyle="gold";

coins.forEach(c=>{
cctx.beginPath();
cctx.arc(c.x,c.y,c.size,0,Math.PI*2);
cctx.fill();
});
}

function updateCoins(){

coins.forEach((c,index)=>{

c.y+=4+level;

if(
c.x>player.x &&
c.x<player.x+player.size &&
c.y>player.y &&
c.y<player.y+player.size
){

coins.splice(index,1);

coinScore++;

document.getElementById("coinScore").innerText=coinScore;

document.getElementById("coinSound").play();

if(coinScore%10===0){
level++;
}

}

if(c.y>500){

gameOver=true;

setTimeout(()=>{
alert("خسرت لكنك ستعود لنفس المستوى");
coins=[];
gameOver=false;
},100);

}

});

}

function coinLoop(){

cctx.clearRect(0,0,500,500);

drawPlayer();

drawCoins();

updateCoins();

requestAnimationFrame(coinLoop);

}

coinLoop();

window.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){
player.x-=25;
}

if(e.key==="ArrowRight"){
player.x+=25;
}

});

coinCanvas.addEventListener("touchmove",e=>{

let rect=coinCanvas.getBoundingClientRect();

let touch=e.touches[0];

player.x=touch.clientX-rect.left-player.size/2;

});

/* ---------------------- */
/* لعبة السباق */
/* ---------------------- */

const raceCanvas=document.getElementById("raceGame");
const rctx=raceCanvas.getContext("2d");

let car={
x:220,
y:390,
width:60,
height:90
};

let enemies=[];
let raceScore=0;

function createEnemy(){

enemies.push({
x:Math.random()*430,
y:-100,
width:60,
height:90
});

}

setInterval(createEnemy,1200);

function raceLoop(){

rctx.clearRect(0,0,500,500);

rctx.fillStyle="red";
rctx.fillRect(car.x,car.y,car.width,car.height);

rctx.fillStyle="white";

enemies.forEach((e,index)=>{

e.y+=7;

rctx.fillRect(e.x,e.y,e.width,e.height);

if(
car.x<e.x+e.width &&
car.x+car.width>e.x &&
car.y<e.y+e.height &&
car.y+car.height>e.y
){

alert("انتهت اللعبة");

enemies=[];
raceScore=0;

}

if(e.y>500){

enemies.splice(index,1);

raceScore++;

document.getElementById("raceScore").innerText=raceScore;

}

});

requestAnimationFrame(raceLoop);

}

raceLoop();

window.addEventListener("keydown",e=>{

if(e.key==="a"){
car.x-=25;
}

if(e.key==="d"){
car.x+=25;
}

});

raceCanvas.addEventListener("touchmove",e=>{

let rect=raceCanvas.getBoundingClientRect();

let touch=e.touches[0];

car.x=touch.clientX-rect.left-car.width/2;

});

/* ---------------------- */
/* لعبة الذاكرة */
/* ---------------------- */

function startMemoryGame(){

const text=document.getElementById("memoryText");

const words=[
"تفاحة",
"سيارة",
"كتاب",
"قمر",
"أسد"
];

const random=words[
Math.floor(Math.random()*words.length)
];

text.innerText="تذكر هذه الكلمة: "+random;

setTimeout(()=>{

let answer=prompt("ما هي الكلمة؟");

if(answer===random){

text.innerText="إجابة صحيحة 🎉";

}else{

text.innerText="إجابة خاطئة ❌";

}

},3000);

}
</script>
