<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DidoGame - 3D Anime City | دردشة VIP خاصة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #05050f;
            min-height: 100vh;
            padding: 6px;
        }

        .anime-city-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images7.alphacoders.com/132/1322910.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -2;
            animation: slowZoom 20s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
        
        .anime-city-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        .app {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(5,5,20,0.75);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            overflow: hidden;
            height: 98vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px #ff00ff, 0 0 20px #00ffff;
            border: 1px solid rgba(255,68,255,0.3);
            position: relative;
        }

        .content {
            padding: 8px 10px;
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }
        
        .content::-webkit-scrollbar {
            display: none;
        }

        /* الصفحات */
        .page {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        .page-hidden {
            display: none;
        }

        /* أنمي هيرو */
        .anime-hero {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border-radius: 25px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 20px #ff44ff;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff; border-color: #00ffff; }
            100% { box-shadow: 0 0 10px #ff44ff; border-color: #ff44ff; }
        }
        
        .character-img {
            width: 70px;
            height: 70px;
            background: url('https://i.pinimg.com/originals/6e/5e/6c/6e5e6c8e2e6e6c8e2e6e6c8e2e6e6c8e.png');
            background-size: cover;
            border-radius: 50%;
            border: 2px solid #ff44ff;
            position: relative;
        }
        
        .controller-on-hand {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            border: 1px solid white;
        }
        
        .tshirt-text {
            background: linear-gradient(135deg, #ff3366, #ff44ff, #00ffff);
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .character-info h2 {
            background: linear-gradient(135deg, #ffff00, #ff44ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 0.7rem;
        }

        /* ترتيب اللاعبين */
        .ranking-section {
            margin-bottom: 10px;
            text-align: center;
        }
        
        .ranking-circles {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .gold-circle {
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 3px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px #ffd700;
        }
        
        .silver-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: 3px;
            border: 1.5px solid #c0c0c0;
            box-shadow: 0 0 15px #c0c0c0;
        }
        
        .bronze-circle {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #cd7f32, #b8651a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: 3px;
            border: 1.5px solid #cd7f32;
            box-shadow: 0 0 15px #cd7f32;
        }
        
        .rank-name {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }
        
        .rank-points {
            color: #ffcc00;
            font-size: 0.45rem;
        }

        /* التصنيفات */
        .categories-section {
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        
        .cat-badge {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 4px 12px;
            border-radius: 22px;
            color: white;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px #ff44ff;
        }

        /* الإعلان الثابت */
        .fixed-permanent-ad {
            background: linear-gradient(135deg, #ff44ff20, #00ffff20);
            border: 2px solid #ff44ff;
            border-radius: 20px;
            padding: 8px;
            margin: 8px 0;
            text-align: center;
            color: white;
            font-size: 0.65rem;
            box-shadow: 0 0 15px #ff44ff;
        }

        /* الألعاب - صفين متوازيين */
        .games-wrapper {
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .two-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .game-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }
        
        .game-row::-webkit-scrollbar {
            display: none;
        }
        
        .game-card {
            min-width: 95px;
            width: 95px;
            background: linear-gradient(145deg, #0f0f2a, #0a0a1a);
            border-radius: 14px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ff44ff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px #ff44ff;
        }
        
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #00ffff;
            box-shadow: 0 0 25px #00ffff;
        }
        
        .game-img {
            width: 100%;
            height: 65px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 4px;
        }
        
        .game-title {
            color: white;
            font-size: 0.5rem;
            font-weight: bold;
        }
        
        .game-cat {
            color: #00ffff;
            font-size: 0.4rem;
        }

        /* الشريط السفلي مع زر الدردشة الدائري */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            border-top: 1px solid #ff44ff;
            background: rgba(0,0,0,0.6);
            position: relative;
        }
        
        .register-btn {
            background: #ff44ff30;
            border: 1px solid #ff44ff;
            padding: 5px 12px;
            border-radius: 18px;
            color: white;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .register-btn.vip-active {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
        }
        
        .chat-circle-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 12px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff44ff, #ff00aa, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px #ff44ff, 0 0 10px #00ffff;
            transition: all 0.3s ease;
            animation: circlePulse 1.5s ease-in-out infinite;
            z-index: 10;
        }
        
        .chat-circle-btn:hover {
            transform: translateX(-50%) scale(1.1);
        }
        
        @keyframes circlePulse {
            0% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
            50% { box-shadow: 0 0 30px #ff44ff, 0 0 20px #00ffff; transform: translateX(-50%) scale(1.05); }
            100% { box-shadow: 0 0 10px #ff44ff; transform: translateX(-50%) scale(1); }
        }
        
        .chat-circle-btn span {
            font-size: 1.8rem;
            animation: chatIconSpin 3s linear infinite;
        }
        
        @keyframes chatIconSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .music-bottom-btn {
            background: #000000aa;
            padding: 5px 12px;
            border-radius: 18px;
            color: #0ff;
            cursor: pointer;
            font-size: 0.5rem;
            border: 1px solid #0ff;
        }

        /* ==================== صفحة الدردشة - تصميم الماسنجر ==================== */
        .chat-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        /* رأس صفحة الدردشة */
        .chat-header {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #ff44ff;
        }
        
        .back-chat-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }
        
        .chat-header-title {
            flex: 1;
        }
        
        .chat-header-title h3 {
            color: white;
            font-size: 1rem;
        }
        
        .chat-header-title p {
            color: #00ff88;
            font-size: 0.6rem;
        }
        
        /* تخطيط الماسنجر: شريط جانبي + منطقة محادثة */
        .messenger-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        /* الشريط الجانبي الأيمن (الغرف والمستخدمين) */
        .chat-sidebar {
            width: 40%;
            background: rgba(0,0,0,0.4);
            border-right: 1px solid #ff44ff;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .sidebar-section {
            padding: 12px;
            border-bottom: 1px solid rgba(255,68,255,0.2);
        }
        
        .sidebar-title {
            color: #ff44ff;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .rooms-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .room-item {
            background: rgba(255,68,255,0.1);
            padding: 8px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .room-item:hover {
            background: rgba(255,68,255,0.3);
            transform: translateX(-3px);
        }
        
        .room-item.active {
            background: linear-gradient(135deg, #ff44ff40, #00ffff40);
            border: 1px solid #ff44ff;
        }
        
        .room-name {
            color: white;
            font-size: 0.7rem;
        }
        
        .room-lock {
            font-size: 0.5rem;
        }
        
        .users-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 10px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .user-item:hover {
            background: rgba(255,68,255,0.2);
        }
        
        .user-item.selected {
            background: rgba(0,255,136,0.2);
            border-right: 2px solid #00ff88;
        }
        
        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        
        .user-name {
            color: white;
            font-size: 0.65rem;
            flex: 1;
        }
        
        .user-vip {
            font-size: 0.45rem;
            background: #ff44ff;
            padding: 2px 4px;
            border-radius: 8px;
        }
        
        /* منطقة المحادثة الرئيسية */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.2);
        }
        
        .chat-room-header {
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid #ff44ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .current-room-name {
            color: #00ffff;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .mic-status {
            font-size: 0.6rem;
            color: #0ff;
        }
        
        /* منطقة الرسائل */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        /* فقاعات الدردشة على طراز الماسنجر */
        .message-bubble {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 0.75rem;
            position: relative;
            word-break: break-word;
        }
        
        .message-out {
            align-self: flex-end;
            background: linear-gradient(135deg, #ff44ff, #ff00aa);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-in {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            color: white;
            border-bottom-left-radius: 4px;
        }
        
        .message-private {
            background: rgba(0,255,136,0.15);
            border: 1px solid #00ff88;
        }
        
        .message-sender-name {
            font-size: 0.55rem;
            color: #ffaa88;
            margin-bottom: 3px;
        }
        
        .message-time {
            font-size: 0.45rem;
            color: #aaa;
            margin-top: 3px;
            text-align: right;
        }
        
        /* منطقة إدخال الرسائل */
        .chat-input-area {
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid #ff44ff;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.75rem;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #00ffff;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .image-btn {
            background: rgba(255,68,255,0.3);
            border: 1px solid #ff44ff;
        }
        
        /* أزرار الصوت */
        .voice-controls {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }
        
        .mic-btn-chat {
            background: rgba(0,255,255,0.2);
            border: 1px solid #0ff;
            padding: 6px 12px;
            border-radius: 20px;
            color: #0ff;
            font-size: 0.6rem;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000ee;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .game-modal iframe {
            width: 95%;
            height: 80%;
            border-radius: 15px;
            border: 3px solid #ff44ff;
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff3366;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="anime-city-bg"></div>
<div class="app">
    <div class="content">
        <div id="homePage" class="page">
            <div class="anime-hero">
                <div class="character-img">
                    <div class="controller-on-hand">🎮</div>
                </div>
                <div class="character-info">
                    <div class="tshirt-text">⚡ DIDO-GAME ⚡</div>
                    <h2>😤 نظرة التحدي النيونية!</h2>
                </div>
            </div>
            
            <div class="ranking-section">
                <div class="ranking-circles" id="rankingList"></div>
            </div>
            
            <div class="categories-section">
                <div class="categories" id="categoriesList">
                    <div class="cat-badge" data-cat="action">🎯 أكشن</div>
                    <div class="cat-badge" data-cat="racing">🏎️ سباقات</div>
                    <div class="cat-badge" data-cat="fighting">🥊 قتال</div>
                    <div class="cat-badge" data-cat="puzzle">🧩 ألغاز</div>
                </div>
            </div>
            
            <div class="fixed-permanent-ad" id="permanentAd">📺 إعلان ممول - اشترك الآن!</div>
            
            <div class="games-wrapper">
                <div class="two-rows" id="gamesContainer"></div>
            </div>
        </div>
        
        <div id="categoryPage" class="page page-hidden">
            <button class="small-btn" id="backToHomeBtn" style="margin-bottom:10px;">🔙 العودة للرئيسية</button>
            <div class="two-rows" id="categoryGamesContainer"></div>
        </div>
    </div>
    
    <div class="bottom-bar">
        <div class="register-btn" id="registerBtn" onclick="upgradeToVIP()">👑 ترقية VIP</div>
        <div class="chat-circle-btn" id="openChatBtn">
            <span>💬</span>
        </div>
        <div class="music-bottom-btn" id="musicBtn" onclick="toggleMusic()">🎵 تشغيل</div>
    </div>
</div>

<!-- صفحة الدردشة بتصميم الماسنجر -->
<div id="chatPage" class="chat-page hidden">
    <div class="chat-header">
        <button class="back-chat-btn" id="closeChatBtn">✕</button>
        <div class="chat-header-title">
            <h3>💬 دردشة DidoGame</h3>
            <p id="chatStatusText">⚪ غير متصل</p>
        </div>
    </div>
    
    <div class="messenger-layout">
        <!-- الشريط الجانبي -->
        <div class="chat-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">👤 حسابي</div>
                <div class="room-controls" style="flex-direction:column; gap:8px;">
                    <input type="text" id="chatUserName" class="room-input" placeholder="اسم المستخدم" style="width:100%;">
                    <button class="small-btn" onclick="chatSetUsername()" style="width:100%;">✅ تعيين الاسم</button>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">📁 الغرف المتاحة</div>
                <div class="rooms-list" id="roomsListSidebar"></div>
                <div class="room-controls" style="margin-top:8px;">
                    <input type="text" id="chatRoomName" class="room-input" placeholder="اسم الغرفة" style="flex:2;">
                    <input type="password" id="chatRoomPassword" class="room-input" placeholder="كلمة المرور" style="flex:1;">
                </div>
                <div class="room-controls" style="margin-top:5px;">
                    <button class="small-btn" onclick="chatCreateRoom()" style="flex:1;">✨ إنشاء</button>
                    <button class="small-btn" onclick="chatJoinRoom()" style="flex:1;">🚪 دخول</button>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">👥 أعضاء الغرفة</div>
                <div class="users-list" id="usersListSidebar">
                    <div style="color:#888; text-align:center;">ادخل غرفة أولاً</div>
                </div>
            </div>
        </div>
        
        <!-- منطقة المحادثة الرئيسية -->
        <div class="chat-main">
            <div class="chat-room-header">
                <span class="current-room-name" id="currentRoomNameDisplay">⚪ لا توجد غرفة</span>
                <span class="mic-status" id="micStatusDisplay">🎤</span>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div style="color:#888; text-align:center;">✨ اختر غرفة وابدأ المحادثة</div>
            </div>
            
            <div class="chat-input-area">
                <button class="send-btn image-btn" id="chatImageBtn" onclick="chatSendImage()" style="display:none;">🖼️</button>
                <input type="text" id="chatMessageInput" class="chat-input" placeholder="اكتب رسالة...">
                <button class="send-btn" onclick="chatSendMessage()">📤</button>
            </div>
            
            <div class="voice-controls">
                <button class="mic-btn-chat" id="chatMicBtn" onclick="chatToggleMic()">🎙️ تفعيل الميكروفون</button>
            </div>
        </div>
    </div>
</div>

<div id="gameModal" class="game-modal hidden">
    <div class="close-modal" onclick="closeGame()">✕</div>
    <iframe id="gameIframe" src="" allow="microphone; autoplay"></iframe>
</div>

<script>
    // Games Data
    const gamesData = [
        { id:1, name:"Sonic", img:"https://images6.alphacoders.com/118/1185678.jpg", url:"https://www.crazygames.com/embed/sonic-the-hedgehog", cat:"action", points:150, avatar:"🦔", playerName:"Shadow" },
        { id:2, name:"Subway Surfers", img:"https://images.pexels.com/photos/27518665/pexels-photo-27518665.jpeg", url:"https://www.crazygames.com/embed/subway-surfers", cat:"action", points:200, avatar:"🏃", playerName:"Speed" },
        { id:3, name:"Temple Run 2", img:"https://images.hdqwalls.com/wallpapers/pubg-mobile-squad-4k-8q.jpg", url:"https://www.crazygames.com/embed/temple-run-2", cat:"action", points:180, avatar:"🏛️", playerName:"RunKing" },
        { id:4, name:"Hill Climb", img:"https://images.hdqwalls.com/wallpapers/hill-climb-racing-2020-52.jpg", url:"https://www.crazygames.com/embed/hill-climb-racing", cat:"racing", points:120, avatar:"🚗", playerName:"Climber" },
        { id:5, name:"Street Fighter", img:"https://images.hdqwalls.com/wallpapers/street-fighter-4k-artwork-2021-9z.jpg", url:"https://www.crazygames.com/embed/street-fighter", cat:"fighting", points:300, avatar:"👊", playerName:"Fighter" },
        { id:6, name:"Mortal Kombat", img:"https://images.hdqwalls.com/wallpapers/mortal-kombat-11-4k-2020-45.jpg", url:"https://www.crazygames.com/embed/mortal-kombat", cat:"fighting", points:280, avatar:"💀", playerName:"Scorpion" },
        { id:7, name:"Among Us", img:"https://images.hdqwalls.com/wallpapers/among-us-2020-character-artwork-4k-5s.jpg", url:"https://www.crazygames.com/embed/among-us-online", cat:"puzzle", points:90, avatar:"👽", playerName:"Impostor" },
        { id:8, name:"Free Fire", img:"https://images.hdqwalls.com/wallpapers/free-fire-2020-game-4k-g6.jpg", url:"https://www.crazygames.com/embed/free-fire", cat:"action", points:350, avatar:"🔥", playerName:"Fire" }
    ];
    
    let currentUserName = null;
    let currentRoom = null;
    let isVIPUser = false;
    let allRooms = {};
    let localStream = null;
    let micActive = false;
    let music = null;
    let musicPlaying = false;
    
    // Ranking
    function updateRanking() {
        const sorted = [...gamesData].sort((a,b)=>b.points - a.points);
        document.getElementById('rankingList').innerHTML = `
            <div><div class="silver-circle">${sorted[1]?.avatar||'👤'}</div><div class="rank-name">${sorted[1]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[1]?.points||0}</div></div>
            <div><div class="gold-circle">${sorted[0]?.avatar||'👤'}</div><div class="rank-name">${sorted[0]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[0]?.points||0}</div></div>
            <div><div class="bronze-circle">${sorted[2]?.avatar||'👤'}</div><div class="rank-name">${sorted[2]?.playerName||'---'}</div><div class="rank-points">⭐${sorted[2]?.points||0}</div></div>
        `;
    }
    
    function renderGames() {
        const mid = Math.ceil(gamesData.length/2);
        const row1 = gamesData.slice(0,mid);
        const row2 = gamesData.slice(mid);
        document.getElementById('gamesContainer').innerHTML = `
            <div class="game-row">${row1.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat}</div></div>`).join('')}</div>
            <div class="game-row">${row2.map(g=>`<div class="game-card" data-id="${g.id}" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div><div class="game-cat">✨ ${g.cat}</div></div>`).join('')}</div>
        `;
        document.querySelectorAll('.game-card').forEach(card=>{
            card.addEventListener('click',()=>{
                let id = parseInt(card.dataset.id);
                let game = gamesData.find(g=>g.id===id);
                if(game) { game.points+=5; updateRanking(); }
                document.getElementById('gameIframe').src = card.dataset.url;
                document.getElementById('gameModal').classList.remove('hidden');
            });
        });
    }
    
    function showCategory(cat){
        let filtered = gamesData.filter(g=>g.cat===cat);
        const mid = Math.ceil(filtered.length/2);
        document.getElementById('categoryGamesContainer').innerHTML = `
            <div class="game-row">${filtered.slice(0,mid).map(g=>`<div class="game-card" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
            <div class="game-row">${filtered.slice(mid).map(g=>`<div class="game-card" data-url="${g.url}"><div class="game-img" style="background-image:url('${g.img}')"></div><div class="game-title">${g.name}</div></div>`).join('')}</div>
        `;
        document.querySelectorAll('#categoryGamesContainer .game-card').forEach(c=>c.addEventListener('click',()=>{ document.getElementById('gameIframe').src=c.dataset.url; document.getElementById('gameModal').classList.remove('hidden'); }));
        document.getElementById('homePage').classList.add('page-hidden');
        document.getElementById('categoryPage').classList.remove('page-hidden');
    }
    
    document.querySelectorAll('.cat-badge').forEach(b=>b.addEventListener('click',()=>showCategory(b.dataset.cat)));
    document.getElementById('backToHomeBtn').addEventListener('click',()=>{ document.getElementById('homePage').classList.remove('page-hidden'); document.getElementById('categoryPage').classList.add('page-hidden'); });
    function closeGame() { document.getElementById('gameModal').classList.add('hidden'); document.getElementById('gameIframe').src=''; }
    
    function upgradeToVIP() {
        if(isVIPUser) { alert("✨ أنت VIP"); return; }
        if(confirm("ترقية VIP؟")) { isVIPUser=true; localStorage.setItem('didogame_vip','true'); document.getElementById('registerBtn').innerHTML='👑 VIP مفعل'; document.getElementById('registerBtn').classList.add('vip-active'); document.getElementById('chatImageBtn').style.display='block'; alert("أصبحت VIP"); }
    }
    
    // Chat Functions
    function saveRooms() { localStorage.setItem('didogame_rooms', JSON.stringify(allRooms)); }
    function loadRooms() { let data = localStorage.getItem('didogame_rooms'); if(data) allRooms = JSON.parse(data); else allRooms = {}; }
    
    function updateSidebarRooms() {
        let container = document.getElementById('roomsListSidebar');
        let rooms = Object.keys(allRooms);
        if(rooms.length===0) { container.innerHTML='<div style="color:#888; text-align:center;">لا توجد غرف</div>'; return; }
        container.innerHTML = rooms.map(r => `
            <div class="room-item ${currentRoom===r ? 'active' : ''}" onclick="quickJoinRoom('${r}')">
                <span class="room-name">${r}</span>
                <span class="room-lock">${allRooms[r].password?'🔒':'🔓'}</span>
            </div>
        `).join('');
    }
    
    function updateSidebarUsers() {
        let container = document.getElementById('usersListSidebar');
        if(!currentRoom || !allRooms[currentRoom]) { container.innerHTML='<div style="color:#888; text-align:center;">ادخل غرفة أولاً</div>'; return; }
        let users = allRooms[currentRoom].users || [];
        container.innerHTML = users.map(u => `
            <div class="user-item" onclick="selectPrivateUser('${u}')">
                <div class="user-avatar">${u.charAt(0)}</div>
                <div class="user-name">${u} ${u===currentUserName?'(أنت)':''}</div>
                ${isVIPUser && u===currentUserName ? '<span class="user-vip">VIP</span>' : ''}
            </div>
        `).join('');
    }
    
    function selectPrivateUser(username) {
        if(username === currentUserName) return;
        document.getElementById('chatMessageInput').placeholder = `رسالة خاصة إلى ${username}...`;
        document.getElementById('chatMessageInput').dataset.privateTo = username;
    }
    
    function quickJoinRoom(roomName) {
        document.getElementById('chatRoomName').value = roomName;
        chatJoinRoom();
    }
    
    function chatSetUsername() {
        let name = document.getElementById('chatUserName').value.trim();
        if(!name) { alert("أدخل اسمك"); return; }
        currentUserName = name;
        localStorage.setItem('didogame_username', currentUserName);
        alert(`✅ مرحباً ${currentUserName}`);
        updateSidebarUsers();
    }
    
    function chatCreateRoom() {
        if(!currentUserName) { alert("حدد اسم المستخدم أولاً"); return; }
        let roomName = document.getElementById('chatRoomName').value.trim();
        let password = document.getElementById('chatRoomPassword').value;
        if(!roomName) return alert("أدخل اسم الغرفة");
        if(allRooms[roomName]) return alert("الغرفة موجودة");
        allRooms[roomName] = { password: password || null, users: [currentUserName], messages: [] };
        saveRooms();
        updateSidebarRooms();
        currentRoom = roomName;
        showChatRoom();
    }
    
    function chatJoinRoom() {
        if(!currentUserName) { alert("حدد اسم المستخدم أولاً"); return; }
        let roomName = document.getElementById('chatRoomName').value.trim();
        let password = document.getElementById('chatRoomPassword').value;
        let room = allRooms[roomName];
        if(!room) return alert("الغرفة غير موجودة");
        if(room.password && room.password !== password) return alert("كلمة مرور خاطئة");
        if(!room.users.includes(currentUserName)) room.users.push(currentUserName);
        currentRoom = roomName;
        saveRooms();
        showChatRoom();
    }
    
    function showChatRoom() {
        updateSidebarRooms();
        updateSidebarUsers();
        displayMessages();
        document.getElementById('currentRoomNameDisplay').innerHTML = `🔐 ${currentRoom}`;
        document.getElementById('chatStatusText').innerHTML = `🟢 متصل في ${currentRoom}`;
        startMicrophoneForRoom();
    }
    
    function displayMessages() {
        let container = document.getElementById('messagesArea');
        if(!currentRoom || !allRooms[currentRoom]) { container.innerHTML='<div style="color:#888; text-align:center;">اختر غرفة</div>'; return; }
        let msgs = allRooms[currentRoom].messages.slice(-50);
        if(msgs.length===0) { container.innerHTML='<div style="color:#888; text-align:center;">✨ لا توجد رسائل بعد</div>'; return; }
        container.innerHTML = '';
        msgs.forEach(msg => {
            if(msg.type === 'private' && msg.sender !== currentUserName && msg.target !== currentUserName) return;
            let isOut = msg.sender === currentUserName;
            let bubbleClass = isOut ? 'message-out' : 'message-in';
            if(msg.type === 'private') bubbleClass += ' message-private';
            let div = document.createElement('div');
            div.className = `message-bubble ${bubbleClass}`;
            let senderHtml = !isOut ? `<div class="message-sender-name">${msg.sender}</div>` : '';
            let targetHtml = msg.type === 'private' && msg.target ? `<span style="font-size:0.5rem;">🔒 إلى ${msg.target}</span>` : '';
            div.innerHTML = senderHtml + `<div>${msg.text || (msg.image ? '📷 صورة' : '')}</div>` + targetHtml + `<div class="message-time">${new Date(msg.time).toLocaleTimeString()}</div>`;
            if(msg.image) div.innerHTML += `<img src="${msg.image}" style="max-width:100%; max-height:100px; border-radius:10px; margin-top:5px;">`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }
    
    function chatSendMessage() {
        let input = document.getElementById('chatMessageInput');
        let text = input.value.trim();
        let privateTo = input.dataset.privateTo;
        if(!text || !currentRoom) return;
        let msg;
        if(privateTo) {
            msg = { type:'private', sender:currentUserName, target:privateTo, text, time:Date.now() };
            input.dataset.privateTo = '';
            input.placeholder = 'اكتب رسالة...';
        } else {
            msg = { type:'public', sender:currentUserName, text, time:Date.now() };
        }
        allRooms[currentRoom].messages.push(msg);
        saveRooms();
        displayMessages();
        input.value = '';
    }
    
    function chatSendImage() {
        if(!isVIPUser) { alert("خاصية VIP فقط"); return; }
        let input = document.createElement('input');
        input.type='file'; input.accept='image/*';
        input.onchange = e => {
            let file = e.target.files[0];
            if(file) {
                let reader = new FileReader();
                reader.onload = ev => {
                    let msg = { type:'public', sender:currentUserName, image:ev.target.result, time:Date.now() };
                    allRooms[currentRoom].messages.push(msg);
                    saveRooms();
                    displayMessages();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    function chatLeaveRoom() {
        if(currentRoom && allRooms[currentRoom]) {
            allRooms[currentRoom].users = allRooms[currentRoom].users.filter(u => u !== currentUserName);
            saveRooms();
        }
        if(localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
        currentRoom = null;
        document.getElementById('currentRoomNameDisplay').innerHTML = '⚪ لا توجد غرفة';
        document.getElementById('chatStatusText').innerHTML = '⚪ غير متصل';
        document.getElementById('messagesArea').innerHTML = '<div style="color:#888; text-align:center;">✨ اختر غرفة وابدأ المحادثة</div>';
        updateSidebarRooms();
        updateSidebarUsers();
    }
    
    async function startMicrophoneForRoom() {
        if(!currentRoom) return;
        try {
            if(!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micActive = true;
                document.getElementById('chatMicBtn').innerHTML = "🎙️ ميكروفون ON";
                document.getElementById('micStatusDisplay').innerHTML = "🎤 صوت مفعل";
            }
        } catch(e) { console.log("Mic error"); }
    }
    
    function chatToggleMic() {
        if(!currentRoom) { alert("ادخل غرفة أولاً"); return; }
        if(!localStream) { startMicrophoneForRoom(); return; }
        let audioTrack = localStream.getAudioTracks()[0];
        if(audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            micActive = audioTrack.enabled;
            document.getElementById('chatMicBtn').innerHTML = micActive ? "🎙️ ميكروفون ON" : "🔴 ميكروفون OFF";
            document.getElementById('micStatusDisplay').innerHTML = micActive ? "🎤 صوت مفعل" : "🔇 صوت مكتوم";
        }
    }
    
    // Music
    function toggleMusic() {
        if(!music) { music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); music.loop=true; music.volume=1.0; }
        if(musicPlaying) { music.pause(); document.getElementById('musicBtn').innerHTML="🎵 تشغيل"; }
        else { music.play().catch(e=>{}); document.getElementById('musicBtn').innerHTML="🔇 إيقاف"; }
        musicPlaying = !musicPlaying;
    }
    
    // Open/Close Chat
    document.getElementById('openChatBtn').addEventListener('click',()=>{
        document.getElementById('chatPage').classList.remove('hidden');
        updateSidebarRooms();
        let saved = localStorage.getItem('didogame_username');
        if(saved) { currentUserName = saved; document.getElementById('chatUserName').value = currentUserName; }
        if(currentRoom) showChatRoom();
    });
    document.getElementById('closeChatBtn').addEventListener('click',()=>{ document.getElementById('chatPage').classList.add('hidden'); });
    
    // Auto refresh
    setInterval(() => {
        if(currentRoom && allRooms[currentRoom]) { displayMessages(); updateSidebarUsers(); }
        updateSidebarRooms();
    }, 2000);
    
    // Ads
    const ads = ["📺 إعلان ممول - اشترك الآن!", "🎮 لعبة الأسبوع - العب مجاناً!", "💰 خصم 50% على VIP", "🚀 تحديث جديد"];
    let adIdx=0;
    setInterval(()=>{ adIdx=(adIdx+1)%ads.length; document.getElementById('permanentAd').innerHTML=ads[adIdx]; }, 10000);
    
    // Init
    loadRooms();
    updateRanking();
    renderGames();
    updateSidebarRooms();
    let savedVIP = localStorage.getItem('didogame_vip');
    if(savedVIP==='true') { isVIPUser=true; document.getElementById('registerBtn').innerHTML='👑 VIP مفعل'; document.getElementById('registerBtn').classList.add('vip-active'); document.getElementById('chatImageBtn').style.display='block'; }
    let savedName = localStorage.getItem('didogame_username');
    if(savedName) { currentUserName=savedName; document.getElementById('chatUserName').value=currentUserName; }
    else { setTimeout(()=>{ let n=prompt("👋 اسم المستخدم:","أحمد"); if(n){ currentUserName=n; localStorage.setItem('didogame_username',currentUserName); document.getElementById('chatUserName').value=currentUserName; } },500); }
    
    window.chatSetUsername=chatSetUsername; window.chatJoinRoom=chatJoinRoom; window.chatCreateRoom=chatCreateRoom; window.chatSendMessage=chatSendMessage; window.chatSendImage=chatSendImage; window.chatLeaveRoom=chatLeaveRoom; window.chatToggleMic=chatToggleMic; window.quickJoinRoom=quickJoinRoom; window.selectPrivateUser=selectPrivateUser; window.upgradeToVIP=upgradeToVIP; window.closeGame=closeGame; window.toggleMusic=toggleMusic;
</script>
</body>
</html>
