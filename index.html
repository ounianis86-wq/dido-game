<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DidoGame - دردشة VIP (نسخة الهاتف)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a2a, #1a0033);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(10,10,30,0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid #ff44ff;
            box-shadow: 0 0 30px #ff44ff40;
        }
        h1 {
            color: #ff44ff;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        .login-area, .chat-area {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 25px;
            border: 1px solid #ff44ff;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 0.9rem;
        }
        button {
            background: linear-gradient(135deg, #ff44ff, #00ffff);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 0.9rem;
        }
        .messages {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 10px;
            height: 280px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .message {
            background: rgba(255,68,255,0.2);
            border-radius: 15px;
            padding: 8px 12px;
            margin-bottom: 8px;
        }
        .sender {
            color: #ff44ff;
            font-size: 0.7rem;
        }
        .text {
            color: white;
            font-size: 0.85rem;
            margin-top: 3px;
        }
        .vip-badge {
            background: #ff44ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            margin-left: 5px;
        }
        .users-list {
            font-size: 0.7rem;
            color: #00ff88;
            margin-bottom: 10px;
            text-align: center;
        }
        .user-chip {
            display: inline-block;
            background: rgba(255,68,255,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            margin: 3px;
            font-size: 0.7rem;
        }
        .user-chip.vip {
            border: 1px solid #ff44ff;
            background: rgba(255,68,255,0.5);
        }
        .hidden {
            display: none;
        }
        .flex-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .call-select {
            flex: 1;
        }
        img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
        }
        audio {
            max-width: 100%;
            margin-top: 5px;
            border-radius: 20px;
        }
        .demo-users {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .demo-btn {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            padding: 6px 12px;
            font-size: 0.7rem;
        }
        .recording-indicator {
            color: #ff3366;
            font-size: 0.7rem;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎮 DidoGame VIP 🎮</h1>
    
    <div id="loginDiv" class="login-area">
        <input type="text" id="username" placeholder="اسم المستخدم" value="أحمد">
        <button onclick="login()">🚀 دخول</button>
        
        <div class="demo-users">
            <button class="demo-btn" onclick="quickAdd('محمد')">➕ محمد</button>
            <button class="demo-btn" onclick="quickAdd('سارة')">➕ سارة</button>
            <button class="demo-btn" onclick="quickAdd('علي')">➕ علي</button>
            <button class="demo-btn" onclick="quickAdd('ليلى')">➕ ليلى</button>
        </div>
        
        <div class="users-list" id="onlineUsersList">👥 --</div>
    </div>
    
    <div id="chatDiv" class="chat-area hidden">
        <div id="userInfo" style="color:#ffaa88; text-align:center; margin-bottom:8px;"></div>
        <div class="users-list" id="activeUsers">👥 المتصلون: --</div>
        <div class="messages" id="messagesDiv">
            <div style="color:#888; text-align:center;">💬 ابدأ المحادثة...</div>
        </div>
        
        <div class="flex-row">
            <input type="text" id="messageInput" placeholder="اكتب رسالة..." style="flex:1;" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤</button>
            <button id="vipImageBtn" onclick="sendImage()" style="display:none;">🖼️</button>
            <button id="vipAudioBtn" onclick="startRecording()" style="display:none;">🎙️</button>
        </div>
        
        <div id="callSection" style="margin-top:12px; text-align:center; display:none;">
            <div class="flex-row">
                <select id="callUser" class="call-select"></select>
                <button onclick="startCall()">📞 اتصال</button>
            </div>
            <div id="callStatus" style="color:#ff44ff; font-size:0.7rem; margin-top:5px;"></div>
        </div>
    </div>
    
    <div style="text-align:center; margin-top:10px;">
        <button id="upgradeBtn" onclick="upgradeVIP()" style="background:linear-gradient(135deg,#ffaa00,#ff6600);">👑 ترقية VIP (صور + مكالمات)</button>
    </div>
</div>

<script>
    let currentUser = null;
    let isVIP = false;
    let messages = [];
    let users = [];
    let audioCounter = 0;
    
    function loadData() {
        let saved = localStorage.getItem('mobile_chat_messages');
        if (saved) messages = JSON.parse(saved);
        
        saved = localStorage.getItem('mobile_chat_users');
        if (saved) users = JSON.parse(saved);
        
        if (users.length === 0) {
            users = [
                { username: "محمد", isVIP: true, online: true },
                { username: "سارة", isVIP: false, online: true },
                { username: "علي", isVIP: false, online: true },
                { username: "ليلى", isVIP: true, online: true }
            ];
            saveUsers();
        }
        
        updateUsersList();
    }
    
    function saveMessages() {
        localStorage.setItem('mobile_chat_messages', JSON.stringify(messages));
    }
    
    function saveUsers() {
        localStorage.setItem('mobile_chat_users', JSON.stringify(users));
    }
    
    function quickAdd(name) {
        let existing = users.find(u => u.username === name);
        if (existing) {
            existing.online = true;
            alert(`✅ ${name} متصل الآن!`);
        } else {
            users.push({ username: name, isVIP: false, online: true });
            alert(`✅ تم إضافة ${name} كمتصل`);
        }
        saveUsers();
        updateUsersList();
        if (document.getElementById('chatDiv').classList.contains('hidden') === false) {
            updateCallDropdown();
        }
    }
    
    function updateUsersList() {
        let online = users.filter(u => u.online);
        document.getElementById('onlineUsersList').innerHTML = `👥 متصلون الآن: ${online.length}`;
        
        let container = document.getElementById('activeUsers');
        if (container) {
            if (online.length === 0) {
                container.innerHTML = '👥 لا يوجد متصلين غيرك';
            } else {
                container.innerHTML = '👥 ' + online.map(u => `<span class="user-chip ${u.isVIP ? 'vip' : ''}">${u.username}${u.isVIP ? '⭐' : ''}</span>`).join('');
            }
        }
    }
    
    function updateCallDropdown() {
        let select = document.getElementById('callUser');
        if (!select) return;
        let online = users.filter(u => u.online && u.username !== currentUser?.username);
        select.innerHTML = '<option value="">اختر مستخدم...</option>';
        online.forEach(u => {
            select.innerHTML += `<option value="${u.username}">${u.username} ${u.isVIP ? '⭐VIP' : ''}</option>`;
        });
    }
    
    function login() {
        let name = document.getElementById('username').value.trim();
        if (!name) { alert("أدخل اسمك"); return; }
        
        let user = users.find(u => u.username === name);
        if (!user) {
            user = { username: name, isVIP: false, online: true };
            users.push(user);
        } else {
            user.online = true;
        }
        
        currentUser = user;
        isVIP = user.isVIP;
        saveUsers();
        
        document.getElementById('loginDiv').classList.add('hidden');
        document.getElementById('chatDiv').classList.remove('hidden');
        document.getElementById('userInfo').innerHTML = `👤 ${currentUser.username} ${isVIP ? '<span class="vip-badge">VIP</span>' : ''}`;
        
        if (isVIP) {
            document.getElementById('vipImageBtn').style.display = 'inline-block';
            document.getElementById('vipAudioBtn').style.display = 'inline-block';
            document.getElementById('callSection').style.display = 'block';
            document.getElementById('upgradeBtn').innerHTML = '👑 VIP مفعل';
            document.getElementById('upgradeBtn').style.opacity = '0.7';
        } else {
            document.getElementById('vipImageBtn').style.display = 'none';
            document.getElementById('vipAudioBtn').style.display = 'none';
            document.getElementById('callSection').style.display = 'none';
        }
        
        displayMessages();
        updateUsersList();
        updateCallDropdown();
        
        setInterval(() => {
            if (currentUser) {
                displayMessages();
                updateUsersList();
            }
        }, 2000);
    }
    
    function upgradeVIP() {
        if (isVIP) { alert("أنت VIP بالفعل!"); return; }
        if (confirm("✨ ترقية إلى VIP - 9.99$ شهرياً\n✅ صور + مكالمات صوتية\n✅ مميزات حصرية\n\nهل توافق؟")) {
            isVIP = true;
            currentUser.isVIP = true;
            let idx = users.findIndex(u => u.username === currentUser.username);
            if (idx !== -1) users[idx].isVIP = true;
            saveUsers();
            
            document.getElementById('userInfo').innerHTML = `👤 ${currentUser.username} <span class="vip-badge">VIP</span>`;
            document.getElementById('vipImageBtn').style.display = 'inline-block';
            document.getElementById('vipAudioBtn').style.display = 'inline-block';
            document.getElementById('callSection').style.display = 'block';
            document.getElementById('upgradeBtn').innerHTML = '👑 VIP مفعل';
            updateCallDropdown();
            alert("🎉 أصبحت عضواً مميزاً! يمكنك الآن:\n• إرسال الصور 📸\n• التسجيل الصوتي 🎙️\n• إجراء المكالمات الصوتية 📞");
        }
    }
    
    function sendMessage() {
        let text = document.getElementById('messageInput').value.trim();
        if (!text) return;
        messages.push({ username: currentUser.username, text: text, isVIP: isVIP, time: Date.now() });
        saveMessages();
        displayMessages();
        document.getElementById('messageInput').value = '';
    }
    
    function sendImage() {
        if (!isVIP) { alert("❌ إرسال الصور للمستخدمين المميزين فقط!\n👑 قم بترقية حسابك"); return; }
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            let file = e.target.files[0];
            if (file) {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    messages.push({ username: currentUser.username, image: ev.target.result, isVIP: isVIP, time: Date.now() });
                    saveMessages();
                    displayMessages();
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // التسجيل الصوتي - نسخة محسنة للهواتف
    async function startRecording() {
        if (!isVIP) { alert("❌ التسجيل الصوتي للمستخدمين المميزين فقط!"); return; }
        
        if (window.isRecording) {
            if (window.mediaRecorder && window.mediaRecorder.state === 'recording') {
                window.mediaRecorder.stop();
                window.isRecording = false;
                document.getElementById('vipAudioBtn').innerHTML = '🎙️';
                document.getElementById('vipAudioBtn').style.animation = 'none';
            }
            return;
        }
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            window.mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            
            window.mediaRecorder.ondataavailable = (e) => { 
                if (e.data.size > 0) chunks.push(e.data); 
            };
            
            window.mediaRecorder.onstop = () => {
                const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                const audioId = Date.now() + '_' + (audioCounter++);
                
                // حفظ الصوت كـ base64
                const reader = new FileReader();
                reader.onloadend = () => {
                    const audioData = reader.result;
                    messages.push({ 
                        username: currentUser.username, 
                        audioData: audioData,
                        audioType: 'webm',
                        isVIP: isVIP, 
                        time: Date.now() 
                    });
                    saveMessages();
                    displayMessages();
                };
                reader.readAsDataURL(audioBlob);
                
                stream.getTracks().forEach(track => track.stop());
            };
            
            window.mediaRecorder.start();
            window.isRecording = true;
            document.getElementById('vipAudioBtn').innerHTML = '⏹️';
            document.getElementById('vipAudioBtn').style.animation = 'blink 1s infinite';
            
            // إظهار إشعار
            const toast = document.createElement('div');
            toast.textContent = '🎙️ جاري التسجيل... اضغط مرة أخرى للإيقاف';
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#ff3366';
            toast.style.padding = '8px 16px';
            toast.style.borderRadius = '25px';
            toast.style.zIndex = '999';
            toast.style.fontSize = '0.7rem';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
            
            // إيقاف تلقائي بعد 30 ثانية
            setTimeout(() => {
                if (window.isRecording && window.mediaRecorder && window.mediaRecorder.state === 'recording') {
                    window.mediaRecorder.stop();
                    window.isRecording = false;
                    document.getElementById('vipAudioBtn').innerHTML = '🎙️';
                    document.getElementById('vipAudioBtn').style.animation = 'none';
                }
            }, 30000);
            
        } catch(e) { 
            alert("❌ لا يمكن الوصول للميكروفون: " + e.message + "\n\nتأكد من منح صلاحية الميكروفون");
        }
    }
    
    function startCall() {
        if (!isVIP) { alert("❌ المكالمات للمستخدمين المميزين فقط!"); return; }
        let target = document.getElementById('callUser').value;
        if (!target) { alert("اختر مستخدم للاتصال"); return; }
        let targetUser = users.find(u => u.username === target);
        if (!targetUser?.online) { alert("المستخدم غير متصل حالياً"); return; }
        if (!targetUser.isVIP) { alert("⚠️ يمكن الاتصال فقط بالمستخدمين المميزين VIP"); return; }
        
        document.getElementById('callStatus').innerHTML = `📞 جاري الاتصال بـ ${target}...`;
        setTimeout(() => {
            document.getElementById('callStatus').innerHTML = `📞 متصل مع ${target}`;
            setTimeout(() => {
                if (document.getElementById('callStatus').innerHTML.includes('متصل')) {
                    document.getElementById('callStatus').innerHTML = "📞 انتهت المكالمة";
                    setTimeout(() => document.getElementById('callStatus').innerHTML = "", 3000);
                }
            }, 30000);
        }, 2000);
    }
    
    function displayMessages() {
        let div = document.getElementById('messagesDiv');
        let last50 = messages.slice(-50);
        if (last50.length === 0) {
            div.innerHTML = '<div style="color:#888; text-align:center;">💬 لا توجد رسائل بعد... ابدأ المحادثة!</div>';
            return;
        }
        div.innerHTML = '';
        last50.forEach(msg => {
            let el = document.createElement('div');
            el.className = 'message';
            el.innerHTML = `<div class="sender">${msg.username} ${msg.isVIP ? '<span class="vip-badge">VIP</span>' : ''}</div>`;
            if (msg.text) el.innerHTML += `<div class="text">${msg.text}</div>`;
            if (msg.image) el.innerHTML += `<img src="${msg.image}" onclick="window.open(this.src)">`;
            if (msg.audioData) {
                el.innerHTML += `<audio src="${msg.audioData}" controls preload="auto"></audio>`;
            }
            div.appendChild(el);
        });
        div.scrollTop = div.scrollHeight;
    }
    
    window.addEventListener('beforeunload', () => {
        if (currentUser) {
            let idx = users.findIndex(u => u.username === currentUser.username);
            if (idx !== -1) users[idx].online = false;
            saveUsers();
        }
    });
    
    loadData();
</script>
</body>
</html>
