<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DIDO GAME - Superior Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* تأثير الدوائر النيون في الخلفية */
        .neon-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .circle1 {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff00ff40, transparent);
            border-radius: 50%;
            filter: blur(60px);
            animation: float 6s infinite;
        }

        .circle2 {
            position: absolute;
            bottom: 20%;
            right: 10%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #00ffff40, transparent);
            border-radius: 50%;
            filter: blur(70px);
            animation: float 8s infinite reverse;
        }

        .circle3 {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ff00ff30, #00ffff30);
            border-radius: 50%;
            filter: blur(80px);
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* الشعار الرئيسي */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
            letter-spacing: 3px;
        }

        .logo-section p {
            color: #cccccc;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* الأزرار الصغيرة (Chat, Guide, etc) */
        .small-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .small-btn {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .small-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #00ffff;
            box-shadow: 0 0 15px #00ffff;
        }

        /* شبكة الألعاب - صف واحد أفقي */
        .games-slider {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .game-card {
            background: rgba(30,30,50,0.8);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 25px 20px;
            width: 220px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: #00ffff;
            box-shadow: 0 0 30px #00ffff55;
        }

        .game-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .game-card h3 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .game-card p {
            color: #aaaaaa;
            font-size: 0.8rem;
        }

        /* الشريط السفلي */
        .bottom-bar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .bottom-text {
            color: #00ffff;
            font-size: 0.9rem;
            font-weight: 600;
            text-shadow: 0 0 10px cyan;
        }

        .bottom-controls {
            display: flex;
            gap: 15px;
        }

        .control-icon {
            background: rgba(255,255,255,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.2rem;
        }

        .control-icon:hover {
            background: #00ffff;
            color: black;
            box-shadow: 0 0 20px cyan;
        }

        /* موسيقى */
        .music-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #00ffff;
            border-radius: 50px;
            padding: 10px 18px;
            color: white;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .logo-section h1 { font-size: 2.2rem; }
            .game-card { width: 180px; padding: 15px; }
            .game-icon { font-size: 2.5rem; }
            .game-card h3 { font-size: 1rem; }
            .bottom-bar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="neon-bg">
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="circle3"></div>
</div>

<div class="container">
    <!-- الشعار -->
    <div class="logo-section">
        <h1>DIDO GAME</h1>
        <p>SUPERIOR GAMING EXPERIENCE</p>
    </div>

    <!-- أزرار صغيرة -->
    <div class="small-buttons">
        <div class="small-btn">💬 Chat</div>
        <div class="small-btn">📖 Guide</div>
        <div class="small-btn">🏆 Leaderboard</div>
        <div class="small-btn">⚙️ Settings</div>
    </div>

    <!-- بطاقات الألعاب (صف واحد أفقي) -->
    <div class="games-slider">
        <div class="game-card" onclick="alert('FPS Game - قريباً')">
            <div class="game-icon">🔫</div>
            <h3>FPS game</h3>
            <p>2.2k Players</p>
        </div>
        <div class="game-card" onclick="alert('Multiplayer - قريباً')">
            <div class="game-icon">🎮</div>
            <h3>Multiplayer</h3>
            <p>5.1k Players</p>
        </div>
        <div class="game-card" onclick="alert('PUBG Game - قريباً')">
            <div class="game-icon">✈️</div>
            <h3>PUBG game</h3>
            <p>8.7k Players</p>
        </div>
        <div class="game-card" onclick="alert('Call Of Duty - قريباً')">
            <div class="game-icon">🎖️</div>
            <h3>Call Of Duty</h3>
            <p>3.4k Players</p>
        </div>
    </div>

    <!-- الشريط السفلي -->
    <div class="bottom-bar">
        <div class="bottom-text">🌍 WORLD BEST GAMING PLATFORM</div>
        <div class="bottom-controls">
            <div class="control-icon">◀</div>
            <div class="control-icon">▶</div>
            <div class="control-icon">⏸</div>
            <div class="control-icon">🔊</div>
        </div>
    </div>
</div>

<!-- زر الموسيقى -->
<div class="music-toggle" id="musicToggle">🎵 تشغيل الموسيقى</div>

<script>
    // موسيقى خفيفة
    let music = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    music.loop = true;
    music.volume = 0.2;
    let isPlaying = false;

    const musicBtn = document.getElementById('musicToggle');
    musicBtn.onclick = () => {
        if (isPlaying) {
            music.pause();
            musicBtn.innerHTML = '🎵 تشغيل الموسيقى';
        } else {
            music.play().catch(() => {});
            musicBtn.innerHTML = '🔇 إيقاف الموسيقى';
        }
        isPlaying = !isPlaying;
    };

    // محاولة تشغيل تلقائي عند أول تفاعل
    document.body.addEventListener('touchstart', () => {
        if (!isPlaying) {
            music.play().catch(() => {});
            isPlaying = true;
            musicBtn.innerHTML = '🔇 إيقاف الموسيقى';
        }
    }, { once: true });
</script>

</body>
</html>
