<section class="arcade-container">

<h1 class="arcade-title">Dido Game</h1>

<div class="arcade-grid">

<div class="arcade-card">
<img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop">
<h2>Flappy Bird</h2>
<button onclick="openGame('https://flappybird.io/')">
تشغيل اللعبة
</button>
</div>

<div class="arcade-card">
<img src="https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=1200&auto=format&fit=crop">
<h2>Pacman</h2>
<button onclick="openGame('https://freepacman.org/')">
تشغيل اللعبة
</button>
</div>

<div class="arcade-card">
<img src="https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1200&auto=format&fit=crop">
<h2>Tetris</h2>
<button onclick="openGame('https://tetris.com/play-tetris')">
تشغيل اللعبة
</button>
</div>

<div class="arcade-card">
<img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=1200&auto=format&fit=crop">
<h2>Snake</h2>
<button onclick="openGame('https://playsnake.org/')">
تشغيل اللعبة
</button>
</div>

</div>

</section>

<div id="gameModal" class="game-modal">

<div class="game-content">

<button class="close-btn" onclick="closeGame()">
✖
</button>

<iframe id="gameFrame" src=""></iframe>

</div>

</div>

<style>
body{
background:#0f172a;
margin:0;
font-family:Arial;
}

.arcade-container{
padding:40px;
}

.arcade-title{
text-align:center;
font-size:50px;
color:white;
margin-bottom:40px;
}

.arcade-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.arcade-card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
transition:0.3s;
}

.arcade-card:hover{
transform:translateY(-5px);
}

.arcade-card img{
width:100%;
height:220px;
object-fit:cover;
}

.arcade-card h2{
color:white;
text-align:center;
margin-top:15px;
}

.arcade-card button{
display:block;
margin:20px auto;
padding:12px 25px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
}

.arcade-card button:hover{
background:#7c3aed;
}

.game-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.game-content{
width:95%;
height:90%;
background:#111827;
border-radius:20px;
position:relative;
overflow:hidden;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

.close-btn{
position:absolute;
top:15px;
right:15px;
width:45px;
height:45px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:20px;
cursor:pointer;
z-index:10;
}
</style>

<script>
function openGame(url){

document.getElementById("gameModal").style.display="flex";

document.getElementById("gameFrame").src=url;

}

function closeGame(){

document.getElementById("gameModal").style.display="none";

document.getElementById("gameFrame").src="";

}
</script>
