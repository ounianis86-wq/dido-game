<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
}

canvas{
    display:block;
    background:linear-gradient(#222,#000);
    touch-action:none;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
}
</style>
</head>

<body>

<div id="score">0</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

const player = {
    x: canvas.width/2 - 40,
    y: canvas.height - 100,
    width: 80,
    height: 80,
    color: "cyan"
};

const coins = [];

function createCoin(){
    coins.push({
        x: Math.random() * (canvas.width - 30),
        y: -30,
        size: 30,
        speed: 4
    });
}

setInterval(createCoin, 1000);

function drawPlayer(){
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawCoins(){

    for(let i=0;i<coins.length;i++){

        let c = coins[i];

        c.y += c.speed;

        ctx.fillStyle = "gold";
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.size/2,0,Math.PI*2);
        ctx.fill();

        // collision
        if(
            c.x > player.x &&
            c.x < player.x + player.width &&
            c.y > player.y &&
            c.y < player.y + player.height
        ){
            coins.splice(i,1);
            score++;
            document.getElementById("score").innerText = score;
        }

        // remove
        if(c.y > canvas.height){
            coins.splice(i,1);
        }
    }
}

function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawPlayer();
    drawCoins();

    requestAnimationFrame(gameLoop);
}

gameLoop();


// TOUCH CONTROL

canvas.addEventListener("touchmove",(e)=>{

    let touch = e.touches[0];

    player.x = touch.clientX - player.width/2;

});

</script><script>
const player = document.getElementById("player");
const coin = document.getElementById("coin");
const scoreText = document.getElementById("score");

let score = 0;
let playerX = window.innerWidth / 2 - 40;

player.style.left = playerX + "px";


// ================= الأصوات =================
const collectSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-229.wav");
const gameOverSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav");
const bgMusic = new Audio("https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.3;

// تشغيل الموسيقى عند أول لمس
document.body.addEventListener("touchstart", () => {
    bgMusic.play();
}, { once: true });


// ================= حركة اللاعب =================
document.addEventListener("touchmove", (e) => {
    playerX = e.touches[0].clientX - 40;
    player.style.left = playerX + "px";
});


// ================= سقوط العملة =================
let coinY = 0;
let coinX = Math.random() * (window.innerWidth - 40);

function updateGame() {

    coinY += 5;

    coin.style.top = coinY + "px";
    coin.style.left = coinX + "px";

    // جمع العملة
    if (
        coinY > window.innerHeight - 140 &&
        coinX > playerX - 40 &&
        coinX < playerX + 80
    ) {
        score++;
        scoreText.innerText = "Score: " + score;

        collectSound.currentTime = 0;
        collectSound.play();

        resetCoin();
    }

    // خسارة
    if (coinY > window.innerHeight) {

        gameOverSound.play();

        alert("Game Over! Score: " + score);

        score = 0;
        scoreText.innerText = "Score: 0";

        resetCoin();
    }

    requestAnimationFrame(updateGame);
}

function resetCoin() {
    coinY = 0;
    coinX = Math.random() * (window.innerWidth - 40);
}

updateGame();
</script>

</body>
</html>
