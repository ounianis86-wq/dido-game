<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dido Game Ultimate</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:linear-gradient(to bottom,#141e30,#243b55);
    touch-action:none;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

#player{
    width:90px;
    height:90px;
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    border-radius:20px;
    background:linear-gradient(45deg,#ffcc00,#ff6600);
    box-shadow:0 0 25px gold;
}

#coin{
    width:45px;
    height:45px;
    border-radius:50%;
    position:absolute;
    top:-50px;
    background:gold;
    box-shadow:0 0 20px yellow;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:100;
    font-size:22px;
}

button{
    padding:10px 15px;
    margin-top:10px;
    margin-right:5px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:50px;
    font-weight:bold;
    display:none;
    text-shadow:0 0 20px black;
}

#startScreen{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:999;
    color:white;
}

#startBtn{
    padding:15px 30px;
    font-size:25px;
    background:gold;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>

<button onclick="pauseGame()">⏸ Pause</button>
<button onclick="resumeGame()">▶ Resume</button>
</div>

<div id="player"></div>
<div id="coin"></div>

<div id="message"></div>

<div id="startScreen">
<h1>DIDO GAME</h1>
<p>Collect Coins And Survive</p>
<button id="startBtn">START GAME</button>
</div>

</div>

<script>

// ================= عناصر =================
const player = document.getElementById("player");
const coin = document.getElementById("coin");
const scoreText = document.getElementById("score");
const levelText = document.getElementById("level");
const message = document.getElementById("message");
const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");


// ================= أصوات =================
const collectSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-bonus-229.wav");

const gameOverSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav");

const bgMusic = new Audio("https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.4;


// ================= بيانات اللعبة =================
let score = 0;
let level = 1;

let speed = 4;

let isPaused = true;
let gameOver = false;

let playerX = window.innerWidth / 2;

let coinX = Math.random() * (window.innerWidth - 45);
let coinY = -50;


// ================= تشغيل اللعبة =================
startBtn.addEventListener("click", async ()=>{

    startScreen.style.display = "none";

    isPaused = false;

    try{
        await bgMusic.play();
    }catch(e){
        console.log("Music blocked");
    }

});


// ================= لمس الشاشة =================
document.addEventListener("touchmove",(e)=>{

    if(gameOver) return;

    playerX = e.touches[0].clientX - 45;

    if(playerX < 0)
        playerX = 0;

    if(playerX > window.innerWidth - 90)
        playerX = window.innerWidth - 90;

    player.style.left = playerX + "px";

});


// ================= الحلقة الرئيسية =================
function gameLoop(){

    if(!isPaused && !gameOver){

        coinY += speed;

        coin.style.top = coinY + "px";
        coin.style.left = coinX + "px";


        // التقاط العملة
        if(
            coinY > window.innerHeight - 150 &&
            coinX > playerX - 45 &&
            coinX < playerX + 90
        ){

            score++;

            scoreText.innerHTML = "Score: " + score;

            collectSound.currentTime = 0;
            collectSound.play();


            // مستويات أطول
            if(score % 15 === 0){

                level++;

                speed += 1;

                levelText.innerHTML = "Level: " + level;

                showMessage("LEVEL " + level);

            }

            resetCoin();

        }


        // الخسارة
        if(coinY > window.innerHeight){

            gameOver = true;
            isPaused = true;

            bgMusic.pause();

            gameOverSound.play();

            showMessage("GAME OVER");

            setTimeout(()=>{

                if(confirm("Restart Game?")){

                    restartGame();

                }

            },1000);

        }

    }

    requestAnimationFrame(gameLoop);

}


// ================= إعادة اللعبة =================
function restartGame(){

    score = 0;
    level = 1;
    speed = 4;

    gameOver = false;
    isPaused = false;

    scoreText.innerHTML = "Score: 0";
    levelText.innerHTML = "Level: 1";

    resetCoin();

    bgMusic.currentTime = 0;

    bgMusic.play();

}


// ================= إعادة العملة =================
function resetCoin(){

    coinY = -50;

    coinX = Math.random() * (window.innerWidth - 45);

}


// ================= رسائل =================
function showMessage(text){

    message.innerHTML = text;

    message.style.display = "block";

    setTimeout(()=>{

        message.style.display = "none";

    },2000);

}


// ================= إيقاف واستكمال =================
function pauseGame(){

    isPaused = true;

    bgMusic.pause();

}

function resumeGame(){

    if(!gameOver){

        isPaused = false;

        bgMusic.play();

    }

}


// ================= بدء =================
gameLoop();

</script>

</body>
</html>
